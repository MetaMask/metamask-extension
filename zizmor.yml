rules:
  dependabot-cooldown:
    ignore:
      - dependabot.yml:6
      # as long as we're only using dependabot for MetaMask/* dependencies no cooldown is needed.
  unpinned-uses:
    config:
      policies:
        "metamask/github-tools/*": any
        "MetaMask/*": any
        "actions/*": any
        "github/*": any
