net {
  type = mainnet
}

storage {
  db.engine = "LEVELDB",
  db.sync = false,
  db.directory = "database",
  index.directory = "index",
  transHistory.switch = "on",

  properties = []
  needToUpdateAsset = true

  dbSettings = {
    levelNumber = 7
    blocksize = 64
    maxBytesForLevelBase = 256
    maxBytesForLevelMultiplier = 10
    level0FileNumCompactionTrigger = 4
    targetFileSizeBase = 256
    targetFileSizeMultiplier = 1
  }

  backup = {
    enable = false
    propPath = "prop.properties"
    bak1path = "bak1/database"
    bak2path = "bak2/database"
    frequency = 10000
  }

  balance.history.lookup = false
}

node.discovery = {
  enable = false
  persist = true
  external.ip = 127.0.0.1
}

node.backup {
  port = 10001
  priority = 8
  keepAliveInterval = 3000
  members = []
}

crypto {
  engine = "eckey"
}

node {
  trustNode = "127.0.0.1:50051"
  walletExtensionApi = true
  listen.port = 16666
  connection.timeout = 2
  fetchBlock.timeout = 200
  tcpNettyWorkThreadNum = 0
  udpNettyWorkThreadNum = 1
  maxConnections = 30
  minConnections = 8
  minActiveConnections = 3
  maxConnectionsWithSameIp = 2
  maxHttpConnectNumber = 50
  minParticipationRate = 15
  isOpenFullTcpDisconnect = false
  inactiveThreshold = 600

  p2p {
    version = 1  # use any unique number for your private net
  }

  active = []
  passive = []
  fastForward = []

  http {
    fullNodeEnable = true
    fullNodePort = 16667
    solidityEnable = true
    solidityPort = 16668
  }

  rpc {
    enable = true
    port = 50051
    solidityEnable = true
    solidityPort = 50061
    maxConnectionIdleInMillis = 60000
    minEffectiveConnection = 1
  }

  jsonrpc {
    httpFullNodeEnable = true
    httpFullNodePort = 8545
    httpSolidityEnable = true
    httpSolidityPort = 8555
    maxBlockRange = 5000
    maxSubTopics = 1000
  }

  dns {
    treeUrls = []
  }
}

