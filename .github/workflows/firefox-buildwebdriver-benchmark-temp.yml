name: Firefox buildWebDriver benchmark (temp)

on:
  workflow_dispatch:
    inputs:
      iterations:
        description: Benchmark iterations per scenario
        required: false
        default: '7'
  pull_request:
    paths:
      - .github/workflows/firefox-buildwebdriver-benchmark-temp.yml
      - .github/scripts/firefox-buildwebdriver-benchmark.ts

permissions:
  contents: read

env:
  CANDIDATE_REF: codex/firefox-xpi-comment-metadata-spike

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    container:
      image: ghcr.io/metamask/metamask-extension-e2e-image:v24.13.0
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: main
            ref: main
          - name: candidate
            ref: codex/firefox-xpi-comment-metadata-spike
    name: benchmark-${{ matrix.name }}
    env:
      HEADLESS: false
      INFURA_PROJECT_ID: ${{ secrets.INFURA_PROJECT_ID }}
      ITERATIONS: ${{ inputs.iterations || '7' }}
      SELENIUM_BROWSER: firefox
    steps:
      - name: Checkout harness branch
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Copy benchmark script to temp
        run: cp .github/scripts/firefox-buildwebdriver-benchmark.ts /tmp/

      - name: Checkout target ref
        uses: actions/checkout@v4
        with:
          ref: ${{ matrix.ref }}
          clean: true
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: yarn

      - name: Install dependencies
        run: |
          corepack enable
          yarn install --immutable

      - name: Create .metamaskrc
        run: |
          cp .metamaskrc.dist .metamaskrc
          echo "INFURA_PROJECT_ID=${INFURA_PROJECT_ID}" >> .metamaskrc

      - name: Configure Xvfb
        run: Xvfb -ac :99 -screen 0 1280x1024x16 &

      - name: Build Firefox test bundle
        run: yarn build:test:mv2

      - name: Run buildWebDriver benchmark
        env:
          DISPLAY: :99
        run: |
          mkdir -p test-artifacts/benchmarks
          yarn tsx /tmp/firefox-buildwebdriver-benchmark.ts \
            --iterations "${ITERATIONS}" \
            --ref-label "${{ matrix.name }}" \
            --out "test-artifacts/benchmarks/firefox-buildwebdriver-${{ matrix.name }}.json"

      - name: Upload benchmark artifact
        uses: actions/upload-artifact@v4
        with:
          name: firefox-buildwebdriver-${{ matrix.name }}
          path: test-artifacts/benchmarks/firefox-buildwebdriver-${{ matrix.name }}.json
          retention-days: 7

  compare:
    runs-on: ubuntu-latest
    needs: benchmark
    if: ${{ always() }}
    steps:
      - name: Download benchmark artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: firefox-buildwebdriver-*
          path: benchmark-results
          merge-multiple: true

      - name: Compare results
        run: |
          node <<'EOF' >> "$GITHUB_STEP_SUMMARY"
          const fs = require('fs');
          const path = require('path');

          const main = JSON.parse(
            fs.readFileSync(
              path.join('benchmark-results', 'firefox-buildwebdriver-main.json'),
              'utf8',
            ),
          );
          const candidate = JSON.parse(
            fs.readFileSync(
              path.join(
                'benchmark-results',
                'firefox-buildwebdriver-candidate.json',
              ),
              'utf8',
            ),
          );

          const scenarios = ['cold', 'warmUnchanged', 'warmManifestUpdate'];
          const metrics = ['mean', 'median', 'p95'];
          const phases = [
            ['builderBuildMs', 'builder.build'],
            ['addonSetupMs', 'addonSetup'],
            ['installExtensionMs', 'installExtension'],
            ['getInternalIdMs', 'getInternalId'],
            ['totalMs', 'total'],
          ];

          console.log('# Firefox buildWebDriver benchmark');
          console.log('');
          console.log(`Main SHA: \`${main.gitSha}\``);
          console.log(`Candidate SHA: \`${candidate.gitSha}\``);
          console.log('');

          for (const scenario of scenarios) {
            console.log(`## ${scenario}`);
            console.log('');
            for (const metric of metrics) {
              console.log(`### ${metric}`);
              console.log('');
              console.log('| Phase | main | candidate | delta |');
              console.log('| --- | ---: | ---: | ---: |');
              for (const [key, label] of phases) {
                const mainValue = main.scenarios[scenario].summary[key][metric];
                const candidateValue =
                  candidate.scenarios[scenario].summary[key][metric];
                const delta = candidateValue - mainValue;
                const formattedDelta =
                  `${delta >= 0 ? '+' : ''}${delta.toFixed(1)} ms`;
                console.log(
                  `| ${label} | ${mainValue.toFixed(1)} ms | ${candidateValue.toFixed(
                    1,
                  )} ms | ${formattedDelta} |`,
                );
              }
              console.log('');
            }
          }
          EOF
