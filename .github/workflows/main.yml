# TEMPORARY memory-profiling experiment (lives in main.yml only on a
# trigger-ci-* branch; never merge this to origin/main).
# Measures peak memory on ubuntu-latest for several LavaMoat plugin configs and
# workloads, to find where the background-graph wrapping increases memory.
name: mem-experiment

on:
  workflow_dispatch:
  push:
    branches:
      - '**'

# Never let this run on the real repo's default branches.
permissions:
  contents: read

env:
  INFURA_PROJECT_ID: '00000000000'
  INFURA_PROD_PROJECT_ID: '00000000000'
  SEGMENT_PROD_WRITE_KEY: '00000000000'
  # Pre-PR plugin source lives at this merge-base commit.
  PRE_PR_SHA: 3924472a09bcafbf74fc5f882500c41f9f7481aa
  PLUGIN_PATH: development/webpack/utils/plugins/LavamoatPlugin/index.ts

jobs:
  measure:
    name: ${{ matrix.label }}
    runs-on: ubuntu-latest
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        include:
          # Decisive A/B: both trees run the EXACT command that OOM'd in real CI
          # (build-dist-webpack = `yarn webpack:lavamoat:build --zip --stats
          # --bundleAnalyzer`, per run-build.yml line 92), at the HISTORICAL heap
          # configs. RSS at a generous ceiling cannot detect a heap-demand
          # regression (lazy GC balloons any build to the ceiling), so:
          #   - default/4096 jobs are pass/fail probes at the real boundary
          #   - tracegc jobs (12GB ceiling, --trace-gc) yield the quantitative
          #     live-set (max post-Mark-Compact used heap), GC-noise-free.
          # node_options: '' = leave script untouched (faithful pre-PR default);
          # otherwise the script's NODE_OPTIONS value is rewritten wholesale.
          - label: A-prebase-default
            ref: 3924472a09bcafbf74fc5f882500c41f9f7481aa
            node_options: ''
            command: 'yarn webpack:lavamoat:build --zip --stats --bundleAnalyzer'
          - label: B-pr-default
            ref: ''
            # Remove the heap flag added by the PR's fix commits => reproduces
            # the tree as it was when the original OOM happened (V8 default).
            node_options: '--no-deprecation'
            command: 'yarn webpack:lavamoat:build --zip --stats --bundleAnalyzer'
          - label: C-prebase-4096
            ref: 3924472a09bcafbf74fc5f882500c41f9f7481aa
            node_options: '--no-deprecation --max-old-space-size=4096'
            command: 'yarn webpack:lavamoat:build --zip --stats --bundleAnalyzer'
          - label: D-pr-4096
            ref: ''
            node_options: '--no-deprecation --max-old-space-size=4096'
            command: 'yarn webpack:lavamoat:build --zip --stats --bundleAnalyzer'
          - label: E-prebase-tracegc
            ref: 3924472a09bcafbf74fc5f882500c41f9f7481aa
            node_options: '--no-deprecation --max-old-space-size=12288 --trace-gc'
            command: 'yarn webpack:lavamoat:build --zip --stats --bundleAnalyzer'
          - label: F-pr-tracegc
            ref: ''
            node_options: '--no-deprecation --max-old-space-size=12288 --trace-gc'
            command: 'yarn webpack:lavamoat:build --zip --stats --bundleAnalyzer'
    steps:
      - name: Checkout and setup environment
        uses: MetaMask/action-checkout-and-setup@v3
        with:
          is-high-risk-environment: false
          skip-allow-scripts: true
          # prebase jobs check out the FULL tree at PRE_PR_SHA (faithful
          # pre-PR baseline: old plugin, old package.json, old lockfile).
          # Empty ref => the trigger branch HEAD (PR).
          ref: ${{ matrix.ref }}

      - name: Confirm checked-out tree
        run: |
          set -euo pipefail
          echo "=== HEAD ==="
          git rev-parse HEAD
          echo "=== expected ref: '${{ matrix.ref }}' (empty = trigger HEAD) ==="
          if [ -n "${{ matrix.ref }}" ]; then
            if [ "$(git rev-parse HEAD)" != "${{ matrix.ref }}" ]; then
              echo "::error::checked-out HEAD does not match requested ref"
              exit 1
            fi
            echo "OK: tree is at PRE_PR_SHA"
          fi
          echo "=== plugin runChecks/service-worker lines ==="
          grep -nE "runChecks:|nullUnsafeEntries|service-worker" "$PLUGIN_PATH" | head
          echo "=== webpack:lavamoat script (line 13) ==="
          grep -nE '"webpack:lavamoat":' package.json | head -1

      - name: Report available memory
        run: |
          echo "=== /proc/meminfo (top) ==="
          head -3 /proc/meminfo
          echo "=== nproc ==="
          nproc

      - name: Set node flags variant
        env:
          NEW_NODE_OPTIONS: ${{ matrix.node_options }}
        run: |
          set -euo pipefail
          if [ -z "$NEW_NODE_OPTIONS" ]; then
            echo "Leaving webpack:lavamoat script untouched (faithful default)"
          else
            # Rewrite the `NODE_OPTIONS=<value> lavamoat` prefix of the script to
            # invoke node directly with CLI flags. This is required because
            # --trace-gc is NOT on Node's NODE_OPTIONS allowlist (node exits with
            # "not allowed in NODE_OPTIONS"); direct CLI flags have no allowlist.
            # Target lavamoat's real JS entrypoint (bin: src/cli.js; NOT the
            # .bin shim, which is a shell script node can't execute). Both trees
            # pin lavamoat@10.0.5 so the path is identical across the A/B.
            node -e '
              const fs = require("fs");
              const j = JSON.parse(fs.readFileSync("package.json", "utf8"));
              const s = j.scripts["webpack:lavamoat"];
              const out = s.replace(
                /NODE_OPTIONS=("[^"]*"|\x27[^\x27]*\x27|\S+) lavamoat /,
                `node ${process.env.NEW_NODE_OPTIONS} node_modules/lavamoat/src/cli.js `,
              );
              if (out === s) throw new Error("script prefix rewrite did not match");
              j.scripts["webpack:lavamoat"] = out;
              fs.writeFileSync("package.json", JSON.stringify(j, null, 2) + "\n");
            '
          fi
          grep -nE '"webpack:lavamoat":' package.json | head -1

      - name: Compile webpack launcher
        run: yarn webpack:tsc

      - name: Run workload and measure heap
        env:
          # Passed via env so shell quoting inside the command never collides
          # with YAML/step quoting.
          WORKLOAD_CMD: ${{ matrix.command }}
        run: |
          set -o pipefail

          echo "=== workload ==="
          echo "$WORKLOAD_CMD"

          totalkb=$(grep MemTotal /proc/meminfo | grep -oE '[0-9]+')

          # Secondary metric: sample system memory pressure once per second.
          (
            while true; do
              grep MemAvailable /proc/meminfo | grep -oE '[0-9]+'
              sleep 1
            done
          ) > mem-samples.log &
          sampler=$!

          set +e
          printf '%s\n' "$WORKLOAD_CMD" > workload.sh
          # All workload output (incl. V8 --trace-gc lines and OOM crash dumps,
          # which go to stderr) lands in workload.log; GNU time report in time.log.
          /usr/bin/time -v -o time.log bash workload.sh > workload.log 2>&1
          code=$?
          set -e

          kill "$sampler" 2>/dev/null || true

          echo "=== RESULTS (${{ matrix.label }}) ==="
          echo "EXIT_CODE=$code"

          # PRIMARY metric: did V8 hit its heap limit?
          if grep -qE "Reached heap limit|JavaScript heap out of memory" workload.log; then
            echo "V8_OOM=true"
            echo "--- OOM context ---"
            grep -B2 -A6 "heap out of memory" workload.log | head -30 || true
          else
            echo "V8_OOM=false"
          fi

          # QUANTITATIVE metric (tracegc jobs): per Mark-Compact GC line
          # "... Mark-Compact[ (reduce)] PRE (COMMIT) -> POST (COMMIT) MB ..."
          #   max PRE  = peak heap demand right before a full GC
          #   max POST = peak live set (what the build truly needs)
          if grep -qE "Mark-Compact|Mark-sweep" workload.log; then
            grep -E "Mark-Compact|Mark-sweep" workload.log \
              | sed -nE 's/.* ([0-9.]+) \(([0-9.]+)\) -> ([0-9.]+) \(([0-9.]+)\) MB.*/\1 \3 \4/p' \
              | awk '{if($1>a)a=$1; if($2>b)b=$2; if($3>c)c=$3}
                     END{printf "MAX_HEAP_BEFORE_FULLGC_MB=%.0f\nMAX_LIVE_SET_MB=%.0f\nMAX_COMMITTED_MB=%.0f\n", a, b, c}'
          fi

          # Secondary: system pressure and single-largest-process RSS.
          min_avail_kb=$(awk 'NR==1||$1<m{m=$1} END{print m+0}' mem-samples.log)
          used_peak_kb=$(( totalkb - min_avail_kb ))
          awk -v u="$used_peak_kb" 'BEGIN{printf "PEAK_USED_GB=%.2f (system)\n", u/1024/1024}'
          trmax=$(grep -E "Maximum resident set size" time.log | grep -oE '[0-9]+' | tail -1)
          if [ -n "${trmax:-}" ]; then
            awk -v kb="$trmax" 'BEGIN{printf "TIME_V_MAXRSS_GB=%.2f\n", kb/1024/1024}'
          fi

          echo "=== tail of workload.log ==="
          grep -vE "Scavenge|Minor GC" workload.log | tail -25 || true

          if [ "$code" -ne 0 ]; then
            echo "::warning::${{ matrix.label }} exited non-zero ($code)"
          fi

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ matrix.label }}
          path: |
            workload.log
            time.log
            mem-samples.log
          retention-days: 3
