name: Main

on:
  push:
    branches:
      - main
      - master
      - Version-v*
      - trigger-ci*
      - prep-deps*
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
  merge_group:

jobs:
  prep-deps:
    runs-on: ubuntu-latest
    steps:
      - name: Setup environment
        uses: metamask/github-tools/.github/actions/checkout-and-setup@caching2
        with:
          should-save-node-modules: 'true'

  cache-yes:
    runs-on: ubuntu-latest
    needs: prep-deps
    steps:
      - name: Setup environment
        uses: metamask/github-tools/.github/actions/checkout-and-setup@caching2

      - run: ls

  cache-no:
    runs-on: ubuntu-latest
    steps:
      - name: Setup environment
        uses: metamask/github-tools/.github/actions/checkout-and-setup@caching2

      - run: ls
