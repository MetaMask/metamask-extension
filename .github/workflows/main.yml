# TEMPORARY memory-profiling experiment (lives in main.yml only on a
# trigger-ci-* branch; never merge this to origin/main).
# Measures peak memory on ubuntu-latest for several LavaMoat plugin configs and
# workloads, to find where the background-graph wrapping increases memory.
name: mem-experiment

on:
  workflow_dispatch:
  push:
    branches:
      - '**'

# Never let this run on the real repo's default branches.
permissions:
  contents: read

env:
  INFURA_PROJECT_ID: '00000000000'
  INFURA_PROD_PROJECT_ID: '00000000000'
  SEGMENT_PROD_WRITE_KEY: '00000000000'
  # Pre-PR plugin source lives at this merge-base commit.
  PRE_PR_SHA: 3924472a09bcafbf74fc5f882500c41f9f7481aa
  PLUGIN_PATH: development/webpack/utils/plugins/LavamoatPlugin/index.ts

jobs:
  measure:
    name: ${{ matrix.label }}
    runs-on: ubuntu-latest
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        include:
          # plugin: pr | prebase | norunchecks
          # workload command runs after webpack:tsc
          - label: 1-prebase-build
            plugin: prebase
            heap: '8192'
            command: 'yarn webpack:lavamoat:build --no-stats'
          - label: 2-pr-build
            plugin: pr
            heap: '8192'
            command: 'yarn webpack:lavamoat:build --no-stats'
          - label: 3-pr-build-norunchecks
            plugin: norunchecks
            heap: '8192'
            command: 'yarn webpack:lavamoat:build --no-stats'
          - label: 4-prebase-policy-single
            plugin: prebase
            heap: '8192'
            command: 'yarn webpack:lavamoat:policy:build'
          - label: 5-pr-policy-single
            plugin: pr
            heap: '8192'
            command: 'yarn webpack:lavamoat:policy:build'
          - label: 6-pr-policy-single-norunchecks
            plugin: norunchecks
            heap: '8192'
            command: 'yarn webpack:lavamoat:policy:build'
          - label: 7-prebase-policy-mv3-concurrent
            plugin: prebase
            heap: '8192'
            # Direct concurrently at 8192 each (bypasses the Option-2-patched
            # policy:mv3 script, whose inner 4096 assignment would shadow ours).
            # Reproduces the pre-Option-2 4x8=32GB runner-OOM scenario.
            command: "concurrently 'WEBPACK_LAVAMOAT_HEAP=8192 yarn webpack:lavamoat:build --generatePolicy' 'WEBPACK_LAVAMOAT_HEAP=8192 yarn webpack:lavamoat:build --generatePolicy --type flask' 'WEBPACK_LAVAMOAT_HEAP=8192 yarn webpack:lavamoat:build --generatePolicy --type beta' 'WEBPACK_LAVAMOAT_HEAP=8192 yarn webpack:lavamoat:build --generatePolicy --type experimental' --kill-others-on-fail"
          - label: 8-pr-policy-mv3-concurrent
            plugin: pr
            heap: '8192'
            command: "concurrently 'WEBPACK_LAVAMOAT_HEAP=8192 yarn webpack:lavamoat:build --generatePolicy' 'WEBPACK_LAVAMOAT_HEAP=8192 yarn webpack:lavamoat:build --generatePolicy --type flask' 'WEBPACK_LAVAMOAT_HEAP=8192 yarn webpack:lavamoat:build --generatePolicy --type beta' 'WEBPACK_LAVAMOAT_HEAP=8192 yarn webpack:lavamoat:build --generatePolicy --type experimental' --kill-others-on-fail"
          - label: 9-pr-policy-mv3-concurrent-norunchecks
            plugin: norunchecks
            heap: '8192'
            command: "concurrently 'WEBPACK_LAVAMOAT_HEAP=8192 yarn webpack:lavamoat:build --generatePolicy' 'WEBPACK_LAVAMOAT_HEAP=8192 yarn webpack:lavamoat:build --generatePolicy --type flask' 'WEBPACK_LAVAMOAT_HEAP=8192 yarn webpack:lavamoat:build --generatePolicy --type beta' 'WEBPACK_LAVAMOAT_HEAP=8192 yarn webpack:lavamoat:build --generatePolicy --type experimental' --kill-others-on-fail"
    steps:
      - name: Checkout and setup environment
        uses: MetaMask/action-checkout-and-setup@v3
        with:
          is-high-risk-environment: false
          skip-allow-scripts: true

      - name: Report available memory
        run: |
          echo "=== /proc/meminfo (top) ==="
          head -3 /proc/meminfo
          echo "=== nproc ==="
          nproc

      - name: Apply plugin variant
        run: |
          set -euo pipefail
          case "${{ matrix.plugin }}" in
            pr)
              echo "Using PR plugin as-is"
              ;;
            prebase)
              echo "Restoring pre-PR plugin from $PRE_PR_SHA"
              git fetch --depth=1 origin "$PRE_PR_SHA" || git fetch origin "$PRE_PR_SHA" || true
              git show "$PRE_PR_SHA:$PLUGIN_PATH" > "$PLUGIN_PATH"
              ;;
            norunchecks)
              echo "Patching runChecks: true -> false"
              sed -i 's/runChecks: true/runChecks: false/' "$PLUGIN_PATH"
              ;;
          esac
          echo "=== runChecks + service-worker lines ==="
          grep -nE "runChecks:|unsafeEntries|nullUnsafeEntries|service-worker" "$PLUGIN_PATH" | head

      - name: Compile webpack launcher
        run: yarn webpack:tsc

      - name: Measure peak RSS
        env:
          WEBPACK_LAVAMOAT_HEAP: ${{ matrix.heap }}
          # Passed via env to avoid any YAML/shell quote nesting issues with the
          # single quotes inside `concurrently '...' '...'` commands.
          WORKLOAD_CMD: ${{ matrix.command }}
        run: |
          set -o pipefail

          echo "=== workload ==="
          echo "$WORKLOAD_CMD"
          echo "=== heap=${WEBPACK_LAVAMOAT_HEAP} ==="

          totalkb=$(grep MemTotal /proc/meminfo | grep -oE '[0-9]+')

          # Background sampler: records the lowest MemAvailable (peak pressure)
          # and the highest summed RSS of all node processes. Handles both single
          # and concurrent workloads correctly (time -v maxRSS only covers one child).
          min_avail_kb=$totalkb
          max_node_rss_kb=0
          (
            while true; do
              avail=$(grep MemAvailable /proc/meminfo | grep -oE '[0-9]+')
              node_rss=$(ps -A -o rss=,comm= 2>/dev/null | awk '$2 ~ /node/ {s+=$1} END{print s+0}')
              echo "$avail $node_rss"
              sleep 1
            done
          ) > mem-samples.log &
          sampler=$!

          set +e
          # Write workload to a script file so quoting is never an issue.
          printf '%s\n' "$WORKLOAD_CMD" > workload.sh
          /usr/bin/time -v bash workload.sh 2> time.log
          code=$?
          set -e

          kill "$sampler" 2>/dev/null || true

          echo "=== command exit code: $code ==="

          # Derive peak pressure from samples.
          min_avail_kb=$(awk 'NR==1||$1<m{m=$1} END{print m+0}' mem-samples.log)
          max_node_rss_kb=$(awk '$2>m{m=$2} END{print m+0}' mem-samples.log)
          used_peak_kb=$(( totalkb - min_avail_kb ))

          echo "=== RESULTS (${{ matrix.label }}) ==="
          awk -v t="$totalkb" 'BEGIN{printf "MemTotal=%.2fGB\n", t/1024/1024}'
          awk -v u="$used_peak_kb" 'BEGIN{printf "PEAK_USED_GB=%.2f (MemTotal - min MemAvailable)\n", u/1024/1024}'
          awk -v n="$max_node_rss_kb" 'BEGIN{printf "PEAK_NODE_RSS_SUM_GB=%.2f\n", n/1024/1024}'
          trmax=$(grep -E "Maximum resident set size" time.log | grep -oE '[0-9]+' | tail -1)
          if [ -n "${trmax:-}" ]; then
            awk -v kb="$trmax" 'BEGIN{printf "TIME_V_MAXRSS_GB=%.2f (single largest child only)\n", kb/1024/1024}'
          fi
          echo "EXIT_CODE=$code"

          echo "=== tail of time.log ==="
          tail -15 time.log || true

          if [ "$code" -ne 0 ]; then
            echo "::warning::${{ matrix.label }} exited non-zero ($code) — likely OOM/kill"
          fi
