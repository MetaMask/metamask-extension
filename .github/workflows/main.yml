# TEMPORARY memory-profiling experiment (lives in main.yml only on a
# trigger-ci-* branch; never merge this to origin/main).
# Measures peak memory on ubuntu-latest for several LavaMoat plugin configs and
# workloads, to find where the background-graph wrapping increases memory.
name: mem-experiment

on:
  workflow_dispatch:
  push:
    branches:
      - '**'

# Never let this run on the real repo's default branches.
permissions:
  contents: read

env:
  INFURA_PROJECT_ID: '00000000000'
  INFURA_PROD_PROJECT_ID: '00000000000'
  SEGMENT_PROD_WRITE_KEY: '00000000000'
  # Pre-PR plugin source lives at this merge-base commit.
  PRE_PR_SHA: 3924472a09bcafbf74fc5f882500c41f9f7481aa
  PLUGIN_PATH: development/webpack/utils/plugins/LavamoatPlugin/index.ts

jobs:
  measure:
    name: ${{ matrix.label }}
    runs-on: ubuntu-latest
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        include:
          # plugin: pr | prebase | norunchecks
          #   prebase => full-tree checkout at PRE_PR_SHA (ref set below);
          #              the pre-PR webpack:lavamoat script is then patched to
          #              add --max-old-space-size=8192 so heap matches all jobs.
          #   pr       => tree at trigger branch HEAD, plugin unmodified.
          #   norunchecks => tree at HEAD, plugin patched runChecks true->false.
          # Concurrent jobs call `yarn exec concurrently --` so the binary
          # resolves from node_modules/.bin (bare `concurrently` = exit 127).
          - label: 1-prebase-build
            plugin: prebase
            ref: 3924472a09bcafbf74fc5f882500c41f9f7481aa
            command: 'yarn webpack:lavamoat:build --no-stats'
          - label: 2-pr-build
            plugin: pr
            ref: ''
            command: 'yarn webpack:lavamoat:build --no-stats'
          - label: 3-pr-build-norunchecks
            plugin: norunchecks
            ref: ''
            command: 'yarn webpack:lavamoat:build --no-stats'
          - label: 4-prebase-policy-single
            plugin: prebase
            ref: 3924472a09bcafbf74fc5f882500c41f9f7481aa
            command: 'yarn webpack:lavamoat:policy:build'
          - label: 5-pr-policy-single
            plugin: pr
            ref: ''
            command: 'yarn webpack:lavamoat:policy:build'
          - label: 6-pr-policy-single-norunchecks
            plugin: norunchecks
            ref: ''
            command: 'yarn webpack:lavamoat:policy:build'
          - label: 7-prebase-policy-mv3-concurrent
            plugin: prebase
            ref: 3924472a09bcafbf74fc5f882500c41f9f7481aa
            # 4x8=32GB concurrent policy gen => reproduces pre-Option-2 runner OOM.
            command: "yarn exec concurrently -- 'WEBPACK_LAVAMOAT_HEAP=8192 yarn webpack:lavamoat:build --generatePolicy' 'WEBPACK_LAVAMOAT_HEAP=8192 yarn webpack:lavamoat:build --generatePolicy --type flask' 'WEBPACK_LAVAMOAT_HEAP=8192 yarn webpack:lavamoat:build --generatePolicy --type beta' 'WEBPACK_LAVAMOAT_HEAP=8192 yarn webpack:lavamoat:build --generatePolicy --type experimental' --kill-others-on-fail"
          - label: 8-pr-policy-mv3-concurrent
            plugin: pr
            ref: ''
            command: "yarn exec concurrently -- 'WEBPACK_LAVAMOAT_HEAP=8192 yarn webpack:lavamoat:build --generatePolicy' 'WEBPACK_LAVAMOAT_HEAP=8192 yarn webpack:lavamoat:build --generatePolicy --type flask' 'WEBPACK_LAVAMOAT_HEAP=8192 yarn webpack:lavamoat:build --generatePolicy --type beta' 'WEBPACK_LAVAMOAT_HEAP=8192 yarn webpack:lavamoat:build --generatePolicy --type experimental' --kill-others-on-fail"
          - label: 9-pr-policy-mv3-concurrent-4096
            plugin: pr
            ref: ''
            # 4x4=16GB (the Option-2 config) => should PASS, proving the fix.
            command: "yarn exec concurrently -- 'WEBPACK_LAVAMOAT_HEAP=4096 yarn webpack:lavamoat:build --generatePolicy' 'WEBPACK_LAVAMOAT_HEAP=4096 yarn webpack:lavamoat:build --generatePolicy --type flask' 'WEBPACK_LAVAMOAT_HEAP=4096 yarn webpack:lavamoat:build --generatePolicy --type beta' 'WEBPACK_LAVAMOAT_HEAP=4096 yarn webpack:lavamoat:build --generatePolicy --type experimental' --kill-others-on-fail"
    steps:
      - name: Checkout and setup environment
        uses: MetaMask/action-checkout-and-setup@v3
        with:
          is-high-risk-environment: false
          skip-allow-scripts: true
          # prebase jobs check out the FULL tree at PRE_PR_SHA (faithful
          # pre-PR baseline: old plugin, old package.json, old lockfile).
          # Empty ref => the trigger branch HEAD (PR).
          ref: ${{ matrix.ref }}

      - name: Confirm checked-out tree
        run: |
          set -euo pipefail
          echo "=== HEAD ==="
          git rev-parse HEAD
          echo "=== expected ref: '${{ matrix.ref }}' (empty = trigger HEAD) ==="
          if [ -n "${{ matrix.ref }}" ]; then
            if [ "$(git rev-parse HEAD)" != "${{ matrix.ref }}" ]; then
              echo "::error::checked-out HEAD does not match requested ref"
              exit 1
            fi
            echo "OK: tree is at PRE_PR_SHA"
          fi
          echo "=== plugin runChecks/service-worker lines ==="
          grep -nE "runChecks:|nullUnsafeEntries|service-worker" "$PLUGIN_PATH" | head
          echo "=== webpack:lavamoat script (line 13) ==="
          grep -nE '"webpack:lavamoat":' package.json | head -1

      - name: Report available memory
        run: |
          echo "=== /proc/meminfo (top) ==="
          head -3 /proc/meminfo
          echo "=== nproc ==="
          nproc

      - name: Apply variant patches
        run: |
          set -euo pipefail
          case "${{ matrix.plugin }}" in
            pr)
              echo "PR tree, plugin unmodified"
              ;;
            prebase)
              # Pre-PR webpack:lavamoat has NO --max-old-space-size flag (uses
              # V8 default). Inject 8192 so heap matches every other job and the
              # only variable under test is the plugin/tree, not the heap size.
              echo "Patching pre-PR webpack:lavamoat heap -> 8192"
              node -e '
                const fs = require("fs");
                const p = "package.json";
                const j = JSON.parse(fs.readFileSync(p, "utf8"));
                const s = j.scripts["webpack:lavamoat"];
                if (!s.includes("max-old-space-size")) {
                  j.scripts["webpack:lavamoat"] = s.replace(
                    "NODE_OPTIONS=--no-deprecation",
                    "NODE_OPTIONS=\"--no-deprecation --max-old-space-size=8192\"",
                  );
                }
                fs.writeFileSync(p, JSON.stringify(j, null, 2) + "\n");
              '
              grep -nE '"webpack:lavamoat":' package.json | head -1
              ;;
            norunchecks)
              echo "Patching runChecks: true -> false"
              sed -i 's/runChecks: true/runChecks: false/' "$PLUGIN_PATH"
              grep -nE "runChecks:" "$PLUGIN_PATH" | head
              ;;
          esac

      - name: Compile webpack launcher
        run: yarn webpack:tsc

      - name: Measure peak RSS
        env:
          # Passed via env to avoid any YAML/shell quote nesting issues with the
          # single quotes inside `concurrently '...' '...'` commands.
          WORKLOAD_CMD: ${{ matrix.command }}
        run: |
          set -o pipefail

          echo "=== workload ==="
          echo "$WORKLOAD_CMD"

          totalkb=$(grep MemTotal /proc/meminfo | grep -oE '[0-9]+')

          # Background sampler: records the lowest MemAvailable (peak system
          # pressure) and the highest summed RSS of all node processes. The node
          # RSS is summed straight from /proc/*/status (VmRSS) for every process
          # whose /proc/*/comm is "node" — reliable for both single and
          # concurrent workloads (time -v maxRSS only covers one child).
          (
            while true; do
              avail=$(grep MemAvailable /proc/meminfo | grep -oE '[0-9]+')
              node_rss=0
              for c in /proc/[0-9]*/comm; do
                if [ "$(cat "$c" 2>/dev/null)" = "node" ]; then
                  d=$(dirname "$c")
                  r=$(grep -m1 VmRSS "$d/status" 2>/dev/null | grep -oE '[0-9]+')
                  node_rss=$(( node_rss + ${r:-0} ))
                fi
              done
              echo "$avail $node_rss"
              sleep 1
            done
          ) > mem-samples.log &
          sampler=$!

          set +e
          # Write workload to a script file so quoting is never an issue.
          printf '%s\n' "$WORKLOAD_CMD" > workload.sh
          /usr/bin/time -v bash workload.sh 2> time.log
          code=$?
          set -e

          kill "$sampler" 2>/dev/null || true

          echo "=== command exit code: $code ==="

          # Derive peak pressure from samples.
          min_avail_kb=$(awk 'NR==1||$1<m{m=$1} END{print m+0}' mem-samples.log)
          max_node_rss_kb=$(awk '$2>m{m=$2} END{print m+0}' mem-samples.log)
          used_peak_kb=$(( totalkb - min_avail_kb ))

          echo "=== RESULTS (${{ matrix.label }}) ==="
          awk -v t="$totalkb" 'BEGIN{printf "MemTotal=%.2fGB\n", t/1024/1024}'
          awk -v u="$used_peak_kb" 'BEGIN{printf "PEAK_USED_GB=%.2f (MemTotal - min MemAvailable)\n", u/1024/1024}'
          awk -v n="$max_node_rss_kb" 'BEGIN{printf "PEAK_NODE_RSS_SUM_GB=%.2f\n", n/1024/1024}'
          trmax=$(grep -E "Maximum resident set size" time.log | grep -oE '[0-9]+' | tail -1)
          if [ -n "${trmax:-}" ]; then
            awk -v kb="$trmax" 'BEGIN{printf "TIME_V_MAXRSS_GB=%.2f (single largest child only)\n", kb/1024/1024}'
          fi
          echo "EXIT_CODE=$code"

          echo "=== tail of time.log ==="
          tail -15 time.log || true

          if [ "$code" -ne 0 ]; then
            echo "::warning::${{ matrix.label }} exited non-zero ($code) — likely OOM/kill"
          fi
