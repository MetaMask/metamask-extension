name: Main

on:
  push:
    branches:
      - main
      - master
      - Version-v*
      - trigger-ci*
      - prep-deps*
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
  merge_group:

jobs:
  prep-deps:
    runs-on: ubuntu-latest
    steps:
      - name: Setup environment
        uses: metamask/github-tools/.github/actions/checkout-and-setup@caching2
        with:
          is-high-risk-environment: 'false'
          cache-node-modules: 'true'

  high-risk:
    runs-on: ubuntu-latest
    needs: prep-deps
    steps:
      - name: Setup environment
        uses: metamask/github-tools/.github/actions/checkout-and-setup@caching2
        with:
          is-high-risk-environment: 'true'

  low-risk:
    runs-on: ubuntu-latest
    needs: prep-deps
    steps:
      - name: Setup environment
        uses: metamask/github-tools/.github/actions/checkout-and-setup@caching2
        with:
          is-high-risk-environment: 'false'

  low-risk-immediate:
    runs-on: ubuntu-latest
    steps:
      - name: Setup environment
        uses: metamask/github-tools/.github/actions/checkout-and-setup@caching2
        with:
          is-high-risk-environment: 'false'

  no-input:
    runs-on: ubuntu-latest
    steps:
      - name: Setup environment
        uses: metamask/github-tools/.github/actions/checkout-and-setup@caching2

  bad-string:
    runs-on: ubuntu-latest
    steps:
      - name: Setup environment
        uses: metamask/github-tools/.github/actions/checkout-and-setup@caching2
        with:
          is-high-risk-environment: 'falsee'

  bool-true:
    runs-on: ubuntu-latest
    steps:
      - name: Setup environment
        uses: metamask/github-tools/.github/actions/checkout-and-setup@caching2
        with:
          is-high-risk-environment: true

  bool-false:
    runs-on: ubuntu-latest
    steps:
      - name: Setup environment
        uses: metamask/github-tools/.github/actions/checkout-and-setup@caching2
        with:
          is-high-risk-environment: false

  one:
    runs-on: ubuntu-latest
    steps:
      - name: Setup environment
        uses: metamask/github-tools/.github/actions/checkout-and-setup@caching2
        with:
          is-high-risk-environment: 1
