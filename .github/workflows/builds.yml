name: Builds

on:
  workflow_call:
    inputs:
      builds-from-run:
        required: true
        type: string

jobs:
  build-dist-browserify:
    name: build-dist-browserify
    uses: ./.github/workflows/run-build.yml
    with:
      build-name: build-dist-browserify
      build-command: yarn build dist
      builds-from-run: ${{ inputs.builds-from-run }}
    secrets: inherit

  build-dist-mv2-browserify:
    name: build-dist-mv2-browserify
    uses: ./.github/workflows/run-build.yml
    with:
      build-name: build-dist-mv2-browserify
      build-command: yarn build dist
      builds-from-run: ${{ inputs.builds-from-run }}
    secrets: inherit

  build-dist-webpack:
    name: build-dist-webpack
    uses: ./.github/workflows/run-build.yml
    with:
      is-high-risk-environment: false
      build-name: build-dist-webpack
      build-command: yarn webpack:lavamoat:build
      builds-from-run: ${{ inputs.builds-from-run }}
      zip: true
    secrets: inherit

  build-dist-mv2-webpack:
    name: build-dist-mv2-webpack
    uses: ./.github/workflows/run-build.yml
    with:
      is-high-risk-environment: false
      build-name: build-dist-mv2-webpack
      build-command: yarn webpack:lavamoat:build:mv2
      builds-from-run: ${{ inputs.builds-from-run }}
      zip: true
    secrets: inherit

  # Beta builds (4 jobs)
  build-beta-browserify:
    name: build-beta-browserify
    uses: ./.github/workflows/run-build.yml
    with:
      build-name: build-beta-browserify
      build-command: yarn build --build-type beta dist
      builds-from-run: ${{ inputs.builds-from-run }}
    secrets: inherit

  build-beta-mv2-browserify:
    name: build-beta-mv2-browserify
    uses: ./.github/workflows/run-build.yml
    with:
      build-name: build-beta-mv2-browserify
      build-command: yarn build --build-type beta dist
      builds-from-run: ${{ inputs.builds-from-run }}
    secrets: inherit

  build-beta-webpack:
    name: build-beta-webpack
    uses: ./.github/workflows/run-build.yml
    with:
      is-high-risk-environment: false
      build-name: build-beta-webpack
      build-command: yarn webpack:lavamoat:build --type beta
      builds-from-run: ${{ inputs.builds-from-run }}
      zip: true
    secrets: inherit

  build-beta-mv2-webpack:
    name: build-beta-mv2-webpack
    uses: ./.github/workflows/run-build.yml
    with:
      is-high-risk-environment: false
      build-name: build-beta-mv2-webpack
      build-command: yarn webpack:lavamoat:build:mv2 --type beta
      builds-from-run: ${{ inputs.builds-from-run }}
      zip: true
    secrets: inherit

  # Flask builds (4 jobs)
  build-flask-browserify:
    name: build-flask-browserify
    uses: ./.github/workflows/run-build.yml
    with:
      build-name: build-flask-browserify
      build-command: yarn build --build-type flask dist
      builds-from-run: ${{ inputs.builds-from-run }}
    secrets: inherit

  build-flask-mv2-browserify:
    name: build-flask-mv2-browserify
    uses: ./.github/workflows/run-build.yml
    with:
      build-name: build-flask-mv2-browserify
      build-command: yarn build --build-type flask dist
      builds-from-run: ${{ inputs.builds-from-run }}
    secrets: inherit

  build-flask-webpack:
    name: build-flask-webpack
    uses: ./.github/workflows/run-build.yml
    with:
      is-high-risk-environment: false
      build-name: build-flask-webpack
      build-command: yarn webpack:lavamoat:build --type flask
      builds-from-run: ${{ inputs.builds-from-run }}
      zip: true
    secrets: inherit

  build-flask-mv2-webpack:
    name: build-flask-mv2-webpack
    uses: ./.github/workflows/run-build.yml
    with:
      is-high-risk-environment: false
      build-name: build-flask-mv2-webpack
      build-command: yarn webpack:lavamoat:build:mv2 --type flask
      builds-from-run: ${{ inputs.builds-from-run }}
      zip: true
    secrets: inherit

  # Test builds MV3 (4 jobs)
  build-test-browserify:
    name: build-test-browserify
    uses: ./.github/workflows/run-build.yml
    with:
      build-name: build-test-browserify
      build-command: yarn build:test
      builds-from-run: ${{ inputs.builds-from-run }}
    secrets: inherit

  build-test-flask-browserify:
    name: build-test-flask-browserify
    uses: ./.github/workflows/run-build.yml
    with:
      build-name: build-test-flask-browserify
      build-command: yarn build:test:flask
      builds-from-run: ${{ inputs.builds-from-run }}
    secrets: inherit

  build-test-webpack:
    name: build-test-webpack
    uses: ./.github/workflows/run-build.yml
    with:
      is-high-risk-environment: false
      build-name: build-test-webpack
      build-command: yarn build:test:webpack
      builds-from-run: ${{ inputs.builds-from-run }}
      zip: true
    secrets: inherit

  build-test-flask-webpack:
    name: build-test-flask-webpack
    uses: ./.github/workflows/run-build.yml
    with:
      is-high-risk-environment: false
      build-name: build-test-flask-webpack
      build-command: yarn build:test:flask:webpack
      builds-from-run: ${{ inputs.builds-from-run }}
      zip: true
    secrets: inherit

  # Test builds MV2 (4 jobs)
  build-test-mv2-browserify:
    name: build-test-mv2-browserify
    uses: ./.github/workflows/run-build.yml
    with:
      build-name: build-test-mv2-browserify
      build-command: yarn build:test:mv2
      builds-from-run: ${{ inputs.builds-from-run }}
    secrets: inherit

  build-test-flask-mv2-browserify:
    name: build-test-flask-mv2-browserify
    uses: ./.github/workflows/run-build.yml
    with:
      build-name: build-test-flask-mv2-browserify
      build-command: yarn build:test:flask:mv2
      builds-from-run: ${{ inputs.builds-from-run }}
    secrets: inherit

  build-test-mv2-webpack:
    name: build-test-mv2-webpack
    uses: ./.github/workflows/run-build.yml
    with:
      is-high-risk-environment: false
      build-name: build-test-mv2-webpack
      build-command: yarn build:test:webpack:mv2
      builds-from-run: ${{ inputs.builds-from-run }}
      zip: true
    secrets: inherit

  build-test-flask-mv2-webpack:
    name: build-test-flask-mv2-webpack
    uses: ./.github/workflows/run-build.yml
    with:
      is-high-risk-environment: false
      build-name: build-test-flask-mv2-webpack
      build-command: yarn build:test:flask:webpack:mv2
      builds-from-run: ${{ inputs.builds-from-run }}
      zip: true
    secrets: inherit
