name: Lint

on:
  workflow_call:

jobs:
  lint-workflows:
    name: Lint workflows
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download actionlint
        id: download-actionlint
        run: bash <(curl https://raw.githubusercontent.com/rhysd/actionlint/7fdc9630cc360ea1a469eed64ac6d78caeda1234/scripts/download-actionlint.bash) 1.7.7
        shell: bash

      - name: Lint workflow files
        env:
          EXECUTABLE: ${{ steps.download-actionlint.outputs.executable }}
        run: |
          "$EXECUTABLE" -color
        shell: bash

  lint-code:
    name: Lint code
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout and setup environment
        uses: MetaMask/action-checkout-and-setup@v3
        with:
          is-high-risk-environment: false
          skip-allow-scripts: true

      - name: Lint
        run: yarn lint

      - name: Verify locales
        run: yarn verify-locales --quiet

      - name: Check circular dependencies
        run: yarn circular-deps:check
