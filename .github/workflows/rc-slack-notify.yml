# Slack RC notify after Main on release/X.Y.Z when Publish prerelease succeeded
# (Builds ready), even if other Main jobs failed. Needs a release PR → stable.
# See .github/scripts/slack-rc-notification.mts
#
# Manual test: Actions → RC Slack notify → Run workflow
# Optional vars.SLACK_RC_CHANNEL overrides #release-extension-* (staging only).
# workflow_run uses YAML from the default branch only.

name: RC Slack notify

on:
  workflow_run:
    workflows:
      - Main
    types:
      - completed
    branches:
      - 'release/**'
  workflow_dispatch:
    inputs:
      head_sha:
        description: 'Commit SHA to checkout (must include CHANGELOG.md / package.json for that RC)'
        required: true
      semver:
        description: 'Semver X.Y.Z (same as release/X.Y.Z)'
        required: true
      github_run_id:
        description: 'GitHub Actions run ID for CloudFront HOST_URL path and run link (e.g. from a recent Main run)'
        required: true
      test_channel:
        description: 'Slack channel (#name or ID). Sets SLACK_RC_CHANNEL for the script. Bot must be in the channel.'
        required: true

permissions:
  contents: read
  pull-requests: read
  actions: read

jobs:
  notify:
    runs-on: ubuntu-latest
    # Dispatch: manual. workflow_run: Main success|failure; gate requires Publish prerelease.
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        (github.event_name == 'workflow_run' &&
          contains(fromJson('["success","failure"]'), github.event.workflow_run.conclusion) &&
          github.event.workflow_run.event == 'push' &&
          github.event.workflow_run.head_repository.full_name == github.repository &&
          startsWith(github.event.workflow_run.head_branch, 'release/'))
      }}
    steps:
      - name: Find release PR and confirm Builds ready (workflow_run only)
        id: gate
        if: github.event_name == 'workflow_run'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          BRANCH: ${{ github.event.workflow_run.head_branch }}
          WORKFLOW_RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          set -euo pipefail
          echo "skip=true" >> "$GITHUB_OUTPUT"
          if [[ ! "$BRANCH" =~ ^release/[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Not release/x.y.z: $BRANCH — skipping Slack."
            exit 0
          fi
          PR_JSON="$(gh pr list --repo "$GH_REPO" --head "$BRANCH" --base stable --json number --jq '.[0]' 2>/dev/null || true)"
          if [[ -z "$PR_JSON" || "$PR_JSON" == "null" ]]; then
            echo "No PR with base stable for head $BRANCH — skipping Slack."
            exit 0
          fi
          # Same signal as PR "Builds ready"
          PUBLISH_CONCLUSION="$(
            gh run view "$WORKFLOW_RUN_ID" --repo "$GH_REPO" --json jobs --jq '
              [
                .jobs[]
                | select(.name == "Publish prerelease" or (.name | startswith("Publish prerelease /")))
              ]
              | .[0].conclusion // empty
            '
          )"
          if [[ "$PUBLISH_CONCLUSION" != "success" ]]; then
            echo "Publish prerelease conclusion=${PUBLISH_CONCLUSION:-missing} on run ${WORKFLOW_RUN_ID} — skipping Slack (no Builds ready)."
            exit 0
          fi
          PR_NUMBER=$(echo "$PR_JSON" | jq -r '.number')
          {
            echo "skip=false"
            echo "semver=${BRANCH#release/}"
            echo "pr_number=${PR_NUMBER}"
          } >> "$GITHUB_OUTPUT"
          echo "Proceeding: found release PR #${PR_NUMBER}; Publish prerelease succeeded."

      - name: Set notification variables
        id: notif
        if: >-
          github.event_name == 'workflow_dispatch' ||
          (github.event_name == 'workflow_run' && steps.gate.outputs.skip == 'false')
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_RUN_ID: ${{ inputs.github_run_id }}
          INPUT_SEMVER: ${{ inputs.semver }}
          WORKFLOW_RUN_ID: ${{ github.event.workflow_run.id }}
          GATE_SEMVER: ${{ steps.gate.outputs.semver }}
        run: |
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            echo "run_id=${INPUT_RUN_ID}" >> "$GITHUB_OUTPUT"
            echo "semver=${INPUT_SEMVER}" >> "$GITHUB_OUTPUT"
          else
            echo "run_id=${WORKFLOW_RUN_ID}" >> "$GITHUB_OUTPUT"
            echo "semver=${GATE_SEMVER}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout and setup Slack notification tooling from default branch
        if: >-
          github.event_name == 'workflow_dispatch' ||
          (github.event_name == 'workflow_run' && steps.gate.outputs.skip == 'false')
        uses: MetaMask/action-checkout-and-setup@v3
        with:
          ref: ${{ github.event.repository.default_branch }}
          is-high-risk-environment: false
          skip-allow-scripts: true

      - name: Checkout release notification inputs from release branch
        if: >-
          github.event_name == 'workflow_dispatch' ||
          (github.event_name == 'workflow_run' && steps.gate.outputs.skip == 'false')
        env:
          HEAD_SHA: ${{ github.event_name == 'workflow_dispatch' && inputs.head_sha || github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          git fetch --no-tags --depth=1 origin "${HEAD_SHA}"
          git show "${HEAD_SHA}:package.json" > package.json
          git show "${HEAD_SHA}:CHANGELOG.md" > CHANGELOG.md

      - name: Post RC Slack notification
        if: >-
          github.event_name == 'workflow_dispatch' ||
          (github.event_name == 'workflow_run' && steps.gate.outputs.skip == 'false')
        continue-on-error: true
        env:
          SEMVER: ${{ steps.notif.outputs.semver }}
          BUILD_RUN_ID: ${{ steps.notif.outputs.run_id }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          # Dispatch: workflow input. Automated runs: optional vars.SLACK_RC_CHANNEL to test destinations.
          SLACK_RC_CHANNEL: ${{ github.event_name == 'workflow_dispatch' && inputs.test_channel || vars.SLACK_RC_CHANNEL || '' }}
          # AWS_CLOUDFRONT_URL: full origin (https://…); if empty, artifact links are skipped.
          HOST_URL: ${{ vars.AWS_CLOUDFRONT_URL }}/${{ github.event.repository.name }}/${{ steps.notif.outputs.run_id }}
          PR_NUMBER: ${{ steps.gate.outputs.pr_number || '' }}
          # build-links.ts is a shared TypeScript helper; keep Node's typeless .ts warning out of the Actions log.
          NODE_OPTIONS: --disable-warning=MODULE_TYPELESS_PACKAGE_JSON
        run: node ./.github/scripts/slack-rc-notification.mts
