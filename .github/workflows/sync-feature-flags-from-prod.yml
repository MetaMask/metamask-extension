name: Sync feature flags from production

on:
  schedule:
    # Run weekly on Mondays at 08:00 UTC
    - cron: '0 8 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  sync-feature-flags:
    name: Sync feature flags from production
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout and setup environment
        uses: MetaMask/action-checkout-and-setup@v3
        with:
          is-high-risk-environment: false
          skip-allow-scripts: true

      - name: Check for drift and generate report
        id: check
        run: |
          set +e
          yarn feature-flags:sync:check 2>&1 | tee sync-report.txt
          EXIT=${PIPESTATUS[0]}
          set -e
          echo "HAS_DRIFT=$( [ $EXIT -eq 1 ] && echo true || echo false )" >> "$GITHUB_OUTPUT"
          echo "HAS_ERROR=$( [ $EXIT -eq 2 ] && echo true || echo false )" >> "$GITHUB_OUTPUT"
          # Succeed for 0 (no drift) and 1 (drift); fail for 2 (API/script error)
          [ $EXIT -eq 0 ] || [ $EXIT -eq 1 ] || exit $EXIT

      - name: Create issue on drift
        if: steps.check.outputs.HAS_DRIFT == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Build full issue body for new issues
          {
            echo "## Feature Flag Registry Out of Sync with Production"
            echo ""
            echo "The automated sync job detected drift between the feature flag registry and production."
            echo "Update the registry to keep E2E tests accurate."
            echo ""
            echo "<details>"
            echo "<summary>Click to expand sync report</summary>"
            echo ""
            echo '```'
            cat sync-report.txt
            echo '```'
            echo ""
            echo "</details>"
            echo ""
            echo "### How to fix"
            echo "1. Run \`yarn feature-flags:sync\` locally to see current differences"
            echo "2. Update \`test/e2e/feature-flags/feature-flag-registry.ts\` with production values"
            echo "3. Run \`yarn feature-flags:sync\` again to verify no drift remains"
            echo "4. Close this issue after merging the fix"
          } > issue-body.md

          # Build shorter body for follow-up comments
          {
            echo "## Latest sync report"
            echo ""
            echo "<details>"
            echo "<summary>Click to expand sync report</summary>"
            echo ""
            echo '```'
            cat sync-report.txt
            echo '```'
            echo ""
            echo "</details>"
            echo ""
            echo "To fix: Update \`test/e2e/feature-flags/feature-flag-registry.ts\` and run \`yarn feature-flags:sync\` to verify."
          } > comment-body.md

          # Check for existing open issue
          EXISTING_ISSUE=$(gh issue list \
            --repo "${{ github.repository }}" \
            --search "Feature flag registry drift in:title" \
            --state open \
            --json number \
            --limit 1 \
            --jq '.[0].number // empty')

          if [ -n "$EXISTING_ISSUE" ]; then
            echo "Commenting on existing issue #$EXISTING_ISSUE"
            gh issue comment "$EXISTING_ISSUE" --body-file comment-body.md
          else
            echo "Creating new issue"
            gh issue create \
              --title "Feature flag registry drift detected" \
              --body-file issue-body.md
          fi
