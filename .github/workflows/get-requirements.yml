name: Get workflow and job requirements

on:
  workflow_call:
    outputs:
      needs-locales:
        description: Whether locales-only checks are needed
        value: ${{ jobs.detect-changes.outputs.needs-locales }}
      skip-everything:
        description: Whether everything should be skipped
        value: ${{ jobs.detect-changes.outputs.skip-everything }}
      builds-from-run:
        description: The github.run_id to get builds from
        value: ${{ jobs.detect-changes.outputs.builds-from-run }}
      builds-from-sha:
        description: The HEAD commit SHA of the run providing builds (for PR comment annotation)
        value: ${{ jobs.detect-changes.outputs.builds-from-sha }}
      skip-builds:
        description: Whether builds were skipped without hash verification (blocks merge)
        value: ${{ jobs.detect-changes.outputs.skip-builds }}
      needs-lint:
        description: Whether lint job is needed
        value: ${{ jobs.detect-changes.outputs.needs-lint }}
      needs-unit-and-integration:
        description: Whether unit and integration tests are needed
        value: ${{ jobs.detect-changes.outputs.needs-unit-and-integration }}
      needs-releases:
        description: Whether releases job is needed
        value: ${{ jobs.detect-changes.outputs.needs-releases }}
      needs-benchmarks:
        description: Whether benchmarks job is needed
        value: ${{ jobs.detect-changes.outputs.needs-benchmarks }}
      needs-e2e:
        description: Whether E2E tests are needed
        value: ${{ jobs.detect-changes.outputs.needs-e2e }}
      just-repository-health-checks:
        description: Whether repository health checks are needed
        value: ${{ jobs.detect-changes.outputs.just-repository-health-checks }}

env:
  # For a `pull_request` event, the head commit hash is `github.event.pull_request.head.sha`.
  # For a `push` event, the head commit hash is `github.sha`.
  HEAD_COMMIT_HASH: ${{ github.event.pull_request.head.sha || github.sha }}
  BRANCH: ${{ github.head_ref || github.ref_name }}
  IS_RUN_EVERYTHING_BRANCH: ${{ (github.head_ref || github.ref_name) == 'main' || (github.head_ref || github.ref_name) == 'stable' }}
  RUN_ID: ${{ github.run_id }}
  # For a `pull_request` event, the base branch is `github.event.pull_request.base.ref`.
  # For a `push` event on release/* branches, fall back to `stable`; otherwise `main`.
  # Note: merge_group events only target `main` (no merge queue on `stable`),
  # so the fallback to 'main' is correct for that case too.
  BASE_BRANCH: ${{ github.event.pull_request.base.ref || (startsWith(github.ref_name, 'release/') && 'stable') || 'main' }}
  IS_FORK: ${{ github.event.pull_request.head.repo.fork || github.event.repository.fork }}
  EVENT_NAME: ${{ github.event_name }}
  PR_NUMBER: ${{ github.event.pull_request.number }}
  GH_TOKEN: ${{ github.token }}

jobs:
  detect-changes:
    name: Filter files changed and decide which jobs to run
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      needs-locales: ${{ steps.set-needs-locales.outputs.needs-locales || 'false' }}
      skip-everything: ${{ steps.set-skip-everything.outputs.skip-everything || 'false' }}
      builds-from-run: ${{ steps.find-reusable-builds.outputs.builds-from-run || env.RUN_ID }}
      builds-from-sha: ${{ steps.find-reusable-builds.outputs.builds-from-sha || env.HEAD_COMMIT_HASH }}
      skip-builds: ${{ steps.build-overrides.outputs.skip == 'true' && steps.find-reusable-builds.outputs.builds-from-run != '' && 'true' || 'false' }}
      needs-lint: ${{ steps.set-needs-lint.outputs.needs-lint || 'false' }}
      needs-unit-and-integration: ${{ steps.set-needs-unit-and-integration.outputs.needs-unit-and-integration || 'false' }}
      needs-releases: ${{ steps.set-needs-releases.outputs.needs-releases || 'false' }}
      needs-benchmarks: ${{ steps.set-needs-benchmarks.outputs.needs-benchmarks || 'false' }}
      needs-e2e: ${{ steps.set-needs-e2e.outputs.needs-e2e || 'false' }}
      just-repository-health-checks: ${{ steps.set-just-repository-health-checks.outputs.just-repository-health-checks || 'false' }}
    steps:
      - name: Check pull request merge queue status
        id: check-skip-merge-queue
        if: ${{ env.EVENT_NAME == 'merge_group' }}
        uses: MetaMask/github-tools/.github/actions/check-skip-merge-queue@v1

      - uses: actions/checkout@v6
        if: ${{ steps.check-skip-merge-queue.outputs.up-to-date != 'true' }}
        with:
          fetch-depth: 1

      - name: Fetch HEAD commit for message checks
        if: ${{ steps.check-skip-merge-queue.outputs.up-to-date != 'true' }}
        run: git fetch --depth=1 origin "${HEAD_COMMIT_HASH}"

      # Do this before we use dorny/paths-filter, which might checkout other commits
      - name: Check skip-e2e tag
        id: skip-e2e-tag
        if: ${{ steps.check-skip-merge-queue.outputs.up-to-date != 'true' }}
        run: |
          echo "SKIP=false" >> "$GITHUB_OUTPUT"

          # Ignore the [skip-e2e] tag for forks
          if [[ "$IS_FORK" != "true" ]] && { [[ "$EVENT_NAME" == "pull_request" ]] || [[ "$EVENT_NAME" == "merge_group" ]] || [[ "$BRANCH" == trigger-ci-* ]]; }; then
            if git show --format='%B' --no-patch "${HEAD_COMMIT_HASH}" | grep --fixed-strings --quiet '[skip-e2e]'; then
              echo "SKIP=true" >> "$GITHUB_OUTPUT"
              echo "-> SKIP=true due to [skip-e2e] tag in last commit message"
            fi
          fi

      # Compute a content hash of all build-affecting source files.
      # Used to detect when builds can be reused from a prior run.
      # IMPORTANT: We hash from HEAD_COMMIT_HASH (the PR head), not the merge
      # commit that actions/checkout creates. This ensures the hash is stable
      # across pushes even when the base branch advances.
      #
      # Uses a DENYLIST approach: we exclude paths known NOT to affect builds.
      # This is safer than an allowlist — if a new build-affecting file is
      # added, it is automatically included (worst case: unnecessary rebuild).
      - name: Compute build-source hash
        id: compute-build-hash
        if: ${{ steps.check-skip-merge-queue.outputs.up-to-date != 'true' }}
        uses: actions/github-script@v8
        with:
          script: |
            // Directories that never affect the production build output.
            const excludedDirs = [
              '.agents/', '.claude/', '.cursor/', '.devcontainer/',
              '.github/', '.husky/', '.storybook/', '.vscode/', '.yarn/',
              'docs/', 'test/',
              'development/metamaskbot-build-announce/',
              'development/ts-migration-dashboard/',
              'development/webpack/test/',
            ];
            // Files inside excluded dirs that DO affect builds.
            // run-build.yml is kept because it injects env vars and secrets.
            const keptFiles = new Set([
              '.github/workflows/run-build.yml',
            ]);
            // Directories inside excluded dirs that DO affect builds.
            // .yarn/patches/ contains source patches applied to dependencies.
            const keptDirs = ['.yarn/patches/'];
            // Top-level files that never affect the production build output.
            const excludedFiles = new Set([
              'AGENTS.md', 'attribution.txt', 'CHANGELOG.md', 'LICENSE',
              'README.md', '.depcheckrc.yml', '.editorconfig', '.env.yarn',
              '.gitattributes', '.git-blame-ignore-revs', '.gitignore',
              '.madgerc', '.mocharc.js', '.prettierignore', '.prettierrc.yml',
              'codecov.yml', 'coverage.json', 'crowdin.yml',
              'jest.config.js', 'jest.integration.config.js',
              'playwright.config.ts', 'privacy-snapshot.json',
              'sonar-project.properties', 'stylelint.config.js',
            ]);
            // Also exclude any top-level .eslintrc*.js variant.
            const eslintPattern = /^\.eslintrc(\.[a-z.-]+)?\.js$/;

            const { stdout: tree } = await exec.getExecOutput(
              'git', ['ls-tree', '-r', process.env.HEAD_COMMIT_HASH],
              { silent: true },
            );
            const kept = tree.split('\n').filter(line => {
              if (!line) return false;
              const path = line.split('\t')[1];
              if (keptFiles.has(path)) return true;
              if (keptDirs.some(d => path.startsWith(d))) return true;
              if (excludedDirs.some(d => path.startsWith(d))) return false;
              if (excludedFiles.has(path)) return false;
              if (eslintPattern.test(path)) return false;
              return true;
            }).join('\n') + '\n';

            if (kept === '\n') {
              core.setFailed('git ls-tree returned no files after filtering — cannot compute a meaningful hash');
              return;
            }

            // main.yml is in the denylist (most changes are CI plumbing), but
            // the build-command values it passes to run-build.yml DO affect
            // output. Extract and sort them so only command changes bust the hash.
            const { stdout: mainYml } = await exec.getExecOutput(
              'git', ['show', `${process.env.HEAD_COMMIT_HASH}:.github/workflows/main.yml`],
              { silent: true },
            );
            const buildCommands = (mainYml.match(/build-command: .+/g) ?? [])
              .sort()
              .join('\n') + '\n';

            const { stdout: hash } = await exec.getExecOutput(
              'git', ['hash-object', '--stdin'],
              { silent: true, input: Buffer.from(kept + buildCommands) },
            );
            const buildHash = hash.trim();
            core.setOutput('build-hash', buildHash);
            core.info(`-> Build-source hash: ${buildHash}`);

      # Post the hash as a commit status so future runs can look it up by SHA.
      # This is an optimization for future runs — failure must not block current CI.
      - name: Post build-source-hash commit status
        if: ${{ steps.compute-build-hash.outputs.build-hash }}
        continue-on-error: true
        uses: actions/github-script@v8
        env:
          BUILD_HASH: ${{ steps.compute-build-hash.outputs.build-hash }}
          HEAD_COMMIT_HASH: ${{ env.HEAD_COMMIT_HASH }}
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: process.env.HEAD_COMMIT_HASH,
              state: 'success',
              context: 'build-source-hash',
              description: process.env.BUILD_HASH,
              target_url: `${process.env.GITHUB_SERVER_URL}/${context.repo.owner}/${context.repo.repo}/actions/runs/${process.env.RUN_ID}`,
            });
            core.info(`Posted build-source-hash: ${process.env.BUILD_HASH}`);

      # Check for build override tags in commit message or PR labels.
      # [force-builds] / force-builds label → always build fresh.
      # [skip-builds] / skip-builds label → always reuse from base branch (skip hash check).
      # Only applies to pull_request events — overrides are meaningless on
      # main/stable pushes and dangerous in the merge queue (the squash commit
      # message includes the PR description, and leftover tags would cause
      # unverified builds to enter the merge queue).
      - name: Check build overrides
        id: build-overrides
        if: ${{ env.EVENT_NAME == 'pull_request' }}
        uses: actions/github-script@v8
        with:
          script: |
            const { stdout: msg } = await exec.getExecOutput(
              'git', ['show', '--format=%B', '--no-patch', process.env.HEAD_COMMIT_HASH],
              { silent: true },
            );
            const labels = context.payload.pull_request
              ? context.payload.pull_request.labels.map(l => l.name)
              : [];

            if (msg.includes('[force-builds]') || labels.includes('force-builds')) {
              core.setOutput('force', 'true');
              core.info('-> force-builds: true');
              return;
            }
            if (msg.includes('[skip-builds]') || labels.includes('skip-builds')) {
              core.setOutput('skip', 'true');
              core.info('-> skip-builds: true');
              return;
            }
            core.info('-> no build overrides');

      # Extract the list of expected build artifact names from main.yml.
      # This avoids a hardcoded list that could drift out of sync.
      - name: Extract required build artifact names
        id: extract-build-names
        if: ${{ steps.compute-build-hash.outputs.build-hash }}
        run: |
          NAMES=$(grep -oP '(?<=build-name: )\S+' .github/workflows/main.yml | jq -Rsc 'split("\n") | map(select(length > 0))')
          echo "names=$NAMES" >> "$GITHUB_OUTPUT"
          echo "-> Required build artifacts: $NAMES"

      # Find a prior run whose builds match the current source hash.
      # Checks same branch first, then base branch (main).
      # Skipped on main, stable, and release/* branches (too high-risk to skip builds).
      - name: Find reusable builds from prior run
        id: find-reusable-builds
        if: ${{ env.IS_RUN_EVERYTHING_BRANCH != 'true' && !startsWith(github.head_ref || github.ref_name, 'release/') && steps.compute-build-hash.outputs.build-hash && steps.check-skip-merge-queue.outputs.up-to-date != 'true' && steps.build-overrides.outputs.force != 'true' }}
        uses: actions/github-script@v8
        env:
          BUILD_HASH: ${{ steps.compute-build-hash.outputs.build-hash }}
          BASE_BRANCH: ${{ env.BASE_BRANCH }}
          REQUIRED_BUILD_NAMES: ${{ steps.extract-build-names.outputs.names }}
          SKIP_BUILDS: ${{ steps.build-overrides.outputs.skip }}
        with:
          script: |
            const { repo: { owner, repo } } = context;
            const buildHash = process.env.BUILD_HASH;
            const currentRunId = parseInt(process.env.RUN_ID, 10);
            const branch = process.env.BRANCH;
            const required = JSON.parse(process.env.REQUIRED_BUILD_NAMES);
            const skipBuilds = process.env.SKIP_BUILDS === 'true';
            core.info(`Expecting ${required.length} build artifacts`);
            if (skipBuilds) {
              core.warning('[skip-builds] active — ignoring hash, finding most recent run with all artifacts');
            }

            async function findMatchingRun(searchBranch) {
              core.info(`Searching branch '${searchBranch}' for matching build hash...`);

              let runs;
              try {
                const resp = await github.rest.actions.listWorkflowRuns({
                  owner,
                  repo,
                  workflow_id: 'main.yml',
                  branch: searchBranch,
                  per_page: 10,
                });
                runs = resp.data.workflow_runs ?? [];
              } catch (err) {
                core.warning(`API error listing runs for '${searchBranch}': ${err.message}`);
                return false;
              }

              // 'in_progress' is included intentionally: a concurrent run that
              // already uploaded all build artifacts can be reused even before it
              // finishes its E2E/lint jobs. The artifact completeness check below
              // ensures we never use a run with missing uploads.
              const allowedStatuses = new Set(['completed', 'in_progress']);
              for (const run of runs) {
                if (!allowedStatuses.has(run.status)) continue;
                if (run.id === currentRunId) continue;

                try {
                  // Use the combined status endpoint — it de-duplicates and returns only
                  // the latest status per context, avoiding pagination issues when bots
                  // (e.g. policy-bot) create 100+ entries that push ours off page 1.
                  const { data: { statuses } } = await github.rest.repos.getCombinedStatusForRef({
                    owner,
                    repo,
                    ref: run.head_sha,
                    per_page: 100,
                  });
                  const hashStatus = statuses.find(s => s.context === 'build-source-hash');

                  if (!skipBuilds && hashStatus?.description !== buildHash) {
                    core.info(`-> Run ${run.id} (SHA: ${run.head_sha}): hash ${hashStatus?.description ?? 'not found'} — skipping`);
                    continue;
                  }

                  // Verify that build artifacts still exist, using pagination to
                  // handle runs with more than 100 artifacts.
                  const artifacts = await github.paginate(
                    github.rest.actions.listWorkflowRunArtifacts,
                    { owner, repo, run_id: run.id, per_page: 100 },
                  );
                  const artifactNames = new Set(artifacts.map(a => a.name));

                  const missing = required.filter(name => !artifactNames.has(name));

                  if (missing.length === 0) {
                    core.info(`-> Found matching run: ${run.id} (SHA: ${run.head_sha})`);
                    core.setOutput('builds-from-run', String(run.id));
                    core.setOutput('builds-from-sha', run.head_sha);
                    return true;
                  }
                  core.info(`-> Run ${run.id} matches hash but missing artifacts: ${missing.join(', ')}. Skipping.`);
                } catch (err) {
                  core.warning(`API error checking run ${run.id}: ${err.message}`);
                  continue;
                }
              }
              return false;
            }

            try {
              const baseBranch = process.env.BASE_BRANCH;
              // Try same branch first, then fall back to base branch
              if (!(await findMatchingRun(branch))) {
                core.info(`No match on '${branch}', trying '${baseBranch}'...`);
                if (!(await findMatchingRun(baseBranch))) {
                  core.info('No reusable builds found. Builds will run fresh.');
                }
              }
            } catch (err) {
              core.warning(`Build reuse lookup failed: ${err.message}. Builds will run fresh.`);
            }

      - id: filter
        if: ${{ steps.check-skip-merge-queue.outputs.up-to-date != 'true' }}
        uses: dorny/paths-filter@9d7afb8d214ad99e78fbd4247752c4caed2b6e4c
        with:
          filters: .github/rules/filter-rules.yml
          list-files: shell

      # This puts the workflow in locales-only mode, with skip-everything=true and needs-locales=true
      - name: Compute needs-locales flag
        id: set-needs-locales
        if: ${{ steps.check-skip-merge-queue.outputs.up-to-date != 'true' }}
        env:
          FILTER_LOCALES_COUNT: ${{ steps.filter.outputs.locales_count }}
          FILTER_ALL_CHANGES_COUNT: ${{ steps.filter.outputs.all_changes_count }}
        run: |
          # On main we never run locales-only mode (full-signal CI and scheduled runs).
          if [[ "$IS_RUN_EVERYTHING_BRANCH" == 'true' ]]; then
            echo "needs-locales=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # locales-only when *all* changes are in app/_locales.
          if [[ -n "$FILTER_ALL_CHANGES_COUNT" && "$FILTER_ALL_CHANGES_COUNT" != "0" && "$FILTER_LOCALES_COUNT" == "$FILTER_ALL_CHANGES_COUNT" ]]; then
            echo "needs-locales=true" >> "$GITHUB_OUTPUT"
          else
            echo "needs-locales=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute just-repository-health-checks flag
        id: set-just-repository-health-checks
        if: >-
          ${{
            steps.check-skip-merge-queue.outputs.up-to-date != 'true' &&
            steps.filter.outputs.repository_health_checks_related_count != '0' &&
            steps.filter.outputs.all_changes_count == steps.filter.outputs.repository_health_checks_related_count
          }}
        run: echo "just-repository-health-checks=true" >> "$GITHUB_OUTPUT"

      # If the only change is in package.json, and the only line changed is "version", then we can skip everything
      - name: Compute just-package-json-version flag
        id: set-just-package-json-version
        if: >-
          ${{
            env.EVENT_NAME == 'pull_request' &&
            steps.filter.outputs.package_json_count == '1' &&
            steps.filter.outputs.all_changes_count == '1'
          }}
        run: |
          # At this point we already know the *only* changed file is package.json.
          # Emit true only if the diff is exactly a single "version" line replacement.
          export GH_PAGER=cat
          DIFF="$(gh pr diff "${PR_NUMBER}" || true)"
          CHANGES="$(printf '%s\n' "$DIFF" | grep -E '^[+-]' | grep -vE '^(\+\+\+|---)' || true)"
          CHANGES_COUNT="$(printf '%s\n' "$CHANGES" | sed '/^$/d' | wc -l | tr -d ' ')"

          if [[ "$CHANGES_COUNT" == '2' ]] && \
             printf '%s\n' "$CHANGES" | grep -Eq '^-[[:space:]]*"version"[[:space:]]*:' && \
             printf '%s\n' "$CHANGES" | grep -Eq '^\+[[:space:]]*"version"[[:space:]]*:'; then
            echo "The only change is in package.json, and the only line changed is 'version'."
            echo "just-package-json-version=true" >> "$GITHUB_OUTPUT"
          fi

      # skip-everything is a shortcut for up-to-date == 'true' || needs-locales == 'true' || just-repository-health-checks = 'true' || just-package-json-version == 'true'
      - name: Compute skip-everything flag
        id: set-skip-everything
        if: >-
          ${{
            env.IS_RUN_EVERYTHING_BRANCH == 'false' && (
              steps.check-skip-merge-queue.outputs.up-to-date == 'true' ||
              steps.set-needs-locales.outputs.needs-locales == 'true' ||
              steps.set-just-repository-health-checks.outputs.just-repository-health-checks == 'true' ||
              steps.set-just-package-json-version.outputs.just-package-json-version == 'true'
            )
          }}
        run: echo "skip-everything=true" >> "$GITHUB_OUTPUT"

      # This is very simple right now (and equivalent to !skip-everything)
      - name: Compute needs-lint flag
        id: set-needs-lint
        if: ${{ steps.set-skip-everything.outputs.skip-everything != 'true' }}
        run: echo "needs-lint=true" >> "$GITHUB_OUTPUT"

      # May be split into two later, but can't easily be split right now
      - name: Compute needs-unit-and-integration flag
        id: set-needs-unit-and-integration
        if: ${{ steps.set-skip-everything.outputs.skip-everything != 'true' }}
        run: echo "needs-unit-and-integration=true" >> "$GITHUB_OUTPUT"

      # This is very simple right now (and equivalent to !IS_FORK && !skip-everything), but is built to have future complexity
      - name: Compute needs-releases flag
        id: set-needs-releases
        # Do not do releases on a fork
        if: >-
          ${{
            env.IS_FORK == 'false' &&
            env.EVENT_NAME != 'merge_group' &&
            steps.set-skip-everything.outputs.skip-everything != 'true'
          }}
        run: echo "needs-releases=true" >> "$GITHUB_OUTPUT"

      # This is very simple right now, but is built to have future complexity
      - name: Compute needs-benchmarks flag
        id: set-needs-benchmarks
        # Do not run benchmarks on a fork or in the merge queue
        if: >-
          ${{
            env.IS_FORK == 'false' &&
            env.EVENT_NAME != 'merge_group' &&
            steps.set-skip-everything.outputs.skip-everything != 'true'
          }}
        run: echo "needs-benchmarks=true" >> "$GITHUB_OUTPUT"

      - name: Compute needs-e2e flag
        id: set-needs-e2e
        if: ${{ steps.set-skip-everything.outputs.skip-everything != 'true' }}
        env:
          SKIP_E2E: ${{ steps.skip-e2e-tag.outputs.SKIP }}
          FILTER_NON_E2E_RELATED_FILES_COUNT: ${{ steps.filter.outputs.non_e2e_related_files_count }}
          FILTER_ALL_CHANGES_COUNT: ${{ steps.filter.outputs.all_changes_count }}
        run: |
          # Default to running E2E tests
          echo "needs-e2e=true" >> "$GITHUB_OUTPUT"

          # Only consider skipping for PRs, merge-queue events, or trigger-ci-* branches
          if [[ "$SKIP_E2E" == "true" || "$EVENT_NAME" == "pull_request" || "$EVENT_NAME" == "merge_group" ]]; then

            # Skip if [skip-e2e] tag found
            if [[ "$SKIP_E2E" == "true" ]]; then
              echo "needs-e2e=false" >> "$GITHUB_OUTPUT"
              echo "-> Skipping E2E tests due to 'skip-e2e' tag"

            # Skip E2E only if ALL changed files are in non_e2e_related_files filter
            elif [[ "$FILTER_NON_E2E_RELATED_FILES_COUNT" == "$FILTER_ALL_CHANGES_COUNT" ]]; then
              echo "needs-e2e=false" >> "$GITHUB_OUTPUT"
              echo "-> Skipping E2E tests - only non_e2e_related_files changes found"

            else
              echo "-> Running E2E tests - found changes outside non_e2e_related_files filter"
            fi
          fi
