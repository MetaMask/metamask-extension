name: Repository health checks

on:
  workflow_call:

jobs:
  repository-health-checks:
    name: Repository health checks
    runs-on: ubuntu-latest
    env:
      # For a `pull_request` event, the branch is `github.head_ref``.
      # For a `push` event, the branch is `github.ref_name`.
      BRANCH: ${{ github.head_ref || github.ref_name }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout and setup environment
        uses: MetaMask/action-checkout-and-setup@v3
        with:
          is-high-risk-environment: false
          # fetch-depth: 0 # This is needed to checkout all branches
          skip-allow-scripts: true

      # - name: ShellCheck Lint
      #   if: ${{ !cancelled() }}
      #   run: ./development/shellcheck.sh

      # - name: Validate changelog
      #   if: ${{ !startsWith(env.BRANCH, 'release/') }}
      #   run: yarn lint:changelog

      # - name: Validate release candidate changelog
      #   if: ${{ startsWith(env.BRANCH, 'release/') }}
      #   run: .github/scripts/validate-changelog-in-rc.sh

      # - name: Lint lockfile
      #   if: ${{ !cancelled() }}
      #   run: yarn lint:lockfile

      # - name: Lint console baseline
      #   if: ${{ !cancelled() }}
      #   run: yarn lint:baseline

      # - name: Check yarn resolutions
      #   if: ${{ !cancelled() }}
      #   run: yarn --check-resolutions

      - name: Run audit and triage
        if: ${{ !cancelled() }}
        env:
          IS_FORK_PR: ${{ github.event.pull_request.head.repo.fork || 'false' }}
        run: node .github/scripts/yarn-audit-and-triage.mts --output-file /tmp/audit-current.json

      # Upload the current audit output as the new baseline when merging to main.
      # PR runs download this artifact to compute the diff.
      - name: Upload audit baseline
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        uses: actions/upload-artifact@v4
        with:
          name: audit-baseline
          path: /tmp/audit-current.json

      # We skip the audit diff on merge_group runs. By the time a PR enters the
      # merge queue it has already been reviewed against a passing check run.
      # If a new advisory appeared on main between PR approval and merge queue
      # entry, it was not introduced by this PR — blaming the PR would be
      # incorrect. The advisory will be surfaced by the next push-to-main run
      # via the baseline upload and issue-creation path.
      - name: Find latest push-to-main run with baseline artifact
        id: find-baseline-run
        if: ${{ github.event_name == 'pull_request' }}
        continue-on-error: true
        uses: actions/github-script@v8
        with:
          script: |
            // Security: we must use an explicit push-to-main run ID when
            // downloading the baseline artifact. If we omit run-id,
            // actions/download-artifact defaults to the current run only.
            // If we searched all runs without the branch+event filter, a PR
            // branch run could upload a poisoned audit-baseline artifact that
            // whitelists arbitrary GHSA IDs, causing the diff to report zero
            // new advisories.
            const { data } = await github.rest.actions.listWorkflowRunsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              branch: 'main',
              event: 'push',
              status: 'completed',
              per_page: 1,
            });
            const run = data.workflow_runs[0];
            if (!run) {
              core.setFailed('No successful push-to-main run found');
              return;
            }
            core.setOutput('run-id', String(run.id));

      - name: Download audit baseline
        id: download-baseline
        if: ${{ github.event_name == 'pull_request' && steps.find-baseline-run.outcome == 'success' }}
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: audit-baseline
          path: /tmp
          run-id: ${{ steps.find-baseline-run.outputs.run-id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Write empty baseline fallback
        if: ${{ github.event_name == 'pull_request' && (steps.find-baseline-run.outcome == 'failure' || steps.download-baseline.outcome == 'failure') }}
        run: echo '[]' > /tmp/audit-baseline.json

      - name: Run audit diff
        if: ${{ github.event_name == 'pull_request' }}
        env:
          GITHUB_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        # TODO: remove --skip-if-no-baseline after first main push deposits the baseline artifact
        run: node .github/scripts/yarn-audit-diff.mts --baseline-file /tmp/audit-baseline.json --current-file /tmp/audit-current.json --skip-if-no-baseline

      # - name: Detect yarn lock deduplications
      #   if: ${{ !cancelled() }}
      #   run: yarn dedupe --check

      # - name: Run depcheck
      #   if: ${{ !cancelled() }}
      #   run: yarn depcheck

      # - name: Validate allow-scripts config
      #   if: ${{ !cancelled() }}
      #   run: yarn allow-scripts auto

      # - name: Check feature flag registry
      #   if: ${{ !cancelled() }}
      #   env:
      #     GITHUB_BASE_REF: ${{ github.base_ref }}
      #   run: yarn tsx .github/scripts/check-feature-flag-registry.ts

      - name: Check working tree
        if: ${{ !cancelled() }}
        run: |
          if ! git diff --exit-code; then
              echo "::error::Working tree dirty."
              exit 1
          fi

      # - name: Run fitness functions
      #   if: ${{ !cancelled() && github.event_name == 'pull_request'}}
      #   env:
      #     BASE_REF: ${{ github.event.pull_request.base.ref }}
      #   run: |
      #     # The following command generates a diff of changes between the common
      #     # ancestor of $BASE_REF and HEAD, and the current commit (HEAD), for
      #     # files in the current directory and its subdirectories. The output is
      #     # then saved to a file called "diff".
      #     git diff "$(git merge-base "origin/$BASE_REF" HEAD)" HEAD -- . > ./diff

      #     yarn fitness-functions ci ./diff
