name: Repository health checks

on:
  workflow_call:

jobs:
  repository-health-checks:
    name: Repository health checks
    runs-on: ubuntu-latest
    env:
      # For a `pull_request` event, the branch is `github.head_ref``.
      # For a `push` event, the branch is `github.ref_name`.
      BRANCH: ${{ github.head_ref || github.ref_name }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      SLACK_WEBHOOK_METAMASK_EXTENSION: ${{ secrets.SLACK_WEBHOOK_METAMASK_EXTENSION }}
      # True only when the PR head lives in a different repository (no secrets).
      IS_CROSS_REPO_PR: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}
    steps:
      - name: Checkout and setup environment
        uses: MetaMask/action-checkout-and-setup@v3
        with:
          is-high-risk-environment: false
          skip-allow-scripts: true

      - name: ShellCheck Lint
        if: ${{ !cancelled() }}
        run: ./development/shellcheck.sh

      - name: Validate changelog
        if: ${{ !startsWith(env.BRANCH, 'release/') }}
        run: yarn lint:changelog

      - name: Validate release candidate changelog
        if: ${{ startsWith(env.BRANCH, 'release/') }}
        run: .github/scripts/validate-changelog-in-rc.sh

      - name: Lint lockfile
        if: ${{ !cancelled() }}
        run: yarn lint:lockfile

      - name: Lint console baseline
        if: ${{ !cancelled() }}
        run: yarn lint:baseline

      - name: Check yarn resolutions
        if: ${{ !cancelled() }}
        run: yarn --check-resolutions

      # --- Baseline download (PR, push-to-main, and cron) ---
      # When the download fails (first rollout, expired artifact, or cross-repo PR
      # with read-only token), NO_BASELINE=true tells the triage script to
      # fall back to the same criteria as the package.json `audit` script:
      #   yarn audit --environment production --severity moderate
      #
      # merge_group runs skip the diff entirely: by the time a PR enters the
      # merge queue it has already passed the diff check. Any new advisory
      # that appeared on main since then wasn't introduced by this PR and
      # will be surfaced by the next push-to-main run.
      #
      # schedule (cron) runs also diff against the latest baseline. This
      # catches newly published CVEs overnight — even when no code was pushed —
      # and sends a Slack alert. The cron schedule is defined in main.yml.
      - name: Audit -- find baseline run
        id: find-baseline-run
        if: >-
          ${{
            !cancelled()
            && (
              github.event_name == 'pull_request'
              || github.event_name == 'push'
              || github.event_name == 'schedule'
            )
          }}
        continue-on-error: true
        uses: actions/github-script@v8
        with:
          script: |
            // Artifact-first search: find the audit-baseline artifact from
            // the most recent main-branch run. Using the artifact API avoids
            // race conditions with re-runs — a re-run of an older run may
            // upload a newer artifact, but we always prefer the highest
            // run ID (latest workflow run) to stay on the newest commit.
            //
            // Security: filter to head_branch === 'main' so a PR branch
            // can never supply a poisoned baseline.
            const { data } = await github.rest.actions.listArtifactsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: 'audit-baseline',
              per_page: 20,
            });
            const baseline = data.artifacts
              .filter(a => a.workflow_run?.head_branch === 'main')
              .sort((a, b) => b.workflow_run.id - a.workflow_run.id)[0];
            if (!baseline) {
              core.setFailed('No audit-baseline artifact found from a main-branch run');
              return;
            }
            const runId = baseline.workflow_run.id;
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${runId}`;
            core.info(`Using baseline from run ${runId} (${runUrl})`);
            core.setOutput('run-id', String(runId));

      - name: Audit -- download baseline
        id: download-baseline
        if: ${{ !cancelled() && steps.find-baseline-run.outcome == 'success' }}
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          name: audit-baseline
          path: .tmp
          run-id: ${{ steps.find-baseline-run.outputs.run-id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Audit -- check for vulnerabilities
        if: ${{ !cancelled() && github.event_name != 'merge_group' }}
        env:
          NO_BASELINE: ${{ steps.download-baseline.outcome != 'success' }}
        run: |
          mkdir -p .tmp
          yarn tsx .github/scripts/yarn-audit-and-triage.mts

      # --- Diff (runs when a real baseline was downloaded) ---
      # On push-to-main and cron this detects advisories introduced since the
      # last green build and sends a Slack notification. On PRs it fails the
      # check when new production moderate+ advisories are found.
      - name: Audit -- diff against baseline
        if: ${{ !cancelled() && steps.download-baseline.outcome == 'success' }}
        env:
          BASELINE_RUN_ID: ${{ steps.find-baseline-run.outputs.run-id }}
        run: |
          yarn tsx .github/scripts/yarn-audit-diff.mts

      # On push-to-main, rename the audit output to audit-baseline.json so the
      # uploaded artifact name matches what PR runs download to .tmp.
      - name: Audit -- rename baseline
        if: >-
          ${{
            !cancelled()
            && (github.event_name == 'push' || github.event_name == 'schedule')
            && github.ref == 'refs/heads/main'
          }}
        run: mv .tmp/audit-current.json .tmp/audit-baseline.json

      - name: Audit -- upload baseline artifact
        if: >-
          ${{
            !cancelled()
            && (github.event_name == 'push' || github.event_name == 'schedule')
            && github.ref == 'refs/heads/main'
          }}
        uses: actions/upload-artifact@v7
        with:
          name: audit-baseline
          path: .tmp/audit-baseline.json

      - name: Audit -- upload baseline to S3
        if: >-
          ${{
            !cancelled()
            && (github.event_name == 'push' || github.event_name == 'schedule')
            && github.ref == 'refs/heads/main'
            && github.repository == 'MetaMask/metamask-extension'
            && vars.AWS_REGION
            && vars.AWS_IAM_ROLE
            && vars.AWS_S3_BUCKET
          }}
        uses: MetaMask/github-tools/.github/actions/upload-s3@v1
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: ${{ vars.AWS_IAM_ROLE }}
          s3-bucket: ${{ vars.AWS_S3_BUCKET }}/${{ github.event.repository.name }}/audit-baseline
          path: .tmp/audit-baseline.json

      - name: Detect yarn lock deduplications
        if: ${{ !cancelled() }}
        run: yarn dedupe --check

      - name: Run depcheck
        if: ${{ !cancelled() }}
        run: yarn depcheck

      - name: Validate allow-scripts config
        if: ${{ !cancelled() }}
        run: yarn allow-scripts auto

      - name: Check feature flag registry
        if: ${{ !cancelled() }}
        env:
          GITHUB_BASE_REF: ${{ github.base_ref }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: yarn tsx .github/scripts/check-feature-flag-registry.ts

      - name: Check working tree
        if: ${{ !cancelled() }}
        run: |
          if ! git diff --exit-code; then
              echo "::error::Working tree dirty."
              exit 1
          fi

      - name: Run fitness functions
        if: ${{ !cancelled() && github.event_name == 'pull_request'}}
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: yarn fitness-functions ci
