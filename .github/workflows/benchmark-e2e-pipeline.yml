name: E2E benchmark pipeline

on:
  workflow_call:
    inputs:
      mode:
        description: 'selenium | dapp-page-load'
        type: string
        required: true
      run-gated-steps:
        description: Selenium only — setup, benchmark run, and artifact upload (mainOnly / main-release gate)
        type: boolean
        default: false
      benchmark-command:
        type: string
        default: ''
      run-sentry:
        type: boolean
        default: false
      run-upload:
        description: Dapp only — set true to publish artifacts; Selenium uses run-gated-steps for upload
        type: boolean
        default: false
      artifact-name:
        type: string
        default: ''
      builds-run-id:
        type: string
        required: true
      result-filename:
        type: string
        default: ''
      browser:
        type: string
        default: ''
      build-type:
        type: string
        default: ''

permissions:
  contents: read
  id-token: write

jobs:
  selenium-pipeline:
    if: ${{ inputs.mode == 'selenium' }}
    continue-on-error: true
    runs-on: ubuntu-latest
    timeout-minutes: 30
    container:
      image: ghcr.io/metamask/metamask-extension-e2e-image:v24.13.0
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    env:
      SELENIUM_BROWSER: ${{ inputs.browser }}
      HEADLESS: false
      INFURA_PROJECT_ID: ${{ secrets.INFURA_PROJECT_ID }}
      TEST_SRP_2: ${{ secrets.TEST_SRP_2 }}
      SENTRY_DSN_PERFORMANCE: ${{ vars.SENTRY_DSN_PERFORMANCE }}
      PR_NUMBER: ${{ github.event.pull_request.number || 'none' }}
      HEAD_COMMIT_HASH: ${{ github.event.pull_request.head.sha || github.sha }}
      GITHUB_REF_NAME: ${{ github.head_ref || github.ref_name }}
    steps:
      - name: Checkout and setup environment
        if: ${{ inputs.run-gated-steps }}
        uses: MetaMask/action-checkout-and-setup@v3
        with:
          is-high-risk-environment: false
          skip-allow-scripts: true

      - name: Restore .metamask folder
        if: ${{ inputs.run-gated-steps }}
        id: restore-metamask
        uses: actions/cache/restore@v5
        with:
          path: .metamask
          key: .metamask-${{ hashFiles('yarn.lock') }}
          fail-on-cache-miss: false

      - name: Install anvil if cache missed
        if: ${{ inputs.run-gated-steps && steps.restore-metamask.outputs.cache-hit != 'true' }}
        run: yarn mm-foundryup
        shell: bash

      - name: Download build artifact
        if: ${{ inputs.run-gated-steps }}
        uses: actions/download-artifact@v7
        with:
          name: ${{ inputs.artifact-name }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ inputs.builds-run-id }}

      - name: Configure Xvfb
        if: ${{ inputs.run-gated-steps }}
        run: Xvfb -ac :99 -screen 0 1280x1024x16 &
        shell: bash

      - name: Install AWS CLI (needed in the container)
        if: ${{ inputs.run-gated-steps }}
        run: sudo apt-get update && sudo apt-get install python3-pip && sudo pip install awscli --break-system-packages
        shell: bash

      - name: Run the benchmark
        if: ${{ inputs.run-gated-steps && inputs.benchmark-command != '' }}
        run: ${{ inputs.benchmark-command }}
        shell: bash

      - name: Send benchmark results to Sentry
        if: ${{ inputs.run-sentry }}
        run: |
          export GITHUB_REF_NAME="${GH_HEAD_REF:-$GH_REF_NAME}"
          yarn tsx test/e2e/benchmarks/send-to-sentry.ts \
            --results "test-artifacts/benchmarks/${{ inputs.result-filename }}" \
            --browser "${{ inputs.browser }}" \
            --buildType "${{ inputs.build-type }}"
        shell: bash
        env:
          GH_HEAD_REF: ${{ github.head_ref }}
          GH_REF_NAME: ${{ github.ref_name }}

      - name: Upload benchmark to S3
        if: >-
          ${{
            inputs.run-gated-steps &&
            vars.AWS_REGION != '' &&
            vars.AWS_IAM_ROLE != '' &&
            vars.AWS_S3_BUCKET != ''
          }}
        uses: MetaMask/github-tools/.github/actions/upload-s3@v1
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: ${{ vars.AWS_IAM_ROLE }}
          s3-bucket: ${{ vars.AWS_S3_BUCKET }}/${{ github.event.repository.name }}/${{ github.run_id }}/benchmarks/${{ inputs.result-filename }}
          path: test-artifacts/benchmarks/${{ inputs.result-filename }}

      - name: Upload benchmark result as GitHub artifact
        if: ${{ always() && inputs.run-gated-steps }}
        uses: actions/upload-artifact@v6
        with:
          name: ${{ inputs.result-filename }}
          path: test-artifacts/benchmarks/${{ inputs.result-filename }}
          retention-days: 7
          if-no-files-found: ignore

  dapp-page-load-pipeline:
    if: ${{ inputs.mode == 'dapp-page-load' }}
    continue-on-error: true
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: ${{ github.ref_name == 'main' && 'default-branch' || null }}
    env:
      OWNER: ${{ github.repository_owner }}
      REPOSITORY: ${{ github.event.repository.name }}
      PR_NUMBER: ${{ github.event.pull_request.number || 'none' }}
      HEAD_COMMIT_HASH: ${{ github.event.pull_request.head.sha || github.sha }}
      SENTRY_DSN_PERFORMANCE: ${{ vars.SENTRY_DSN_PERFORMANCE }}
      BENCHMARK_BROWSER_LOADS: '10'
      BENCHMARK_PAGE_LOADS: '10'
      DAPP_BENCHMARK_JSON: benchmark-chrome-browserify-pageLoadBenchmark.json
    steps:
      - name: Checkout and setup environment
        uses: MetaMask/action-checkout-and-setup@v3
        with:
          is-high-risk-environment: false
          skip-allow-scripts: true

      - name: Download artifact 'build-test-browserify'
        uses: actions/download-artifact@v7
        with:
          name: build-test-browserify
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ inputs.builds-run-id }}

      - name: Install Playwright browsers
        run: yarn playwright install chromium

      - name: Run dapp page load benchmarks
        run: yarn test:e2e:benchmark --preset=pageLoadBenchmark

      - name: Send benchmark results to Sentry
        if: ${{ inputs.run-sentry }}
        run: |
          export GITHUB_REF_NAME="${GH_HEAD_REF:-$GH_REF_NAME}"
          yarn tsx test/e2e/benchmarks/send-to-sentry.ts \
            --results "test-artifacts/benchmarks/${{ env.DAPP_BENCHMARK_JSON }}" \
            --browser "chrome" \
            --buildType "browserify"
        shell: bash
        env:
          GH_HEAD_REF: ${{ github.head_ref }}
          GH_REF_NAME: ${{ github.ref_name }}

      - name: Upload benchmark to S3
        if: >-
          ${{
            inputs.run-upload &&
            vars.AWS_REGION != '' &&
            vars.AWS_IAM_ROLE != '' &&
            vars.AWS_S3_BUCKET != ''
          }}
        uses: MetaMask/github-tools/.github/actions/upload-s3@v1
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: ${{ vars.AWS_IAM_ROLE }}
          s3-bucket: ${{ vars.AWS_S3_BUCKET }}/${{ github.event.repository.name }}/${{ github.run_id }}/benchmarks/${{ env.DAPP_BENCHMARK_JSON }}
          path: test-artifacts/benchmarks/${{ env.DAPP_BENCHMARK_JSON }}

      - name: Upload benchmark result as GitHub artifact
        if: ${{ always() && inputs.run-upload }}
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.DAPP_BENCHMARK_JSON }}
          path: test-artifacts/benchmarks/${{ env.DAPP_BENCHMARK_JSON }}
          retention-days: 7
          if-no-files-found: ignore
