name: Runway extension release and store submit

# INFRA-3735 — Runway single entrypoint for release cut + CWS + AMO store uploads.
#
# Phase 0: validate branch, version, optional release_sha, CI, Runway sender (release/*).
# Phase 1: workflow_call → publish-release-from-release-head.yml
# Phase 2: workflow_call → upload-extension-to-cws.yml (production + flask, parallel)
# Phase 3: workflow_call → upload-extension-to-amo.yml — blocked until #43144 merges
#
# Idempotent / partial re-run: set skip_* flags to bypass phases that already succeeded.
# Re-dispatch the orchestrator from the same release/* ref with the same version.
#
# workflow_call (not gh workflow run) preserves Runway github.actor for WIF CEL on CWS/AMO.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version X.Y.Z — must match release/X.Y.Z branch semver when run from release/*'
        required: true
        type: string
      release_sha:
        description: 'Optional integrity check — must match the commit this workflow runs on (Runway record)'
        required: false
        type: string
      execute_store_phases:
        description: 'Run publish + store upload phases after validation'
        required: false
        type: boolean
        default: false
      skip_publish:
        description: 'Skip Phase 1 (re-run when GitHub Release already exists from a prior attempt)'
        required: false
        type: boolean
        default: false
      skip_cws_production:
        description: 'Skip Phase 2a CWS production upload'
        required: false
        type: boolean
        default: false
      skip_cws_flask:
        description: 'Skip Phase 2b CWS flask upload'
        required: false
        type: boolean
        default: false
      skip_amo:
        description: 'Skip Phase 3 AMO uploads (default true until upload-extension-to-amo.yml merges in #43144)'
        required: false
        type: boolean
        default: true

permissions:
  contents: read
  statuses: read
  actions: read
  id-token: write

jobs:
  validate:
    name: Phase 0 — validate preconditions
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      version: ${{ steps.validate-version.outputs.version }}
      release_sha: ${{ steps.resolve-sha.outputs.release_sha }}
      release_tag: ${{ steps.validate-version.outputs.release_tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}
          sparse-checkout: .github/scripts
          sparse-checkout-cone-mode: false

      - name: Validate branch ref
        env:
          GITHUB_REF: ${{ github.ref }}
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            echo "Branch: main (allowed for orchestrator dispatch)"
          elif [[ "${GITHUB_REF}" =~ ^refs/heads/release/ ]]; then
            echo "Branch: ${GITHUB_REF#refs/heads/}"
          else
            echo "::error::Orchestrator must run from refs/heads/main or refs/heads/release/* (current: ${GITHUB_REF})"
            exit 1
          fi

      - name: Validate version input
        id: validate-version
        env:
          VERSION: ${{ inputs.version }}
          GITHUB_REF: ${{ github.ref }}
        run: |
          set -euo pipefail
          if [[ ! "${VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid version: ${VERSION} — expected numeric X.Y.Z"
            exit 1
          fi
          if [[ "${GITHUB_REF}" =~ ^refs/heads/release/ ]]; then
            branch_version="${GITHUB_REF#refs/heads/release/}"
            if [[ "${branch_version}" != "${VERSION}" ]]; then
              echo "::error::Version input ${VERSION} does not match branch release/${branch_version}"
              exit 1
            fi
          fi
          {
            echo "version=${VERSION}"
            echo "release_tag=v${VERSION}"
          } >> "${GITHUB_OUTPUT}"

      - name: Resolve release SHA
        id: resolve-sha
        env:
          INPUT_SHA: ${{ inputs.release_sha }}
          WORKFLOW_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          RELEASE_SHA="${INPUT_SHA:-${WORKFLOW_SHA}}"
          if [[ -n "${INPUT_SHA}" && "${INPUT_SHA}" != "${WORKFLOW_SHA}" ]]; then
            echo "::error::release_sha ${INPUT_SHA} does not match workflow commit ${WORKFLOW_SHA}"
            exit 1
          fi
          echo "release_sha=${RELEASE_SHA}" >> "${GITHUB_OUTPUT}"

      - name: Verify Runway sender (UX quick-fail)
        if: startsWith(github.ref, 'refs/heads/release/')
        env:
          RUNWAY_ACTOR_LOGIN: 'runway-github[bot]'
          RUNWAY_ACTOR_ID: '73448015'
        run: |
          set -euo pipefail
          if [[ "${{ github.event.sender.type }}" != "Bot" ]]; then
            echo "::error::Release-branch orchestrator dispatch must come from a GitHub App bot (got: ${{ github.event.sender.type }})"
            exit 1
          fi
          if [[ "${{ github.actor }}" != "${RUNWAY_ACTOR_LOGIN}" ]]; then
            echo "::error::Expected actor ${RUNWAY_ACTOR_LOGIN}, got ${{ github.actor }}"
            exit 1
          fi
          if [[ "${{ github.event.sender.id }}" != "${RUNWAY_ACTOR_ID}" ]]; then
            echo "::error::Expected sender id ${RUNWAY_ACTOR_ID}, got ${{ github.event.sender.id }}"
            exit 1
          fi
          echo "Runway sender verified (YAML quick-fail; cloud trust remains authoritative)."

      - name: Verify required CI checks
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_SHA: ${{ steps.resolve-sha.outputs.release_sha }}
        run: .github/scripts/verify-ci-checks.sh

      - name: Summary
        env:
          VERSION: ${{ steps.validate-version.outputs.version }}
          RELEASE_SHA: ${{ steps.resolve-sha.outputs.release_sha }}
          EXECUTE_STORE: ${{ inputs.execute_store_phases }}
        run: |
          {
            echo "### Phase 0 — validation passed"
            echo ""
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Version | \`${VERSION}\` |"
            echo "| Release SHA | \`${RELEASE_SHA}\` |"
            echo "| Ref | \`${{ github.ref }}\` |"
            echo "| execute_store_phases | \`${EXECUTE_STORE}\` |"
          } >> "${GITHUB_STEP_SUMMARY}"

  publish-release:
    name: Phase 1 — publish release
    needs:
      - validate
    if: ${{ inputs.execute_store_phases && !inputs.skip_publish }}
    uses: ./.github/workflows/publish-release-from-release-head.yml
    secrets: inherit

  cws-production:
    name: Phase 2a — CWS production upload
    needs:
      - validate
      - publish-release
    if: >-
      ${{
        always() &&
        inputs.execute_store_phases &&
        !inputs.skip_cws_production &&
        needs.validate.result == 'success' &&
        (needs.publish-release.result == 'success' || needs.publish-release.result == 'skipped')
      }}
    uses: ./.github/workflows/upload-extension-to-cws.yml
    with:
      version: ${{ needs.validate.outputs.version }}
      target: production
      dry-run: false
    secrets: inherit

  cws-flask:
    name: Phase 2b — CWS flask upload
    needs:
      - validate
      - publish-release
    if: >-
      ${{
        always() &&
        inputs.execute_store_phases &&
        !inputs.skip_cws_flask &&
        needs.validate.result == 'success' &&
        (needs.publish-release.result == 'success' || needs.publish-release.result == 'skipped')
      }}
    uses: ./.github/workflows/upload-extension-to-cws.yml
    with:
      version: ${{ needs.validate.outputs.version }}
      target: flask
      dry-run: false
    secrets: inherit

  amo-pending:
    name: Phase 3 — AMO uploads (blocked)
    needs:
      - validate
      - publish-release
      - cws-production
      - cws-flask
    if: >-
      ${{
        always() &&
        inputs.execute_store_phases &&
        !inputs.skip_amo &&
        needs.validate.result == 'success' &&
        (needs.publish-release.result == 'success' || needs.publish-release.result == 'skipped') &&
        (needs.cws-production.result == 'success' || needs.cws-production.result == 'skipped') &&
        (needs.cws-flask.result == 'success' || needs.cws-flask.result == 'skipped')
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Block until upload-extension-to-amo.yml merges
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          set -euo pipefail
          echo "::error::Phase 3 AMO uploads are not available on main yet."
          echo ""
          echo "Merge metamask-extension#43144 (upload-extension-to-amo.yml), then add workflow_call"
          echo "to that workflow and wire production + flask jobs here (same pattern as CWS)."
          echo ""
          echo "Version ${VERSION} — Phases 0–2 may have completed; re-run with skip_publish and"
          echo "skip_cws_* as needed after #43144 lands to finish AMO only."
          exit 1

  orchestrator-summary:
    name: Orchestrator summary
    needs:
      - validate
      - publish-release
      - cws-production
      - cws-flask
      - amo-pending
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Write summary
        env:
          VALIDATE: ${{ needs.validate.result }}
          PUBLISH: ${{ needs.publish-release.result }}
          CWS_PROD: ${{ needs.cws-production.result }}
          CWS_FLASK: ${{ needs.cws-flask.result }}
          AMO: ${{ needs.amo-pending.result }}
          EXECUTE_STORE: ${{ inputs.execute_store_phases }}
          SKIP_PUBLISH: ${{ inputs.skip_publish }}
          SKIP_CWS_PROD: ${{ inputs.skip_cws_production }}
          SKIP_CWS_FLASK: ${{ inputs.skip_cws_flask }}
          SKIP_AMO: ${{ inputs.skip_amo }}
        run: |
          {
            echo "### Runway orchestrator (INFRA-3735)"
            echo ""
            echo "| Phase | Result |"
            echo "| --- | --- |"
            echo "| 0 validate | ${VALIDATE} |"
            echo "| 1 publish | ${PUBLISH} (skip_publish=${SKIP_PUBLISH}) |"
            echo "| 2a CWS production | ${CWS_PROD} (skip=${SKIP_CWS_PROD}) |"
            echo "| 2b CWS flask | ${CWS_FLASK} (skip=${SKIP_CWS_FLASK}) |"
            echo "| 3 AMO | ${AMO} (skip_amo=${SKIP_AMO}) |"
            echo ""
            if [[ "${EXECUTE_STORE}" != "true" ]]; then
              echo "Store phases were **not requested** (\`execute_store_phases=false\`)."
              echo ""
              echo "**Partial re-run:** dispatch again with \`execute_store_phases=true\` and set"
              echo "\`skip_publish\` / \`skip_cws_production\` / \`skip_cws_flask\` for phases that already succeeded."
            fi
          } >> "${GITHUB_STEP_SUMMARY}"
