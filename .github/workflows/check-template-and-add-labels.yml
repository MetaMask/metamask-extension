name: Check template and add labels

on:
  issues:
    types: [opened, edited, labeled, unlabeled, reopened]
  # zizmor: ignore[dangerous-triggers]
  # pull_request_target is required so PRs from forks get template-checked
  # and labeled. The workflow does not check out PR head code — only the
  # default-branch checkout — so the trigger cannot be used to execute
  # attacker code.
  pull_request_target:
    types: [opened, edited, labeled, unlabeled, reopened, synchronize]
  merge_group:

# Labelling uses LABEL_TOKEN (PAT); GITHUB_TOKEN only needs read.
permissions:
  contents: read

jobs:
  check-template-and-add-labels:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: >
      github.event_name == 'issues' ||
      (github.event_name == 'pull_request_target' && github.event.pull_request.head.repo.full_name == github.repository)
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout and setup environment
        uses: MetaMask/action-checkout-and-setup@v3
        with:
          is-high-risk-environment: false
          skip-allow-scripts: true

      - name: Get access token
        id: get-token
        uses: MetaMask/github-tools/.github/actions/get-token@v1
        with:
          token-exchange-url: ${{ vars.TOKEN_EXCHANGE_URL }}
          permissions: |
            issues: write
            members: read
            pull_requests: write

      - name: Check template and add labels
        id: check-template-and-add-labels
        env:
          LABEL_TOKEN: ${{ steps.get-token.outputs.token }}
        run: npm run check-template-and-add-labels
