name: Validate lavamoat policy webapp

on:
  workflow_call:

jobs:
  validate-lavamoat-policy-webapp:
    name: Validate lavamoat policy webapp
    runs-on: ubuntu-latest
    strategy:
      matrix:
        build-type: [main, beta, flask]
    steps:
      - name: Checkout and setup environment
        uses: MetaMask/action-checkout-and-setup@t2
        with:
          is-high-risk-environment: false
          skip-allow-scripts: true
          yarn-custom-url: 'https://diuv6g5fj9pvx.cloudfront.net/metamask-extension/yarn-4.9.1/yarn.js#sha224.4285002185abb91fe2b781f27fd1e078086c37a7b095f6ea4ee25971'

      - name: Validate lavamoat ${{ matrix.build-type }} policy
        run: yarn lavamoat:webapp:auto:ci --build-types=${{ matrix.build-type }}
        env:
          INFURA_PROJECT_ID: 00000000000

      - name: Check working tree
        run: |
          if ! git diff --exit-code; then
              echo "::error::Working tree dirty."
              exit 1
          fi
