      - name: Upload policy diff on failure
        if: ${{ failure() && steps.check-working-tree.outcome == 'failure' }}
        uses: actions/upload-artifact@v7
        with:
          name: lavamoat-policy-diff-webapp
          path: lavamoat-policy-diff-webapp.patch

  validate-lavamoat-policy-webpack-build:
    name: Validate LavaMoat webpack build policy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout and setup environment
        uses: MetaMask/action-checkout-and-setup@v3
        with:
          is-high-risk-environment: false
          skip-allow-scripts: true

      - name: Validate LavaMoat webpack build policy
        run: yarn webpack:tsc && yarn webpack:lavamoat:policy:build

      - name: Check working tree
        id: check-working-tree
        run: |
          if ! git diff --exit-code > lavamoat-policy-diff-webpack-build.patch; then
