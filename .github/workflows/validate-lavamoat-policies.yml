name: Validate LavaMoat policies

on:
  workflow_call:

env:
  INFURA_PROJECT_ID: 00000000000
  INFURA_PROD_PROJECT_ID: 00000000000
  SEGMENT_PROD_WRITE_KEY: 00000000000
  GOOGLE_PROD_CLIENT_ID: 00000000000
  APPLE_PROD_CLIENT_ID: 00000000000
  GOOGLE_BETA_CLIENT_ID: 00000000000
  APPLE_BETA_CLIENT_ID: 00000000000
  GOOGLE_EXPERIMENTAL_CLIENT_ID: 00000000000
  APPLE_EXPERIMENTAL_CLIENT_ID: 00000000000
  GOOGLE_FLASK_CLIENT_ID: 00000000000
  APPLE_FLASK_CLIENT_ID: 00000000000

jobs:
  validate-lavamoat-policy-build:
    name: Validate LavaMoat build policy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout and setup environment
        uses: MetaMask/action-checkout-and-setup@v3
        with:
          is-high-risk-environment: false
          skip-allow-scripts: true

      - name: Validate LavaMoat build policy
        run: yarn lavamoat:build:auto

      - name: Check working tree
        id: check-working-tree
        run: |
          if ! git diff --exit-code > lavamoat-policy-diff-build.patch; then
              cat lavamoat-policy-diff-build.patch
              echo "::error::Working tree dirty."
              exit 1
          fi

      - name: Upload policy diff on failure
        if: ${{ failure() && steps.check-working-tree.outcome == 'failure' }}
        uses: actions/upload-artifact@v7
        with:
          name: lavamoat-policy-diff-build
          path: lavamoat-policy-diff-build.patch

  validate-lavamoat-policy-webapp:
    name: Validate LavaMoat webapp policy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout and setup environment
        uses: MetaMask/action-checkout-and-setup@v3
        with:
          is-high-risk-environment: false
          skip-allow-scripts: true

      - name: Validate LavaMoat webapp policy
        run: yarn lavamoat:webapp:auto

      - name: Check working tree
        id: check-working-tree
        run: |
          if ! git diff --exit-code > lavamoat-policy-diff-webapp.patch; then
