      - name: Upload policy diff on failure
        if: ${{ failure() && steps.check-working-tree.outcome == 'failure' }}
        uses: actions/upload-artifact@v7
        with:
          name: lavamoat-policy-diff-webpack-build
          path: lavamoat-policy-diff-webpack-build.patch

  validate-lavamoat-policy-webpack-mv2:
    name: Validate LavaMoat webpack MV2 policy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout and setup environment
        uses: MetaMask/action-checkout-and-setup@v3
        with:
          is-high-risk-environment: false
          skip-allow-scripts: true

      - name: Validate LavaMoat webpack MV2 policy
        run: yarn webpack:tsc && yarn webpack:lavamoat:policy:mv2

      - name: Check working tree
        id: check-working-tree
