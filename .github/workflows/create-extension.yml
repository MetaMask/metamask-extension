name: Create Chrome Extension Draft

on:
  # This workflow can only be triggered manually from the GitHub Actions UI
  # It will not run automatically on push or pull requests
  workflow_dispatch:

permissions:
  # 'contents: read' allows the workflow to checkout the repository code
  contents: read
  # 'id-token: write' is strictly required for the google-github-actions/auth action
  # to request a short-lived OpenID Connect (OIDC) token from GitHub.
  id-token: write

jobs:
  create:
    # Runs the job on the latest Ubuntu runner provided by GitHub
    runs-on: ubuntu-latest
    steps:
      # Step 1: Check out the repository code so the workflow can access it
      - name: Checkout
        uses: actions/checkout@v4

      # Step 2: Authenticate to Google Cloud using Workload Identity Federation (WIF)
      # This is the recommended, keyless authentication method for GCP.
      # It trades the GitHub OIDC token for a Google Cloud access token.
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          # The WIF provider configured in GCP that trusts this GitHub repo
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          # The GCP service account that has permissions to publish to the Web Store
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}
          # We request an OAuth 2.0 access token (instead of credentials file)
          token_format: 'access_token'
          # Required OAuth scope for the Chrome Web Store API
          access_token_scopes: 'https://www.googleapis.com/auth/chromewebstore'

      # Step 3: Set up Node.js and build the extension
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build Extension
        env:
          INFURA_PROJECT_ID: ''
        run: |
          # Build the MetaMask extension
          yarn dist
          # The Chrome build output is located in dist/chrome
          cd dist/chrome
          
          # Remove the 'key' field from manifest.json to avoid Web Store ID conflicts
          # The Chrome Web Store API will reject a new draft upload with "Invalid Value"
          # if the zip contains a key for an extension ID already registered.
          jq 'del(.key)' manifest.json > manifest-tmp.json
          mv manifest-tmp.json manifest.json
          
          # Zip the contents into extension.zip in the repository root
          zip -r ../../extension.zip .

      # Step 4: Verify the zip file is valid before uploading
      - name: Verify zip contents
        run: |
          echo "=== Zip file size ==="
          ls -lh extension.zip
          echo ""
          echo "=== Top-level contents (manifest.json should be here) ==="
          unzip -l extension.zip | head -20

      # Step 5: Upload the zip file to create a NEW draft extension
      # This uses the Chrome Web Store API v1.1 endpoint for inserting new items.
      # It passes the access token we got from the auth step.
      - name: Create Draft Extension
        run: |
          echo "=== Debug: Zip file size ==="
          ZIP_SIZE=$(stat --format=%s extension.zip)
          echo "Size: $ZIP_SIZE bytes"
          
          echo ""
          echo "=== Debug: Verifying manifest.json has no 'key' field ==="
          unzip -p extension.zip manifest.json | jq '{name, version, manifest_version, has_key: (has("key"))}'
          
          echo ""
          echo "=== Debug: Attempting upload with verbose curl ==="
          
          HTTP_CODE=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ steps.auth.outputs.access_token }}" \
            -H "x-goog-api-version: 2" \
            -T extension.zip \
            "https://www.googleapis.com/upload/chromewebstore/v1.1/items?uploadType=media")
          
          echo "HTTP Status Code: $HTTP_CODE"
          echo ""
          echo "=== Response body ==="
          cat /tmp/response.json
          echo ""
          
          if [ "$HTTP_CODE" != "200" ]; then
            echo ""
            echo "=== Retrying without x-goog-api-version header ==="
            HTTP_CODE2=$(curl -s -o /tmp/response2.json -w "%{http_code}" \
              -X POST \
              -H "Authorization: Bearer ${{ steps.auth.outputs.access_token }}" \
              -T extension.zip \
              "https://www.googleapis.com/upload/chromewebstore/v1.1/items?uploadType=media")
            
            echo "HTTP Status Code: $HTTP_CODE2"
            echo "Response body:"
            cat /tmp/response2.json
            echo ""
            
            echo ""
            echo "=== Retrying with Chrome Web Store API v2 endpoint ==="
            echo "Fetching tokeninfo to get service account email..."
            TOKEN_INFO=$(curl -s "https://www.googleapis.com/oauth2/v1/tokeninfo?access_token=${{ steps.auth.outputs.access_token }}")
            echo "$TOKEN_INFO" | jq '{email, scope, expires_in}'
            
            echo ""
            echo "Trying v2 items.insert endpoint..."
            HTTP_CODE3=$(curl -s -o /tmp/response3.json -w "%{http_code}" \
              -X POST \
              -H "Authorization: Bearer ${{ steps.auth.outputs.access_token }}" \
              -T extension.zip \
              "https://chromewebstore.googleapis.com/upload/v2/items?uploadType=media")
            
            echo "HTTP Status Code: $HTTP_CODE3"
            echo "Response body:"
            cat /tmp/response3.json
            echo ""
          fi
          
          echo ""
          echo "========================================"
          echo "If one of the attempts above succeeded,"
          echo "save the 'id' / 'itemId' value from the response"
          echo "as a repository variable named EXTENSION_ID"
          echo "========================================"
