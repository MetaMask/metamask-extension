name: Create Chrome Extension Draft

on:
  # This workflow can only be triggered manually from the GitHub Actions UI
  # It will not run automatically on push or pull requests
  workflow_dispatch:

permissions:
  # 'contents: read' allows the workflow to checkout the repository code
  contents: read
  # 'id-token: write' is strictly required for the google-github-actions/auth action
  # to request a short-lived OpenID Connect (OIDC) token from GitHub.
  id-token: write

jobs:
  create:
    # Runs the job on the latest Ubuntu runner provided by GitHub
    runs-on: ubuntu-latest
    steps:
      # Step 1: Check out the repository code so the workflow can access it
      - name: Checkout
        uses: actions/checkout@v4

      # Step 2: Authenticate to Google Cloud using Workload Identity Federation (WIF)
      # This is the recommended, keyless authentication method for GCP.
      # It trades the GitHub OIDC token for a Google Cloud access token.
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          # The WIF provider configured in GCP that trusts this GitHub repo
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          # The GCP service account that has permissions to publish to the Web Store
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}
          # We request an OAuth 2.0 access token (instead of credentials file)
          token_format: 'access_token'
          # Required OAuth scope for the Chrome Web Store API
          access_token_scopes: 'https://www.googleapis.com/auth/chromewebstore'

      # Step 3: Set up Node.js and build the extension
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build Extension
        env:
          INFURA_PROJECT_ID: ''
        run: |
          # Build the MetaMask extension
          yarn dist
          # The Chrome build output is located in dist/chrome
          cd dist/chrome

          # Remove the 'key' field from manifest.json to avoid Web Store ID conflicts.
          # MetaMask's build injects a hardcoded dev key; the Chrome Web Store rejects
          # uploads containing a key registered to another developer.
          jq 'del(.key)' manifest.json > manifest-tmp.json
          mv manifest-tmp.json manifest.json

          # Zip the contents into extension.zip in the repository root
          zip -r ../../extension.zip .

      # Step 4: Upload the zip file to create a NEW draft extension.
      # The Chrome Web Store v1.1 "insert" API requires knowing which developer
      # account to create the item under. WIF service account tokens have no
      # associated email identity (tokeninfo returns email: null), so we must
      # explicitly pass publisherEmail to tell the API which account to use.
      #
      # REQUIRED: Set the PUBLISHER_EMAIL repository variable to the email
      # address of the registered Chrome Web Store developer account.
      - name: Create Draft Extension
        run: |
          echo "Publishing as: ${{ vars.PUBLISHER_EMAIL }}"
          echo "Zip size: $(stat --format=%s extension.zip) bytes"
          echo ""

          HTTP_CODE=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ steps.auth.outputs.access_token }}" \
            -H "x-goog-api-version: 2" \
            -T extension.zip \
            "https://www.googleapis.com/upload/chromewebstore/v1.1/items?uploadType=media&publisherEmail=${{ vars.PUBLISHER_EMAIL }}")

          echo "HTTP Status: $HTTP_CODE"
          echo ""
          cat /tmp/response.json
          echo ""

          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Upload failed with HTTP $HTTP_CODE"
            exit 1
          fi

          echo ""
          echo "========================================"
          echo "Save the 'id' value from the response above"
          echo "as a repository variable named EXTENSION_ID"
          echo "========================================"
