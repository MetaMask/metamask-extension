name: Flaky test report

on:
  schedule:
    # Once every day from Monday-Friday at 10:00 UTC
    - cron: 0 10 * * 1-5

permissions:
  contents: read
  actions: read

jobs:
  flaky-test-report:
    runs-on: ubuntu-latest
    env:
      OWNER: ${{ github.repository_owner }}
      REPOSITORY: ${{ github.event.repository.name }}
      WORKFLOW_ID: main.yml
      BRANCH: ${{ github.ref_name }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout and setup environment
        uses: MetaMask/action-checkout-and-setup@v1
        with:
          is-high-risk-environment: false
          skip-allow-scripts: true
          yarn-custom-url: 'https://diuv6g5fj9pvx.cloudfront.net/metamask-extension/yarn-4.9.1/yarn.js#sha224.4285002185abb91fe2b781f27fd1e078086c37a7b095f6ea4ee25971'

      - name: Create flaky test report
        run: yarn tsx .github/scripts/create-flaky-test-report.ts
