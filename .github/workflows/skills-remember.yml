name: Persist skills from `@metamaskbot /remember`

# Captures a team skill into the configured upstream skills repo when a
# reviewer posts `@metamaskbot /remember <capture>` on a PR.
#
# Trust tiers:
#   direct → @MetaMask/extension-platform team members — committed straight to
#            `domains/inbox/` on the skills repo.
#   pr     → other org members, collaborators, and contributors — opens a PR
#            against the skills repo with the team pinged in the body.
#   reject → drive-by commenters (author_association == NONE) — rejection
#            reply on the PR, no write.
#
# Upstream source + ref come from `.skills/CONFIG` on the default branch,
# so migrating the skills repo is a one-line change.

on:
  issue_comment:
    types: [created]

concurrency:
  group: skills-remember-${{ github.event.comment.id }}
  cancel-in-progress: false

env:
  TEAM_SLUG: MetaMask/extension-platform

jobs:
  capture:
    # Gate at the workflow level: PR comment that starts with the command.
    # Finer-grained trust is resolved in the `trust` step below.
    if: >-
      ${{
        github.event.issue.pull_request &&
        startsWith(github.event.comment.body, '@metamaskbot /remember')
      }}
    runs-on: ubuntu-latest
    environment: default-branch
    permissions:
      issues: write
      pull-requests: write
      actions: write
    steps:
      - name: Parse capture text from comment body
        id: parse
        env:
          # Untrusted input — passed via env, never interpolated into script text.
          BODY: ${{ github.event.comment.body }}
        run: |
          set -euo pipefail
          CAPTURE=$(printf '%s' "$BODY" \
            | sed -E '1 s/^@metamaskbot[[:space:]]+\/remember[[:space:]]*//i' \
            | sed -E 's/^[[:space:]]+|[[:space:]]+$//g')
          if [[ -z "$CAPTURE" ]]; then
            echo "empty=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          printf '%s' "$CAPTURE" > "${RUNNER_TEMP}/capture.txt"
          echo "empty=false" >> "$GITHUB_OUTPUT"

      - name: Determine trust tier
        if: steps.parse.outputs.empty == 'false'
        id: trust
        env:
          GH_TOKEN: ${{ secrets.METAMASKBOT_ORG_READ_TOKEN }}
          USER: ${{ github.event.comment.user.login }}
          ASSOC: ${{ github.event.comment.author_association }}
        run: |
          set -euo pipefail
          # Team membership is the definitive direct-commit signal.
          STATE=$(gh api "orgs/${TEAM_SLUG%%/*}/teams/${TEAM_SLUG##*/}/memberships/${USER}" --jq '.state' 2>/dev/null || echo "")
          if [[ "$STATE" == "active" ]]; then
            echo "tier=direct" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Other trusted roles get the PR path — human review before merge.
          case "$ASSOC" in
            OWNER|MEMBER|COLLABORATOR|CONTRIBUTOR|FIRST_TIME_CONTRIBUTOR)
              echo "tier=pr" >> "$GITHUB_OUTPUT" ;;
            *)
              echo "tier=reject" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Resolve upstream skills repo from `.skills/CONFIG`
        if: steps.trust.outputs.tier == 'direct' || steps.trust.outputs.tier == 'pr'
        id: config
        env:
          GH_TOKEN: ${{ github.token }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail
          CONFIG=$(gh api "repos/${GITHUB_REPOSITORY}/contents/.skills/CONFIG?ref=${DEFAULT_BRANCH}" --jq .content | base64 -d)
          SKILLS_REPO=$(echo "$CONFIG" | grep '^skills_repo=' | cut -d= -f2- | tr -d '[:space:]')
          SKILLS_REF=$(echo  "$CONFIG" | grep '^skills_ref='  | cut -d= -f2- | tr -d '[:space:]')
          [[ -z "$SKILLS_REPO" ]] && { echo "skills_repo missing from .skills/CONFIG" >&2; exit 1; }
          [[ -z "$SKILLS_REF"  ]] && SKILLS_REF="main"
          OWNER=$(echo "$SKILLS_REPO" | sed -E 's|https://github.com/([^/]+)/.*|\1|')
          REPO=$(echo  "$SKILLS_REPO" | sed -E 's|https://github.com/[^/]+/([^./]+).*|\1|')
          {
            echo "owner=$OWNER"
            echo "repo=$REPO"
            echo "ref=$SKILLS_REF"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout skills repo at pinned ref
        if: steps.trust.outputs.tier == 'direct' || steps.trust.outputs.tier == 'pr'
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.config.outputs.owner }}/${{ steps.config.outputs.repo }}
          ref: ${{ steps.config.outputs.ref }}
          token: ${{ secrets.METAMASKBOT_SKILLS_TOKEN }}
          path: skills-repo
          # persist-credentials: true — required for the PR tier's `git push`.
          # Direct tier doesn't use git, only `gh api` via remember.sh.

      - name: Capture — direct commit
        if: steps.trust.outputs.tier == 'direct'
        id: capture-direct
        working-directory: skills-repo
        env:
          GH_TOKEN: ${{ secrets.METAMASKBOT_SKILLS_TOKEN }}
          CAPTURED_BY: ${{ github.event.comment.user.login }}
          SOURCE_REPO: ${{ github.event.repository.name }}
          AUDIT_URL: ${{ github.event.comment.html_url }}
        run: |
          set -euo pipefail
          CAPTURE=$(cat "${RUNNER_TEMP}/capture.txt")
          OUTPUT=$(bash tools/remember.sh \
            --captured-by "$CAPTURED_BY" \
            --source-repo "$SOURCE_REPO" \
            --audit-url  "$AUDIT_URL" \
            -- "$CAPTURE")
          echo "$OUTPUT"
          CAPTURE_PATH=$(echo "$OUTPUT" | awk -F' — ' '/^✓/ { sub(/^✓ /, "", $1); print $1 }')
          CAPTURE_SHA=$(echo  "$OUTPUT" | awk -F' — ' '/^✓/ { print $2 }')
          CAPTURE_URL=$(echo  "$OUTPUT" | awk -F' — ' '/^✓/ { print $3 }')
          # Slug is the directory name under `domains/inbox/skills/`.
          CAPTURE_SLUG=$(echo "$CAPTURE_PATH" | sed -E 's|^domains/inbox/skills/([^/]+)/.*|\1|')
          {
            echo "path=$CAPTURE_PATH"
            echo "sha=$CAPTURE_SHA"
            echo "url=$CAPTURE_URL"
            echo "slug=$CAPTURE_SLUG"
          } >> "$GITHUB_OUTPUT"

      - name: Trigger `skills-sync` to propagate new skill to consumer repos
        if: steps.capture-direct.outcome == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh workflow run skills-sync.yml \
            --repo "${GITHUB_REPOSITORY}" \
            --ref  "${{ github.event.repository.default_branch }}" || {
              echo "::warning::Failed to dispatch skills-sync — will be picked up by the next scheduled run."
            }

      - name: Capture — branch and open PR
        if: steps.trust.outputs.tier == 'pr'
        id: capture-pr
        working-directory: skills-repo
        env:
          GH_TOKEN: ${{ secrets.METAMASKBOT_SKILLS_TOKEN }}
          CAPTURED_BY: ${{ github.event.comment.user.login }}
          SOURCE_REPO: ${{ github.event.repository.name }}
          AUDIT_URL: ${{ github.event.comment.html_url }}
          OWNER: ${{ steps.config.outputs.owner }}
          REPO: ${{ steps.config.outputs.repo }}
          BASE: ${{ steps.config.outputs.ref }}
        run: |
          set -euo pipefail
          CAPTURE=$(cat "${RUNNER_TEMP}/capture.txt")

          # Write skill file locally, no network write from remember.sh.
          DRY=$(bash tools/remember.sh \
            --mode local \
            --out-dir "$(pwd)" \
            --captured-by "$CAPTURED_BY" \
            --source-repo "$SOURCE_REPO" \
            --audit-url  "$AUDIT_URL" \
            -- "$CAPTURE")
          echo "$DRY"

          SKILL_PATH=$(echo        "$DRY" | grep '^SKILL_PATH='        | cut -d= -f2-)
          SKILL_SLUG=$(echo        "$DRY" | grep '^SKILL_SLUG='        | cut -d= -f2-)
          SKILL_DESCRIPTION=$(echo "$DRY" | grep '^SKILL_DESCRIPTION=' | cut -d= -f2-)

          BRANCH="capture/${SKILL_SLUG}"

          git config user.name  "metamaskbot"
          git config user.email "metamaskbot@users.noreply.github.com"
          git switch -c "$BRANCH"
          git add "$SKILL_PATH"
          git commit -m "capture(inbox/${SKILL_SLUG}): ${SKILL_DESCRIPTION}"
          git push origin "$BRANCH"

          # PR body pings the team; cross-org reviewer assignment can't be set
          # via the API when the skills repo lives outside MetaMask, so the
          # mention is the primary notification mechanism.
          {
            echo "Captured via \`@metamaskbot /remember\` from \`$SOURCE_REPO\`."
            echo
            echo "- Captured by: @$CAPTURED_BY"
            echo "- Audit: $AUDIT_URL"
            echo "- Tier: external (requires review before merge)"
            echo
            echo "cc @$TEAM_SLUG"
            echo
            echo "---"
            echo
            echo "$CAPTURE"
          } > "${RUNNER_TEMP}/pr-body.md"

          PR_URL=$(gh pr create \
            --repo "${OWNER}/${REPO}" \
            --head "${BRANCH}" \
            --base "${BASE}" \
            --title "capture(inbox/${SKILL_SLUG}): ${SKILL_DESCRIPTION}" \
            --body-file "${RUNNER_TEMP}/pr-body.md")

          # Best-effort team review request; silently skipped cross-org.
          gh pr edit "${PR_URL}" --add-reviewer "${TEAM_SLUG}" 2>/dev/null || true

          PR_NUMBER=$(basename "$PR_URL")

          {
            echo "path=$SKILL_PATH"
            echo "slug=$SKILL_SLUG"
            echo "url=$PR_URL"
            echo "number=$PR_NUMBER"
            echo "branch=$BRANCH"
          } >> "$GITHUB_OUTPUT"

      - name: Reply on PR
        if: always() && steps.parse.outcome == 'success'
        uses: actions/github-script@v7
        env:
          EMPTY: ${{ steps.parse.outputs.empty }}
          TIER: ${{ steps.trust.outputs.tier }}
          STATUS: ${{ job.status }}
          SKILLS_OWNER: ${{ steps.config.outputs.owner }}
          SKILLS_REPO: ${{ steps.config.outputs.repo }}
          DIRECT_PATH: ${{ steps.capture-direct.outputs.path }}
          DIRECT_URL: ${{ steps.capture-direct.outputs.url }}
          DIRECT_SHA: ${{ steps.capture-direct.outputs.sha }}
          DIRECT_SLUG: ${{ steps.capture-direct.outputs.slug }}
          PR_PATH: ${{ steps.capture-pr.outputs.path }}
          PR_URL: ${{ steps.capture-pr.outputs.url }}
          PR_NUMBER: ${{ steps.capture-pr.outputs.number }}
          PR_SLUG: ${{ steps.capture-pr.outputs.slug }}
          PR_BRANCH: ${{ steps.capture-pr.outputs.branch }}
          USER: ${{ github.event.comment.user.login }}
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require('fs');
            const {
              EMPTY, TIER, STATUS,
              SKILLS_OWNER, SKILLS_REPO,
              DIRECT_PATH, DIRECT_URL, DIRECT_SHA, DIRECT_SLUG,
              PR_PATH, PR_URL, PR_NUMBER, PR_SLUG, PR_BRANCH,
              USER,
            } = process.env;
            const TEAM_SLUG = process.env.TEAM_SLUG;

            // Quote the original capture text from the tmpfile (workflow-scoped).
            const capturePath = `${process.env.RUNNER_TEMP}/capture.txt`;
            const rawCapture = fs.existsSync(capturePath)
              ? fs.readFileSync(capturePath, 'utf8').trim()
              : '';
            const MAX = 600;
            const truncated = rawCapture.length > MAX
              ? rawCapture.slice(0, MAX) + '…'
              : rawCapture;
            const quoted = truncated
              ? truncated.split('\n').map((l) => `> ${l}`).join('\n')
              : '';

            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const sourceSlug = `${context.repo.owner}/${context.repo.repo}#${context.payload.issue.number}`;

            let body;
            if (EMPTY === 'true') {
              body = [
                '⚠ `@metamaskbot /remember` needs capture text after the command.',
                '',
                '**Example:**',
                '```',
                '@metamaskbot /remember When investigating file moves, prefer `git log --follow` over `git blame`.',
                '```',
              ].join('\n');
            } else if (TIER === 'reject') {
              const orgName = TEAM_SLUG.split('/')[0];
              body = [
                `⚠ @${USER} — \`@metamaskbot /remember\` is available to:`,
                '',
                `- Members of the \`@${orgName}\` org`,
                '- Collaborators on this repo',
                '- Contributors with merged PRs to this repo',
                '',
                `External contributors can still propose skills by opening a PR directly on [\`${SKILLS_OWNER}/${SKILLS_REPO}\`](${context.serverUrl}/${SKILLS_OWNER}/${SKILLS_REPO}).`,
              ].join('\n');
            } else if (STATUS !== 'success') {
              body = `✗ \`@metamaskbot /remember\` capture failed. See the [workflow run](${runUrl}) for details.`;
            } else if (TIER === 'direct' && DIRECT_URL) {
              const rows = [
                ['Skill',       `[\`${DIRECT_PATH}\`](${DIRECT_URL})`],
                ['Slug',        `\`${DIRECT_SLUG}\``],
                ['Commit',      `\`${DIRECT_SHA}\` on \`${SKILLS_OWNER}/${SKILLS_REPO}\``],
                ['Tier',        `direct — \`@${TEAM_SLUG}\` member`],
                ['Captured by', `@${USER}`],
                ['Source',      sourceSlug],
              ];
              body = [
                '✓ Crystallized as an experimental skill.',
                '',
                '| | |',
                '|---|---|',
                ...rows.map(([k, v]) => `| **${k}** | ${v} |`),
                '',
                quoted,
                '',
                `Awaiting curation by \`@${TEAM_SLUG}\`. Skills sync into consumer repos once promoted out of \`domains/inbox/\`.`,
              ].join('\n');
            } else if (TIER === 'pr' && PR_URL) {
              const rows = [
                ['PR',             `[\`${SKILLS_OWNER}/${SKILLS_REPO}#${PR_NUMBER}\`](${PR_URL})`],
                ['Proposed path',  `\`${PR_PATH}\``],
                ['Slug',           `\`${PR_SLUG}\``],
                ['Branch',         `\`${PR_BRANCH}\``],
                ['Tier',           `external — pending review by \`@${TEAM_SLUG}\``],
                ['Captured by',    `@${USER}`],
                ['Source',         sourceSlug],
              ];
              body = [
                '✓ Opened capture PR for review.',
                '',
                '| | |',
                '|---|---|',
                ...rows.map(([k, v]) => `| **${k}** | ${v} |`),
                '',
                quoted,
              ].join('\n');
            } else {
              body = `✗ Capture finished in an unexpected state. See the [workflow run](${runUrl}).`;
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body,
            });
