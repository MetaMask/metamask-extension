name: Persist skills from `@metamaskbot /remember`

# Captures a team skill into the configured upstream skills repo when a
# trusted reviewer posts `@metamaskbot /remember <capture>` on a PR.
# Upstream source + ref come from `.skills/CONFIG` on the default branch,
# so migrating the source repo is a one-line change.

on:
  issue_comment:
    types: [created]

concurrency:
  group: skills-remember-${{ github.event.comment.id }}
  cancel-in-progress: false

jobs:
  capture:
    # Gate: PR comment, starts with the command, authored by a trusted role.
    if: >-
      ${{
        github.event.issue.pull_request &&
        startsWith(github.event.comment.body, '@metamaskbot /remember') &&
        (
          github.event.comment.author_association == 'OWNER' ||
          github.event.comment.author_association == 'MEMBER' ||
          github.event.comment.author_association == 'COLLABORATOR'
        )
      }}
    runs-on: ubuntu-latest
    environment: default-branch
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Resolve upstream skills repo from `.skills/CONFIG`
        id: config
        env:
          GH_TOKEN: ${{ github.token }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail
          CONFIG=$(gh api "repos/${GITHUB_REPOSITORY}/contents/.skills/CONFIG?ref=${DEFAULT_BRANCH}" --jq .content | base64 -d)
          SKILLS_REPO=$(echo "$CONFIG" | grep '^skills_repo=' | cut -d= -f2- | tr -d '[:space:]')
          SKILLS_REF=$(echo  "$CONFIG" | grep '^skills_ref='  | cut -d= -f2- | tr -d '[:space:]')
          [[ -z "$SKILLS_REPO" ]] && { echo "skills_repo missing from .skills/CONFIG" >&2; exit 1; }
          [[ -z "$SKILLS_REF"  ]] && SKILLS_REF="main"
          OWNER=$(echo "$SKILLS_REPO" | sed -E 's|https://github.com/([^/]+)/.*|\1|')
          REPO=$(echo  "$SKILLS_REPO" | sed -E 's|https://github.com/[^/]+/([^./]+).*|\1|')
          echo "owner=$OWNER" >> "$GITHUB_OUTPUT"
          echo "repo=$REPO"   >> "$GITHUB_OUTPUT"
          echo "ref=$SKILLS_REF" >> "$GITHUB_OUTPUT"

      - name: Checkout skills repo at pinned ref
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.config.outputs.owner }}/${{ steps.config.outputs.repo }}
          ref: ${{ steps.config.outputs.ref }}
          token: ${{ secrets.METAMASKBOT_SKILLS_TOKEN }}
          path: skills-repo
          persist-credentials: false

      - name: Parse capture text from comment body
        id: parse
        env:
          # Pass untrusted input through env, never interpolate into script text.
          BODY: ${{ github.event.comment.body }}
        run: |
          set -euo pipefail
          # Strip "@metamaskbot /remember" prefix from first line, then trim.
          CAPTURE=$(printf '%s' "$BODY" \
            | sed -E '1 s/^@metamaskbot[[:space:]]+\/remember[[:space:]]*//i' \
            | sed -E 's/^[[:space:]]+|[[:space:]]+$//g')
          if [[ -z "$CAPTURE" ]]; then
            echo "empty=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Write capture to tmpfile so multiline bodies don't need GITHUB_ENV heredoc.
          printf '%s' "$CAPTURE" > "${RUNNER_TEMP}/capture.txt"
          echo "empty=false" >> "$GITHUB_OUTPUT"

      - name: Run `remember.sh`
        if: steps.parse.outputs.empty == 'false'
        id: capture
        working-directory: skills-repo
        env:
          GH_TOKEN: ${{ secrets.METAMASKBOT_SKILLS_TOKEN }}
          CAPTURED_BY: ${{ github.event.comment.user.login }}
          SOURCE_REPO: ${{ github.event.repository.name }}
          AUDIT_URL: ${{ github.event.comment.html_url }}
        run: |
          set -euo pipefail
          CAPTURE=$(cat "${RUNNER_TEMP}/capture.txt")
          OUTPUT=$(bash tools/remember.sh \
            --captured-by "$CAPTURED_BY" \
            --source-repo "$SOURCE_REPO" \
            --audit-url  "$AUDIT_URL" \
            -- "$CAPTURE")
          echo "$OUTPUT"
          # `✓ <path> — <sha> — <url>`
          CAPTURE_PATH=$(echo "$OUTPUT" | awk -F' — ' '/^✓/ { sub(/^✓ /, "", $1); print $1 }')
          CAPTURE_URL=$(echo "$OUTPUT"  | awk -F' — ' '/^✓/ { print $3 }')
          echo "path=$CAPTURE_PATH" >> "$GITHUB_OUTPUT"
          echo "url=$CAPTURE_URL"   >> "$GITHUB_OUTPUT"

      - name: Reply on PR
        if: always()
        uses: actions/github-script@v7
        env:
          EMPTY: ${{ steps.parse.outputs.empty }}
          STATUS: ${{ job.status }}
          CAPTURE_PATH: ${{ steps.capture.outputs.path }}
          CAPTURE_URL: ${{ steps.capture.outputs.url }}
        with:
          github-token: ${{ github.token }}
          script: |
            const { EMPTY, STATUS, CAPTURE_PATH, CAPTURE_URL } = process.env;
            let body;
            if (EMPTY === 'true') {
              body = '⚠ `@metamaskbot /remember` needs capture text after the command.';
            } else if (STATUS === 'success' && CAPTURE_URL) {
              body = `✓ Captured as [\`${CAPTURE_PATH}\`](${CAPTURE_URL}).`;
            } else {
              const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
              body = `✗ Capture failed. See the [workflow run](${runUrl}) for details.`;
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body,
            });
