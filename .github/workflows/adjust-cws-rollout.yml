name: Adjust CWS rollout percentage

# INFRA-3651 — workflow_dispatch rollout adjustment via CWS API v2.
#
# Targets align with upload-extension-to-cws.yml (INFRA-3734): dev, production, flask.
# dev: cws-dev + *_DEV (UAT smoke lane; manual RE dispatch). Not the legacy "beta" target.
# production / flask: Runway sender + WIF CEL (shared prod WIF SA; flask uses EXTENSION_ID_FLASK).
#
# Read current state: GET .../items/{id}:fetchStatus (distributionChannels[].deployPercentage)
# Update rollout:     POST .../items/{id}:setPublishedDeployPercentage { deployPercentage }
#
# Compatible with docs/sensitive-release.md initial 1% rollout protocol (production).

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Published Chrome manifest version (e.g. 12.9.1) — must match live CWS crxVersion for the target listing'
        required: true
        type: string
      desired_percentage:
        description: 'Target rollout percentage (1–100)'
        required: true
        type: number
      target:
        description: 'CWS target — dev (UAT), production (PRD main), flask (PRD Flask build)'
        required: true
        type: choice
        default: production
        options:
          - dev
          - production
          - flask
      confirm_full_rollout:
        description: 'Required for desired_percentage=100 or single-step increase >50 points — enter "yes" to confirm'
        required: false
        type: string
        default: ''

permissions:
  contents: read
  id-token: write

jobs:
  adjust-rollout:
    name: Adjust CWS rollout (${{ inputs.target }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: ${{ github.workflow }}-${{ inputs.target }}
      cancel-in-progress: false
    environment: ${{ inputs.target == 'production' && 'cws-production' || inputs.target == 'flask' && 'cws-flask' || inputs.target == 'dev' && 'cws-dev' || null }}
    env:
      VERSION: ${{ inputs.version }}
      DESIRED_PERCENTAGE: ${{ inputs.desired_percentage }}
      CONFIRM_FULL_ROLLOUT: ${{ inputs.confirm_full_rollout }}
      TARGET: ${{ inputs.target }}
    steps:
      # Check 1 — Runway identity (production and flask; first step — no credentials before this).
      - name: Verify Runway sender (production and flask)
        if: inputs.target == 'production' || inputs.target == 'flask'
        env:
          SENDER_TYPE: ${{ github.event.sender.type }}
          SENDER_ID: ${{ github.event.sender.id }}
          SENDER_LOGIN: ${{ github.event.sender.login }}
          RUNWAY_ACTOR_ID: '73448015'
          RUNWAY_ACTOR_LOGIN: 'runway-github[bot]'
        run: |
          set -euo pipefail
          echo "sender.type=${SENDER_TYPE} actor=${{ github.actor }} sender.id=${SENDER_ID} (${SENDER_LOGIN})"
          if [[ "${SENDER_TYPE}" != "Bot" ]]; then
            echo "::error::Production and Flask rollout dispatch must come from a GitHub App bot (got sender.type=${SENDER_TYPE}). WIF CEL would also reject this OIDC request."
            exit 1
          fi
          if [[ "${{ github.actor }}" != "${RUNWAY_ACTOR_LOGIN}" ]]; then
            echo "::error::Expected actor ${RUNWAY_ACTOR_LOGIN}, got ${{ github.actor }}"
            exit 1
          fi
          if [[ "${SENDER_ID}" != "${RUNWAY_ACTOR_ID}" ]]; then
            echo "::error::Expected sender id ${RUNWAY_ACTOR_ID}, got ${SENDER_ID}"
            exit 1
          fi
          echo "Runway sender verified (defense-in-depth; WIF CEL remains authoritative)."

      - name: Checkout scripts
        uses: actions/checkout@v6
        with:
          sparse-checkout: .github/scripts/adjust-cws-rollout-guardrails.sh
          sparse-checkout-cone-mode: false

      # Check 2 — Release Engineer membership (human dispatch only; skipped for Runway bot).
      - name: Get org token for team membership check
        if: github.event.sender.type == 'User'
        id: org-token
        uses: MetaMask/github-tools/.github/actions/get-token@v1
        with:
          token-exchange-url: ${{ vars.TOKEN_EXCHANGE_URL }}
          permissions: |
            read:org

      - name: Verify Release Engineer membership
        if: github.event.sender.type == 'User'
        env:
          GH_TOKEN: ${{ steps.org-token.outputs.token }}
          ACTOR: ${{ github.actor }}
        run: |
          set -euo pipefail
          membership_state=""
          if ! membership_state="$(gh api "/orgs/MetaMask/teams/release-engineers/memberships/${ACTOR}" --jq .state 2>/dev/null)"; then
            echo "::error::Actor ${ACTOR} is not a member of MetaMask/release-engineers. Rollout adjustment requires Release Engineer group membership."
            exit 1
          fi
          if [[ "${membership_state}" != "active" ]]; then
            echo "::error::Actor ${ACTOR} is not an active member of MetaMask/release-engineers (state=${membership_state})."
            exit 1
          fi
          echo "Release Engineer membership verified for ${ACTOR}."

      - name: Resolve target configuration
        id: config
        env:
          WIF_PROVIDER_DEV: ${{ vars.WIF_PROVIDER_DEV }}
          WIF_SERVICE_ACCOUNT_DEV: ${{ vars.WIF_SERVICE_ACCOUNT_DEV }}
          EXTENSION_ID_DEV: ${{ vars.EXTENSION_ID_DEV }}
          PUBLISHER_ID_DEV: ${{ vars.PUBLISHER_ID_DEV }}
          WIF_PROVIDER_PROD: ${{ vars.WIF_PROVIDER }}
          WIF_SERVICE_ACCOUNT_PROD: ${{ vars.WIF_SERVICE_ACCOUNT }}
          EXTENSION_ID_PROD: ${{ vars.EXTENSION_ID }}
          EXTENSION_ID_FLASK: ${{ vars.EXTENSION_ID_FLASK }}
          PUBLISHER_ID_PROD: ${{ vars.PUBLISHER_ID }}
        run: |
          set -euo pipefail
          GITHUB_REF="${{ github.ref }}"
          if [[ "${TARGET}" == "dev" ]]; then
            if [[ "${GITHUB_REF}" != "refs/heads/main" ]]; then
              echo "::error::Dev (cws-dev) rollout must run from refs/heads/main (current: ${GITHUB_REF})"
              exit 1
            fi
            WIF_PROVIDER="${WIF_PROVIDER_DEV}"
            WIF_SERVICE_ACCOUNT="${WIF_SERVICE_ACCOUNT_DEV}"
            EXTENSION_ID="${EXTENSION_ID_DEV}"
            PUBLISHER_ID="${PUBLISHER_ID_DEV}"
          elif [[ "${TARGET}" == "production" ]]; then
            if [[ "${GITHUB_REF}" != "refs/heads/main" && ! "${GITHUB_REF}" =~ ^refs/heads/release/ ]]; then
              echo "::error::Production rollout must run from refs/heads/main or refs/heads/release/* (current: ${GITHUB_REF})"
              exit 1
            fi
            WIF_PROVIDER="${WIF_PROVIDER_PROD}"
            WIF_SERVICE_ACCOUNT="${WIF_SERVICE_ACCOUNT_PROD}"
            EXTENSION_ID="${EXTENSION_ID_PROD}"
            PUBLISHER_ID="${PUBLISHER_ID_PROD}"
          elif [[ "${TARGET}" == "flask" ]]; then
            if [[ "${GITHUB_REF}" != "refs/heads/main" && ! "${GITHUB_REF}" =~ ^refs/heads/release/ ]]; then
              echo "::error::Flask rollout must run from refs/heads/main or refs/heads/release/* (current: ${GITHUB_REF})"
              exit 1
            fi
            WIF_PROVIDER="${WIF_PROVIDER_PROD}"
            WIF_SERVICE_ACCOUNT="${WIF_SERVICE_ACCOUNT_PROD}"
            EXTENSION_ID="${EXTENSION_ID_FLASK}"
            PUBLISHER_ID="${PUBLISHER_ID_PROD}"
          else
            echo "::error::Invalid target: ${TARGET}"
            exit 1
          fi
          if [[ ! "${VERSION}" =~ ^[0-9]+(\.[0-9]+){0,3}$ ]]; then
            echo "::error::Invalid version format: ${VERSION} — use 1–4 dot-separated integers (e.g. 12.9.1)"
            exit 1
          fi
          IFS='.' read -r -a version_parts <<< "${VERSION}"
          for part in "${version_parts[@]}"; do
            if [[ ! "${part}" =~ ^(0|[1-9][0-9]*)$ ]]; then
              echo "::error::Version segment must be a non-negative integer without leading zeros: ${part} in ${VERSION}"
              exit 1
            fi
            if (( 10#${part} > 65535 )); then
              echo "::error::Version segment out of range (0–65535): ${part} in ${VERSION}"
              exit 1
            fi
          done
          if [[ -z "${EXTENSION_ID:-}" ]]; then
            case "${TARGET}" in
              dev) EXTENSION_ID_VAR="EXTENSION_ID_DEV" ;;
              production) EXTENSION_ID_VAR="EXTENSION_ID" ;;
              flask) EXTENSION_ID_VAR="EXTENSION_ID_FLASK" ;;
            esac
            echo "::error::Missing ${EXTENSION_ID_VAR} repository variable for target '${TARGET}'"
            exit 1
          fi
          missing=""
          for name in WIF_PROVIDER WIF_SERVICE_ACCOUNT PUBLISHER_ID; do
            if [[ -z "${!name:-}" ]]; then
              missing="${missing} ${name}"
            fi
          done
          if [[ -n "${missing}" ]]; then
            echo "::error::Missing repository variables for target '${TARGET}':${missing}"
            exit 1
          fi
          {
            echo "WIF_PROVIDER=${WIF_PROVIDER}"
            echo "WIF_SERVICE_ACCOUNT=${WIF_SERVICE_ACCOUNT}"
            echo "EXTENSION_ID=${EXTENSION_ID}"
            echo "PUBLISHER_ID=${PUBLISHER_ID}"
          } >> "${GITHUB_ENV}"
          {
            echo "target=${TARGET}"
            echo "extension_id=${EXTENSION_ID}"
            echo "publisher_id=${PUBLISHER_ID}"
          } >> "${GITHUB_OUTPUT}"

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}
          token_format: access_token
          access_token_scopes: https://www.googleapis.com/auth/chromewebstore

      - name: Fetch current CWS rollout state
        id: current
        env:
          ACCESS_TOKEN: ${{ steps.auth.outputs.access_token }}
        run: |
          set -euo pipefail
          FETCH_STATUS_URL="https://chromewebstore.googleapis.com/v2/publishers/${PUBLISHER_ID}/items/${EXTENSION_ID}:fetchStatus"
          http_code=$(curl -sS \
            -o /tmp/cws-fetch-status.json -w "%{http_code}" \
            -H "Authorization: Bearer ${ACCESS_TOKEN}" \
            "${FETCH_STATUS_URL}")
          if [[ "${http_code}" != "200" ]]; then
            echo "::error::fetchStatus failed with HTTP ${http_code}"
            cat /tmp/cws-fetch-status.json
            exit 1
          fi
          current_pct=$(jq -r --arg ver "${VERSION}" '
            [
              (.publishedItemRevisionStatus.distributionChannels[]? // empty),
              (.distributionChannels[]? // empty),
              (.submittedItemRevisionStatus.distributionChannels[]? // empty)
            ]
            | map(select(.crxVersion == $ver))
            | first
            | .deployPercentage // empty
          ' /tmp/cws-fetch-status.json)
          if [[ -z "${current_pct}" || "${current_pct}" == "null" ]]; then
            echo "::error::No published rollout found for version ${VERSION} on target ${TARGET}. Confirm the version is published in CWS before adjusting rollout."
            cat /tmp/cws-fetch-status.json
            exit 1
          fi
          echo "current_percentage=${current_pct}" >> "${GITHUB_OUTPUT}"
          echo "Current rollout for version ${VERSION}: ${current_pct}%"

      - name: Validate rollout guardrails
        id: guardrails
        env:
          CURRENT_PERCENTAGE: ${{ steps.current.outputs.current_percentage }}
        run: bash .github/scripts/adjust-cws-rollout-guardrails.sh

      - name: Apply rollout percentage
        id: apply
        env:
          ACCESS_TOKEN: ${{ steps.auth.outputs.access_token }}
          CURRENT_PERCENTAGE: ${{ steps.current.outputs.current_percentage }}
        run: |
          set -euo pipefail
          if [[ "${DESIRED_PERCENTAGE}" == "${CURRENT_PERCENTAGE}" ]]; then
            echo "No-op: desired percentage (${DESIRED_PERCENTAGE}%) already matches current (${CURRENT_PERCENTAGE}%)."
            echo "applied=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          ROLLOUT_URL="https://chromewebstore.googleapis.com/v2/publishers/${PUBLISHER_ID}/items/${EXTENSION_ID}:setPublishedDeployPercentage"
          http_code=$(curl -sS \
            -o /tmp/cws-rollout-response.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${ACCESS_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"deployPercentage\": ${DESIRED_PERCENTAGE}}" \
            "${ROLLOUT_URL}")
          echo "http_code=${http_code}" >> "${GITHUB_OUTPUT}"
          if [[ "${http_code}" != "200" ]]; then
            echo "::error::setPublishedDeployPercentage failed with HTTP ${http_code}"
            cat /tmp/cws-rollout-response.json
            exit 1
          fi
          echo "applied=true" >> "${GITHUB_OUTPUT}"
          echo "Rollout updated: ${CURRENT_PERCENTAGE}% → ${DESIRED_PERCENTAGE}%"

      - name: Audit summary
        if: always()
        env:
          CONFIG_OK: ${{ steps.config.outcome }}
          AUTH_OK: ${{ steps.auth.outcome }}
          FETCH_OK: ${{ steps.current.outcome }}
          GUARDRAILS_OK: ${{ steps.guardrails.outcome }}
          APPLY_OK: ${{ steps.apply.outcome }}
          CURRENT_PCT: ${{ steps.current.outputs.current_percentage }}
          APPLIED: ${{ steps.apply.outputs.applied }}
          HTTP_CODE: ${{ steps.apply.outputs.http_code }}
        run: |
          {
            echo "### CWS rollout adjustment audit (INFRA-3651)"
            echo ""
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Triggered by | \`${{ github.actor }}\` (sender: \`${{ github.event.sender.login }}\`, id=\`${{ github.event.sender.id }}\`, type=\`${{ github.event.sender.type }}\`) |"
            echo "| Target | \`${{ inputs.target }}\` |"
            echo "| Version | \`${{ inputs.version }}\` |"
            echo "| Branch | \`${{ github.ref }}\` |"
            echo "| Previous percentage | \`${CURRENT_PCT:-n/a}\` |"
            echo "| Requested percentage | \`${{ inputs.desired_percentage }}\` |"
            echo "| confirm_full_rollout | \`${{ inputs.confirm_full_rollout || '(empty)' }}\` |"
            echo "| Config step | \`${CONFIG_OK:-skipped}\` |"
            echo "| GCP auth step | \`${AUTH_OK:-skipped}\` |"
            echo "| fetchStatus step | \`${FETCH_OK:-skipped}\` |"
            echo "| Guardrails | \`${GUARDRAILS_OK}\` |"
            echo "| Apply step | \`${APPLY_OK:-skipped}\` |"
            echo "| Applied change | \`${APPLIED:-n/a}\` |"
            echo "| CWS HTTP status | \`${HTTP_CODE:-n/a}\` |"
            echo "| Workflow run | ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }} |"
          } >> "${GITHUB_STEP_SUMMARY}"
          if [[ "${{ job.status }}" == "failure" ]]; then
            exit 1
          fi
