name: Update LavaMoat policies

on:
  issue_comment:
    types: created

concurrency:
  group: update-lavamoat-policies-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  prepare:
    name: Prepare
    # Only run when the comment is on a pull request containing '@metamaskbot update-policies'
    if: ${{ github.event.issue.pull_request && startsWith(github.event.comment.body, '@metamaskbot update-policies') }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      GITHUB_TOKEN: ${{ secrets.LAVAMOAT_UPDATE_TOKEN }}
      REPO: ${{ github.repository }}
      PR_NUMBER: ${{ github.event.issue.number }}
      COMMENT_ID: ${{ github.event.comment.id }}
    outputs:
      IS_FORK: ${{ steps.is-fork.outputs.IS_FORK }}
      JOB_IDS: ${{ steps.find-failed-lavamoat-validation-job-ids.outputs.JOB_IDS }}
    steps:
      - name: Determine whether this PR is from a fork
        id: is-fork
        run: echo "IS_FORK=$(gh pr view "${PR_NUMBER}" --repo "${REPO}" --json isCrossRepository --jq '.isCrossRepository')" >> "$GITHUB_OUTPUT"

      - name: React to the comment
        if: ${{ steps.is-fork.outputs.IS_FORK == 'false' }}
        run: |
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "/repos/${REPO}/issues/comments/${COMMENT_ID}/reactions" \
            -f content='+1'

      - name: Find failed lavamoat validation job ids
        if: ${{ steps.is-fork.outputs.IS_FORK == 'false' }}
        id: find-failed-lavamoat-validation-job-ids
        run: |
          HEAD_SHA=$(gh pr view "${PR_NUMBER}" --repo "${REPO}" --json headRefOid --jq '.headRefOid')
          echo "Looking for main.yml run for commit ${HEAD_SHA}..."

          RUN_ID=$(gh run list \
            --workflow=main.yml \
            --repo "${REPO}" \
            --commit="${HEAD_SHA}" \
            --limit=1 \
            --json databaseId \
            --jq '.[0].databaseId // empty')

          if [ -z "$RUN_ID" ]; then
            echo "No CI run found"
            echo "JOB_IDS=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Found run ${RUN_ID}, looking for failed lavamoat validation job ids..."

          JOB_IDS=$(gh api "/repos/${REPO}/actions/runs/${RUN_ID}/jobs" --paginate \
            --jq '.jobs[] | select(.workflow_name == "Validate LavaMoat policies") | select(.steps[]? | select(.name == "Check working tree" and .conclusion == "failure")) | .id' \
            | paste -sd,)

          echo "JOB_IDS=${JOB_IDS}" >> "$GITHUB_OUTPUT"
          echo "Failed job IDs: ${JOB_IDS:-none}"

  apply-and-commit:
    name: Apply policy diffs and commit
    needs: prepare
    if: ${{ !cancelled() && needs.prepare.outputs.IS_FORK == 'false' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GITHUB_TOKEN: ${{ secrets.LAVAMOAT_UPDATE_TOKEN }}
      REPO: ${{ github.repository }}
      PR_NUMBER: ${{ github.event.issue.number }}
      JOB_IDS: ${{ needs.prepare.outputs.JOB_IDS }}
      ACTION_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
    steps:
      - name: Checkout repository
        if: ${{ env.JOB_IDS }}
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.LAVAMOAT_UPDATE_TOKEN }}

      - name: Checkout pull request
        if: ${{ env.JOB_IDS }}
        run: gh pr checkout "${PR_NUMBER}"

      - name: Extract and apply policy diffs from validation logs
        if: ${{ env.JOB_IDS }}
        id: apply-diffs
        run: |
          HAS_CHANGES=false

          IFS=',' read -ra JOB_IDS <<< "$JOB_IDS"
          for JOB_ID in "${JOB_IDS[@]}"; do
            echo "Extracting diff from job ${JOB_ID}..."

            # Download job logs and extract the git diff output
            gh api "/repos/${REPO}/actions/jobs/${JOB_ID}/logs" \
              | sed -n '/^.*diff --git/,/^.*::error::Working tree dirty/p' \
              | grep -v '::error::' \
              | sed 's/^[0-9T:.Z-]* //' \
              > /tmp/policy.patch

            PATCH_LINES=$(wc -l < /tmp/policy.patch)
            echo "Extracted patch from job ${JOB_ID} (${PATCH_LINES} lines)"

            if [ "$PATCH_LINES" -gt 0 ]; then
              git apply /tmp/policy.patch
              HAS_CHANGES=true
            else
              echo "Warning: empty patch from job ${JOB_ID}, skipping"
            fi
          done

          echo "HAS_CHANGES=${HAS_CHANGES}" >> "$GITHUB_OUTPUT"

      - name: Commit the updated policies
        if: ${{ steps.apply-diffs.outputs.HAS_CHANGES == 'true' }}
        run: |
          git config --global user.name 'MetaMask Bot'
          git config --global user.email 'metamaskbot@users.noreply.github.com'
          git commit -am "Update LavaMoat policies"
          git push

      - name: Compare policy changes
        if: ${{ steps.apply-diffs.outputs.HAS_CHANGES == 'true' }}
        run: |
          BASE_REF=$(gh pr view "${PR_NUMBER}" --json baseRefName --jq .baseRefName)
          git fetch origin "${BASE_REF}"

          compare_policies() {
            local main_dir="$1"
            local parent_dir="$2"
            git diff "origin/${BASE_REF}" -- "${main_dir}policy.json" > /tmp/main_policy_diff
            for folder in "${parent_dir}"*/; do
              if [ "$folder" != "$main_dir" ]; then
                local file="${folder}policy.json"
                if [ -f "$file" ]; then
                  if diff -q /tmp/main_policy_diff <(git diff "origin/${BASE_REF}" -- "$file") > /dev/null 2>&1; then
                    echo "✅ ${file} changes match ${main_dir}policy.json changes"
                  else
                    echo "👀 ${file} changes **differ from** ${main_dir}policy.json changes"
                  fi
                fi
              fi
            done
          }

          {
            compare_policies "lavamoat/browserify/main/" "lavamoat/browserify/"
            compare_policies "lavamoat/webpack/mv2/main/" "lavamoat/webpack/mv2/"
            compare_policies "lavamoat/webpack/mv3/main/" "lavamoat/webpack/mv3/"
          } > does_diff_diff.txt

      - name: Post comment (policies updated)
        if: ${{ steps.apply-diffs.outputs.HAS_CHANGES == 'true' }}
        run: |
          echo -e 'Policies updated.  \n👀 Please review the diff for suspicious new powers.  \n\n> [!TIP]  \n> Follow the policy review process outlined in the [LavaMoat Policy Review Process doc](https://github.com/MetaMask/metamask-extension/blob/main/docs/lavamoat-policy-review-process.md) before expecting an approval from Policy Reviewers.  \n🧠 Learn how to read policy diffs: https://lavamoat.github.io/guides/policy-diff/#what-to-look-for-when-reviewing-a-policy-diff \n\n' | cat - does_diff_diff.txt | gh pr comment "${PR_NUMBER}" --body-file -

      - name: Post comment (no policy changes)
        if: ${{ needs.prepare.result == 'success' && (!env.JOB_IDS || steps.apply-diffs.outputs.HAS_CHANGES == 'false') }}
        run: |
          gh pr comment "${PR_NUMBER}" --body "No policy changes"

      - name: Post comment if the update failed
        if: ${{ failure() || needs.prepare.result == 'failure' }}
        run: |
          gh pr comment "${PR_NUMBER}" --repo "${REPO}" --body "Policy update failed. You can [review the logs or retry the policy update here](${ACTION_RUN_URL})"
