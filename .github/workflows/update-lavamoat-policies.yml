name: Update LavaMoat policies

on:
  issue_comment:
    types: created

jobs:
  prepare:
    name: Prepare
    # Only run when the comment is on a pull request containing '@metamaskbot update-policies'
    if: ${{ github.event.issue.pull_request && startsWith(github.event.comment.body, '@metamaskbot update-policies') }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      GITHUB_TOKEN: ${{ secrets.LAVAMOAT_UPDATE_TOKEN }}
      REPO: ${{ github.repository }}
      PR_NUMBER: ${{ github.event.issue.number }}
      COMMENT_ID: ${{ github.event.comment.id }}
    outputs:
      IS_FORK: ${{ steps.is-fork.outputs.IS_FORK }}
      RUN_ID: ${{ steps.find-run.outputs.RUN_ID }}
      RUN_STATUS: ${{ steps.find-run.outputs.RUN_STATUS }}
    steps:
      - name: Determine whether this PR is from a fork
        id: is-fork
        run: echo "IS_FORK=$(gh pr view "${PR_NUMBER}" --repo "${REPO}" --json isCrossRepository --jq '.isCrossRepository')" >> "$GITHUB_OUTPUT"

      - name: React to the comment
        if: ${{ steps.is-fork.outputs.IS_FORK == 'false' }}
        run: |
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "/repos/${REPO}/issues/comments/${COMMENT_ID}/reactions" \
            -f content='+1'

      - name: Find latest validation run
        if: ${{ steps.is-fork.outputs.IS_FORK == 'false' }}
        id: find-run
        run: |
          HEAD_SHA=$(gh pr view "${PR_NUMBER}" --repo "${REPO}" --json headRefOid --jq '.headRefOid')
          echo "Looking for main.yml run for commit ${HEAD_SHA}..."

          RUN_JSON=$(gh run list \
            --workflow=main.yml \
            --repo "${REPO}" \
            --commit="${HEAD_SHA}" \
            --limit=1 \
            --json databaseId,status)

          RUN_ID=$(echo "$RUN_JSON" | jq -r '.[0].databaseId // empty')
          RUN_STATUS=$(echo "$RUN_JSON" | jq -r '.[0].status // empty')

          echo "RUN_ID=${RUN_ID}" >> "$GITHUB_OUTPUT"
          echo "RUN_STATUS=${RUN_STATUS}" >> "$GITHUB_OUTPUT"
          echo "Found run ${RUN_ID} with status ${RUN_STATUS}"

  apply-and-commit:
    name: Apply policy diffs and commit
    needs: prepare
    if: ${{ always() && needs.prepare.outputs.IS_FORK == 'false' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GITHUB_TOKEN: ${{ secrets.LAVAMOAT_UPDATE_TOKEN }}
      REPO: ${{ github.repository }}
      PR_NUMBER: ${{ github.event.issue.number }}
      RUN_ID: ${{ needs.prepare.outputs.RUN_ID }}
      RUN_STATUS: ${{ needs.prepare.outputs.RUN_STATUS }}
      ACTION_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
    steps:
      - name: Check if validation run exists
        if: ${{ env.RUN_ID == '' }}
        run: |
          gh pr comment "${PR_NUMBER}" --repo "${REPO}" --body "No CI run found for the latest commit. Please ensure CI has run before requesting a policy update."
          exit 1

      - name: Check if validation run has completed
        if: ${{ env.RUN_STATUS != 'completed' }}
        run: |
          gh pr comment "${PR_NUMBER}" --repo "${REPO}" --body "CI is still running (status: ${RUN_STATUS}). Please wait for it to complete before requesting a policy update."
          exit 1

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.LAVAMOAT_UPDATE_TOKEN }}

      - name: Checkout pull request
        run: gh pr checkout "${PR_NUMBER}"

      - name: Extract and apply policy diffs from validation logs
        id: apply-diffs
        run: |
          # Get all validate-lavamoat jobs from the CI run
          gh api "/repos/${REPO}/actions/runs/${RUN_ID}/jobs" --paginate \
            --jq '.jobs[] | select(.name | contains("Validate LavaMoat")) | [(.id | tostring), .conclusion, .name] | @tsv' \
            > /tmp/validate-jobs.tsv

          if [ ! -s /tmp/validate-jobs.tsv ]; then
            echo "No LavaMoat validation jobs found in run ${RUN_ID}"
            echo "HAS_CHANGES=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Found validation jobs:"
          cat /tmp/validate-jobs.tsv

          HAS_CHANGES=false

          while IFS=$'\t' read -r JOB_ID JOB_CONCLUSION JOB_NAME; do
            if [ "$JOB_CONCLUSION" != "failure" ]; then
              echo "Job '${JOB_NAME}' did not fail (conclusion: ${JOB_CONCLUSION}) — skipping"
              continue
            fi

            echo "Extracting diff from '${JOB_NAME}' (job ${JOB_ID})..."

            # Download job logs and extract the git diff output
            gh api "/repos/${REPO}/actions/jobs/${JOB_ID}/logs" \
              | sed -n '/^.*diff --git/,/^.*::error::Working tree dirty/p' \
              | grep -v '::error::' \
              | sed 's/^[0-9T:.Z-]* //' \
              > /tmp/policy.patch

            if [ -s /tmp/policy.patch ]; then
              echo "Applying patch from '${JOB_NAME}' ($(wc -l < /tmp/policy.patch) lines)..."
              git apply /tmp/policy.patch
              HAS_CHANGES=true
            else
              echo "::warning::No diff found in '${JOB_NAME}' logs"
            fi
          done < /tmp/validate-jobs.tsv

          echo "HAS_CHANGES=${HAS_CHANGES}" >> "$GITHUB_OUTPUT"

      - name: Commit the updated policies
        if: ${{ steps.apply-diffs.outputs.HAS_CHANGES == 'true' }}
        run: |
          git config --global user.name 'MetaMask Bot'
          git config --global user.email 'metamaskbot@users.noreply.github.com'
          git commit -am "Update LavaMoat policies"
          git push

      - name: Compare policy changes
        if: ${{ steps.apply-diffs.outputs.HAS_CHANGES == 'true' }}
        run: |
          BASE_REF=$(gh pr view "${PR_NUMBER}" --json baseRefName --jq .baseRefName)
          git fetch origin "${BASE_REF}"

          browserify_main_diff=$(git diff "origin/${BASE_REF}" -- lavamoat/browserify/main/policy.json | md5sum | cut -d' ' -f1)
          {
          for folder in lavamoat/browserify/*/; do
            if [ "$folder" != "lavamoat/browserify/main/" ]; then
              file="${folder}policy.json"
              if [ -f "$file" ]; then
                diff=$(git diff "origin/${BASE_REF}" -- "$file" | md5sum | cut -d' ' -f1)
                if [ "$diff" = "$browserify_main_diff" ]; then
                  echo "✅ ${folder}policy.json changes match main/policy.json policy changes"
                else
                  echo "👀 ${folder}policy.json changes **differ from** main/policy.json policy changes"
                fi
              fi
            fi
          done

          mv2_main_diff=$(git diff "origin/${BASE_REF}" -- lavamoat/webpack/mv2/main/policy.json | md5sum | cut -d' ' -f1)
          for folder in lavamoat/webpack/mv2/*/; do
            if [ "$folder" != "lavamoat/webpack/mv2/main/" ]; then
              file="${folder}policy.json"
              if [ -f "$file" ]; then
                diff=$(git diff "origin/${BASE_REF}" -- "$file" | md5sum | cut -d' ' -f1)
                if [ "$diff" = "$mv2_main_diff" ]; then
                  echo "✅ ${folder}policy.json changes match mv2/main/policy.json policy changes"
                else
                  echo "👀 ${folder}policy.json changes **differ from** mv2/main/policy.json policy changes"
                fi
              fi
            fi
          done

          mv3_main_diff=$(git diff "origin/${BASE_REF}" -- lavamoat/webpack/mv3/main/policy.json | md5sum | cut -d' ' -f1)
          for folder in lavamoat/webpack/mv3/*/; do
            if [ "$folder" != "lavamoat/webpack/mv3/main/" ]; then
              file="${folder}policy.json"
              if [ -f "$file" ]; then
                diff=$(git diff "origin/${BASE_REF}" -- "$file" | md5sum | cut -d' ' -f1)
                if [ "$diff" = "$mv3_main_diff" ]; then
                  echo "✅ ${folder}policy.json changes match mv3/main/policy.json policy changes"
                else
                  echo "👀 ${folder}policy.json changes **differ from** mv3/main/policy.json policy changes"
                fi
              fi
            fi
          done
          } > does_diff_diff.txt

      - name: Post comment (policies updated)
        if: ${{ steps.apply-diffs.outputs.HAS_CHANGES == 'true' }}
        run: |
          echo -e 'Policies updated.  \n👀 Please review the diff for suspicious new powers.  \n\n> [!TIP]  \n> Follow the policy review process outlined in the [LavaMoat Policy Review Process doc](https://github.com/MetaMask/metamask-extension/blob/main/docs/lavamoat-policy-review-process.md) before expecting an approval from Policy Reviewers.  \n🧠 Learn how to read policy diffs: https://lavamoat.github.io/guides/policy-diff/#what-to-look-for-when-reviewing-a-policy-diff \n\n' | cat - does_diff_diff.txt | gh pr comment "${PR_NUMBER}" --body-file -

      - name: Post comment (no policy changes)
        if: ${{ steps.apply-diffs.outputs.HAS_CHANGES == 'false' }}
        run: |
          gh pr comment "${PR_NUMBER}" --body "No policy changes"

      - name: Post comment if the update failed
        if: ${{ failure() }}
        run: |
          gh pr comment "${PR_NUMBER}" --repo "${REPO}" --body "Policy update failed. You can [review the logs or retry the policy update here](${ACTION_RUN_URL})"
