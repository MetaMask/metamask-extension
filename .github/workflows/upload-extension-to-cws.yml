name: Upload extension to Chrome Web Store

# INFRA-3646 — workflow_dispatch upload to CWS via GCP WIF (no refresh tokens in GitHub Secrets).
# dev: cws-dev environment + *_DEV repo variables (UAT smoke lane; distinct from build-type beta).
# production: cws-production environment + prod variables (INFRA-3644).
# flask: cws-flask environment + prod WIF vars + EXTENSION_ID_FLASK (INFRA-3734).
# CWS API v2 upload (v1.1 sunsets 2026-10-15): chromewebstore.googleapis.com/upload/v2/...
# INFRA-3649 — Runway sender verification (defense-in-depth; primary gate is WIF CEL on actor_id).
# Idempotent re-run: after WIF auth, :fetchStatus skips upload when a draft for
# CWS_EXPECTED_VERSION already exists (VERSION for production/dev; VERSION-flask.0 for flask)
# or a prior async upload is still IN_PROGRESS (poll to terminal first).

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Chrome manifest version (1–4 dot-separated integers, e.g. 13.0.0) — must match GitHub Release tag v{version}'
        required: true
        type: string
      target:
        description: 'CWS target — dev (UAT), production (PRD main), flask (PRD Flask build)'
        required: true
        type: choice
        default: dev
        options:
          - dev
          - production
          - flask
      dry-run:
        description: 'Verify sender identity and WIF auth without uploading (skips download and CWS upload)'
        required: false
        type: boolean
        default: false
  workflow_call:
    inputs:
      version:
        required: true
        type: string
        description: 'Chrome manifest version — must match GitHub Release tag v{version}'
      target:
        required: true
        type: string
        description: 'CWS target — production or flask (orchestrator); dev allowed for manual workflow_call'
      dry-run:
        required: false
        type: boolean
        default: false
        description: 'Verify sender and WIF without uploading'

permissions:
  contents: read
  id-token: write
  attestations: read # Required for gh attestation verify (INFRA-3661)

jobs:
  upload:
    name: Upload to CWS (${{ inputs.target }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.target }}
      cancel-in-progress: false
    environment: ${{ inputs.target == 'production' && 'cws-production' || inputs.target == 'flask' && 'cws-flask' || inputs.target == 'dev' && 'cws-dev' || null }}
    env:
      VERSION: ${{ inputs.version }}
      RELEASE_TAG: v${{ inputs.version }}
    steps:
      - name: Validate inputs and configuration
        env:
          TARGET: ${{ inputs.target }}
          WIF_PROVIDER_DEV: ${{ vars.WIF_PROVIDER_DEV }}
          WIF_SERVICE_ACCOUNT_DEV: ${{ vars.WIF_SERVICE_ACCOUNT_DEV }}
          EXTENSION_ID_DEV: ${{ vars.EXTENSION_ID_DEV }}
          PUBLISHER_ID_DEV: ${{ vars.PUBLISHER_ID_DEV }}
          PUBLISHER_EMAIL_DEV: ${{ vars.PUBLISHER_EMAIL_DEV }}
          WIF_PROVIDER_PROD: ${{ vars.WIF_PROVIDER }}
          WIF_SERVICE_ACCOUNT_PROD: ${{ vars.WIF_SERVICE_ACCOUNT }}
          EXTENSION_ID_PROD: ${{ vars.EXTENSION_ID }}
          EXTENSION_ID_FLASK: ${{ vars.EXTENSION_ID_FLASK }}
          PUBLISHER_ID_PROD: ${{ vars.PUBLISHER_ID }}
          PUBLISHER_EMAIL_PROD: ${{ vars.PUBLISHER_EMAIL }}
        run: |
          set -euo pipefail
          GITHUB_REF="${{ github.ref }}"
          if [[ "${TARGET}" == "dev" ]]; then
            if [[ "${GITHUB_REF}" != "refs/heads/main" ]]; then
              echo "::error::Dev (cws-dev) uploads must run from refs/heads/main (current: ${GITHUB_REF})"
              exit 1
            fi
          elif [[ "${TARGET}" == "production" || "${TARGET}" == "flask" ]]; then
            if [[ "${GITHUB_REF}" != "refs/heads/main" && ! "${GITHUB_REF}" =~ ^refs/heads/release/ ]]; then
              echo "::error::Production and Flask uploads must run from refs/heads/main or refs/heads/release/* (current: ${GITHUB_REF})"
              exit 1
            fi
          fi
          if [[ ! "${VERSION}" =~ ^[0-9]+(\.[0-9]+){0,3}$ ]]; then
            echo "::error::Invalid version format (Chrome manifest): ${VERSION} — use 1–4 dot-separated integers (e.g. 13.0.0), not semver pre-release/build metadata"
            exit 1
          fi
          IFS='.' read -r -a version_parts <<< "${VERSION}"
          for part in "${version_parts[@]}"; do
            if [[ ! "${part}" =~ ^(0|[1-9][0-9]*)$ ]]; then
              echo "::error::Version segment must be a non-negative integer without leading zeros: ${part} in ${VERSION}"
              exit 1
            fi
            if (( 10#${part} > 65535 )); then
              echo "::error::Version segment out of range (0–65535): ${part} in ${VERSION}"
              exit 1
            fi
          done
          CWS_EXPECTED_VERSION="${VERSION}"
          if [[ "${TARGET}" == "dev" ]]; then
            WIF_PROVIDER="${WIF_PROVIDER_DEV}"
            WIF_SERVICE_ACCOUNT="${WIF_SERVICE_ACCOUNT_DEV}"
            EXTENSION_ID="${EXTENSION_ID_DEV}"
            PUBLISHER_ID="${PUBLISHER_ID_DEV}"
            PUBLISHER_EMAIL="${PUBLISHER_EMAIL_DEV}"
            ZIP_NAME="metamask-chrome-${VERSION}.zip"
          elif [[ "${TARGET}" == "production" ]]; then
            WIF_PROVIDER="${WIF_PROVIDER_PROD}"
            WIF_SERVICE_ACCOUNT="${WIF_SERVICE_ACCOUNT_PROD}"
            EXTENSION_ID="${EXTENSION_ID_PROD}"
            PUBLISHER_ID="${PUBLISHER_ID_PROD}"
            PUBLISHER_EMAIL="${PUBLISHER_EMAIL_PROD}"
            ZIP_NAME="metamask-chrome-${VERSION}.zip"
          elif [[ "${TARGET}" == "flask" ]]; then
            WIF_PROVIDER="${WIF_PROVIDER_PROD}"
            WIF_SERVICE_ACCOUNT="${WIF_SERVICE_ACCOUNT_PROD}"
            EXTENSION_ID="${EXTENSION_ID_FLASK}"
            PUBLISHER_ID="${PUBLISHER_ID_PROD}"
            PUBLISHER_EMAIL="${PUBLISHER_EMAIL_PROD}"
            ZIP_NAME="metamask-chrome-${VERSION}-flask.0.zip"
            CWS_EXPECTED_VERSION="${VERSION}-flask.0"
          else
            echo "::error::Invalid target: ${TARGET}"
            exit 1
          fi
          if [[ -z "${EXTENSION_ID:-}" ]]; then
            case "${TARGET}" in
              dev) EXTENSION_ID_VAR="EXTENSION_ID_DEV" ;;
              production) EXTENSION_ID_VAR="EXTENSION_ID" ;;
              flask) EXTENSION_ID_VAR="EXTENSION_ID_FLASK" ;;
            esac
            echo "::error::Missing ${EXTENSION_ID_VAR} repository variable for target '${TARGET}'"
            exit 1
          fi
          missing=""
          for name in WIF_PROVIDER WIF_SERVICE_ACCOUNT PUBLISHER_ID PUBLISHER_EMAIL; do
            if [[ -z "${!name:-}" ]]; then
              missing="${missing} ${name}"
            fi
          done
          if [[ -n "${missing}" ]]; then
            echo "::error::Missing repository variables for target '${TARGET}':${missing}"
            exit 1
          fi
          if [[ "${TARGET}" == "flask" ]]; then
            if [[ ! "${ZIP_NAME}" =~ ^metamask-chrome-([0-9]+(\.[0-9]+){0,3})-flask\.0\.zip$ ]]; then
              echo "::error::Flask target requires asset metamask-chrome-{version}-flask.0.zip (got: ${ZIP_NAME})"
              exit 1
            fi
            ASSET_VERSION="${BASH_REMATCH[1]}"
            if [[ "${ASSET_VERSION}" != "${VERSION}" ]]; then
              echo "::error::Flask asset version '${ASSET_VERSION}' does not match input version '${VERSION}'"
              exit 1
            fi
          elif [[ "${TARGET}" == "production" || "${TARGET}" == "dev" ]]; then
            if [[ ! "${ZIP_NAME}" =~ ^metamask-chrome-([0-9]+(\.[0-9]+){0,3})\.zip$ ]]; then
              echo "::error::Main target requires asset metamask-chrome-{version}.zip (got: ${ZIP_NAME})"
              exit 1
            fi
            ASSET_VERSION="${BASH_REMATCH[1]}"
            if [[ "${ASSET_VERSION}" != "${VERSION}" ]]; then
              echo "::error::Asset version '${ASSET_VERSION}' does not match input version '${VERSION}'"
              exit 1
            fi
            if [[ "${ZIP_NAME}" == *"-flask"* || "${ZIP_NAME}" == *"-beta"* ]]; then
              echo "::error::Non-main artifact not allowed for target '${TARGET}'"
              exit 1
            fi
          fi
          {
            echo "WIF_PROVIDER=${WIF_PROVIDER}"
            echo "WIF_SERVICE_ACCOUNT=${WIF_SERVICE_ACCOUNT}"
            echo "EXTENSION_ID=${EXTENSION_ID}"
            echo "PUBLISHER_ID=${PUBLISHER_ID}"
            echo "PUBLISHER_EMAIL=${PUBLISHER_EMAIL}"
            echo "ZIP_NAME=${ZIP_NAME}"
            echo "CWS_EXPECTED_VERSION=${CWS_EXPECTED_VERSION}"
          } >> "${GITHUB_ENV}"
          {
            echo "## CWS upload"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Target | \`${TARGET}\` |"
            echo "| Version | \`${VERSION}\` |"
            echo "| Release tag | \`${RELEASE_TAG}\` |"
            echo "| Asset | \`${ZIP_NAME}\` |"
            echo "| Extension ID | \`${EXTENSION_ID}\` |"
            echo "| Publisher ID | \`${PUBLISHER_ID}\` |"
            echo "| Service account | \`${WIF_SERVICE_ACCOUNT}\` |"
            echo "| Branch | \`${GITHUB_REF}\` |"
          } >> "${GITHUB_STEP_SUMMARY}"

      # Defense-in-depth: fail fast if a non-Runway actor dispatches a production or flask run.
      # The authoritative gate is WIF CEL (INFRA-3644 / INFRA-3734) which rejects non-Runway OIDC
      # tokens at GCP token exchange; this step provides an earlier, human-readable error.
      - name: Verify Runway sender (production and flask)
        if: inputs.target == 'production' || inputs.target == 'flask'
        env:
          SENDER_ID: ${{ github.event.sender.id }}
          SENDER_LOGIN: ${{ github.event.sender.login }}
          RUNWAY_ACTOR_ID: '73448015'
          RUNWAY_ACTOR_LOGIN: 'runway-github[bot]'
        run: |
          set -euo pipefail
          echo "Sender: ${SENDER_LOGIN} (id=${SENDER_ID})"
          echo "Expected: ${RUNWAY_ACTOR_LOGIN} (id=${RUNWAY_ACTOR_ID})"
          if [[ "${SENDER_ID}" != "${RUNWAY_ACTOR_ID}" ]]; then
            echo "::error::Production and Flask uploads must be dispatched by Runway (expected sender_id=${RUNWAY_ACTOR_ID} / ${RUNWAY_ACTOR_LOGIN}, got ${SENDER_ID} / ${SENDER_LOGIN}). WIF CEL would also reject this request at GCP token exchange."
            exit 1
          fi
          echo "Sender verified: ${SENDER_LOGIN} (id=${SENDER_ID})"

      - name: Dry-run complete
        if: inputs.dry-run
        run: |
          {
            echo "## Dry-run complete"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Target | \`${{ inputs.target }}\` |"
            echo "| Version | \`${{ inputs.version }}\` |"
            echo "| Sender | \`${{ github.event.sender.login }}\` (id=\`${{ github.event.sender.id }}\`) |"
            echo "| Dry-run | \`true\` |"
            echo "| Result | Validation and sender verification passed. No download or upload performed. |"
          } >> "${GITHUB_STEP_SUMMARY}"
          echo "Dry-run mode: skipping download, GCP auth, and CWS upload."

      - name: Authenticate to Google Cloud
        if: ${{ !inputs.dry-run }}
        id: auth
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}
          token_format: access_token
          access_token_scopes: https://www.googleapis.com/auth/chromewebstore

      - name: Check CWS upload state (idempotent pre-flight)
        if: ${{ !inputs.dry-run }}
        id: cws-precheck
        env:
          ACCESS_TOKEN: ${{ steps.auth.outputs.access_token }}
        run: |
          set -euo pipefail

          FETCH_STATUS_URL="https://chromewebstore.googleapis.com/v2/publishers/${PUBLISHER_ID}/items/${EXTENSION_ID}:fetchStatus"
          max_polls=6
          poll_interval_seconds=10

          fetch_status() {
            local http_code
            http_code=$(curl -sS \
              -o /tmp/fetch-status.json -w "%{http_code}" \
              -H "Authorization: Bearer ${ACCESS_TOKEN}" \
              "${FETCH_STATUS_URL}")
            if [[ "${http_code}" != "200" ]]; then
              echo "::error::fetchStatus failed with HTTP ${http_code}"
              cat /tmp/fetch-status.json
              exit 1
            fi
          }

          draft_crx_version() {
            jq -r '
              [
                .submittedItemRevisionStatus.distributionChannels[]?.crxVersion // empty
              ] | map(select(length > 0)) | first // empty
            ' /tmp/fetch-status.json
          }

          poll_async_upload() {
            local upload_state
            upload_state=$(jq -r '.lastAsyncUploadState // empty' /tmp/fetch-status.json)
            local poll=0
            while [[ "${upload_state}" == "IN_PROGRESS" && $poll -lt ${max_polls} ]]; do
              poll=$((poll + 1))
              echo "Prior upload IN_PROGRESS; polling :fetchStatus (${poll}/${max_polls})..."
              sleep "${poll_interval_seconds}"
              fetch_status
              upload_state=$(jq -r '.lastAsyncUploadState // empty' /tmp/fetch-status.json)
              echo "Poll ${poll}/${max_polls}: lastAsyncUploadState=${upload_state:-<unset>}"
            done
            if [[ "${upload_state}" == "IN_PROGRESS" ]]; then
              echo "::error::CWS upload still IN_PROGRESS after ${max_polls} polls (${poll_interval_seconds}s apart); check CWS console or re-run"
              cat /tmp/fetch-status.json
              exit 1
            fi
            echo "${upload_state}"
          }

          echo "Checking CWS :fetchStatus before download/upload..."
          fetch_status

          async_state=$(poll_async_upload)
          draft_version=$(draft_crx_version)

          if [[ -n "${draft_version}" && "${draft_version}" == "${CWS_EXPECTED_VERSION}" ]]; then
            echo "Draft for version ${CWS_EXPECTED_VERSION} already exists in CWS (crxVersion=${draft_version}). Skipping download and upload."
            {
              echo "skip_upload=true"
              echo "upload_state=SKIPPED_ALREADY_EXISTS"
              echo "draft_version=${draft_version}"
            } >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          echo "No matching draft for version ${CWS_EXPECTED_VERSION} (draft=${draft_version:-<none>}, lastAsyncUploadState=${async_state:-<none>}). Proceeding with upload."
          {
            echo "skip_upload=false"
            echo "upload_state="
            echo "draft_version="
          } >> "${GITHUB_OUTPUT}"

      - name: Download release asset
        if: ${{ !inputs.dry-run && steps.cws-precheck.outputs.skip_upload != 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          echo "Downloading ${ZIP_NAME} from release ${RELEASE_TAG}..."
          gh release download "${RELEASE_TAG}" \
            --repo "${{ github.repository }}" \
            --pattern "${ZIP_NAME}"
          ls -lh "${ZIP_NAME}"

      - name: Verify artifact attestation
        if: ${{ !inputs.dry-run && steps.cws-precheck.outputs.skip_upload != 'true' }}
        id: verify-attestation
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ZIP_NAME: ${{ env.ZIP_NAME }}
        run: |
          set -euo pipefail
          echo "=== Verifying build provenance attestation ==="
          gh attestation verify "${ZIP_NAME}" \
            --repo "${{ github.repository }}" \
            --signer-workflow "${{ github.repository }}/.github/workflows/publish-release-from-release-head.yml" \
            --source-ref "refs/heads/release/${VERSION}"
          echo "Attestation verified for ${ZIP_NAME}"

      - name: Verify SHA256SUMS
        if: ${{ !inputs.dry-run && steps.cws-precheck.outputs.skip_upload != 'true' }}
        id: verify-sha256sums
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ZIP_NAME: ${{ env.ZIP_NAME }}
        run: |
          set -euo pipefail
          echo "=== Downloading SHA256SUMS from release ==="
          gh release download "${RELEASE_TAG}" \
            --repo "${{ github.repository }}" \
            --pattern "SHA256SUMS"
          cat SHA256SUMS
          echo ""
          echo "=== Verifying ${ZIP_NAME} digest ==="
          if ! awk -v zip="${ZIP_NAME}" '{
            f = $2; sub(/^\*/, "", f);
            if (f == zip) { print; found = 1; exit }
          } END { exit !found }' SHA256SUMS | sha256sum -c -; then
            echo "::error::SHA256SUMS verification failed for ${ZIP_NAME}"
            exit 1
          fi
          echo "SHA256SUMS check: PASSED"

      # Dev listing rejects manifest.key tied to production extension ID (POC lesson).
      - name: Strip manifest key from zip (dev only)
        if: inputs.target == 'dev' && !inputs.dry-run && steps.cws-precheck.outputs.skip_upload != 'true'
        run: |
          set -euo pipefail
          mkdir -p /tmp/extension
          unzip -q "${ZIP_NAME}" -d /tmp/extension
          jq 'del(.key) | .version = env.VERSION' /tmp/extension/manifest.json > /tmp/extension/manifest-tmp.json
          mv /tmp/extension/manifest-tmp.json /tmp/extension/manifest.json
          cd /tmp/extension
          zip -r -q "${GITHUB_WORKSPACE}/${ZIP_NAME}" .
          echo "Stripped manifest key and set version in manifest.json"

      - name: Upload to Chrome Web Store
        if: ${{ !inputs.dry-run && steps.cws-precheck.outputs.skip_upload != 'true' }}
        id: cws-upload
        env:
          ACCESS_TOKEN: ${{ steps.auth.outputs.access_token }}
        run: |
          set -euo pipefail
          echo "Target: ${{ inputs.target }}"
          echo "Publisher ID: ${PUBLISHER_ID}"
          echo "Extension ID: ${EXTENSION_ID}"
          echo "Publisher email (dashboard): ${PUBLISHER_EMAIL}"
          echo "Version: ${VERSION}"
          echo "Zip size: $(stat --format=%s "${ZIP_NAME}") bytes"
          echo ""

          UPLOAD_URL="https://chromewebstore.googleapis.com/upload/v2/publishers/${PUBLISHER_ID}/items/${EXTENSION_ID}:upload"
          FETCH_STATUS_URL="https://chromewebstore.googleapis.com/v2/publishers/${PUBLISHER_ID}/items/${EXTENSION_ID}:fetchStatus"

          HTTP_CODE=$(curl -sS \
            -o /tmp/response.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${ACCESS_TOKEN}" \
            -T "${ZIP_NAME}" \
            "${UPLOAD_URL}")

          echo "http_code=${HTTP_CODE}" >> "${GITHUB_OUTPUT}"
          echo "HTTP Status: ${HTTP_CODE}"
          echo ""
          cat /tmp/response.json
          echo ""

          if [[ "${HTTP_CODE}" != "200" ]]; then
            echo "::error::Upload failed with HTTP ${HTTP_CODE}"
            cat /tmp/response.json
            exit 1
          fi

          UPLOAD_STATE=$(jq -r '.uploadState // empty' /tmp/response.json)
          if [[ "${UPLOAD_STATE}" == "IN_PROGRESS" ]]; then
            max_polls=6
            poll_interval_seconds=10
            echo "Upload in progress; polling :fetchStatus (up to ${max_polls}×${poll_interval_seconds}s)..."
            poll=0
            while [[ "${UPLOAD_STATE}" == "IN_PROGRESS" && $poll -lt ${max_polls} ]]; do
              poll=$((poll + 1))
              sleep "${poll_interval_seconds}"
              FETCH_HTTP_CODE=$(curl -sS \
                -o /tmp/fetch-status.json -w "%{http_code}" \
                -H "Authorization: Bearer ${ACCESS_TOKEN}" \
                "${FETCH_STATUS_URL}")
              if [[ "${FETCH_HTTP_CODE}" != "200" ]]; then
                echo "::error::fetchStatus failed with HTTP ${FETCH_HTTP_CODE} (poll ${poll}/${max_polls})"
                cat /tmp/fetch-status.json
                exit 1
              fi
              UPLOAD_STATE=$(jq -r '.lastAsyncUploadState // empty' /tmp/fetch-status.json)
              echo "Poll ${poll}/${max_polls}: uploadState=${UPLOAD_STATE:-<unset>}"
            done
            if [[ "${UPLOAD_STATE}" == "IN_PROGRESS" ]]; then
              echo "::error::CWS upload still IN_PROGRESS after ${max_polls} polls (${poll_interval_seconds}s apart); check CWS console or re-run"
              cat /tmp/fetch-status.json
              exit 1
            fi
            if [[ -f /tmp/fetch-status.json ]]; then
              cp /tmp/fetch-status.json /tmp/response.json
            fi
          fi

          echo "upload_state=${UPLOAD_STATE}" >> "${GITHUB_OUTPUT}"
          if [[ "${UPLOAD_STATE}" != "SUCCEEDED" ]]; then
            echo "::error::CWS upload failed: uploadState=${UPLOAD_STATE:-<missing>}"
            cat /tmp/response.json
            exit 1
          fi

          echo "Package uploaded (draft/pending review). Not published to users."

      - name: Summary
        if: ${{ always() && !inputs.dry-run }}
        env:
          SKIP_UPLOAD: ${{ steps.cws-precheck.outputs.skip_upload }}
          PRECHECK_STATE: ${{ steps.cws-precheck.outputs.upload_state }}
          DRAFT_VERSION: ${{ steps.cws-precheck.outputs.draft_version }}
          HTTP_CODE: ${{ steps.cws-upload.outputs.http_code }}
          UPLOAD_STATE: ${{ steps.cws-upload.outputs.upload_state }}
          ATTEST_OUTCOME: ${{ steps.verify-attestation.outcome }}
          SHA_OUTCOME: ${{ steps.verify-sha256sums.outcome }}
        run: |
          if [[ "${SKIP_UPLOAD}" == "true" ]]; then
            result_state="${PRECHECK_STATE:-SKIPPED_ALREADY_EXISTS}"
            http_display="skipped (pre-flight)"
            attest_display="skipped (pre-flight)"
            sha_display="skipped (pre-flight)"
          else
            result_state="${UPLOAD_STATE:-n/a}"
            http_display="${HTTP_CODE:-n/a}"
            [[ "${ATTEST_OUTCOME}" == "success" ]] && attest_display="✅" || attest_display="❌"
            [[ "${SHA_OUTCOME}" == "success" ]] && sha_display="✅" || sha_display="❌"
          fi
          {
            echo ""
            echo "### Result"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| HTTP status | \`${http_display}\` |"
            echo "| CWS uploadState | \`${result_state}\` |"
            if [[ "${SKIP_UPLOAD}" == "true" && -n "${DRAFT_VERSION}" ]]; then
              echo "| Draft crxVersion | \`${DRAFT_VERSION}\` |"
            fi
            echo "| Attestation verified | ${attest_display} |"
            echo "| SHA256SUMS verified | ${sha_display} |"
            echo "| Published to users | no (upload only) |"
            echo "| Workflow run | ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }} |"
          } >> "${GITHUB_STEP_SUMMARY}"
