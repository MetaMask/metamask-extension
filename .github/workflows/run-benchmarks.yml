name: Run benchmarks

on:
  workflow_call:
    inputs:
      builds-from-run:
        required: true
        type: string
        description: The run ID to get builds from

permissions:
  contents: read
  id-token: write
  pull-requests: read

jobs:
  benchmarks:
    if: ${{ github.event_name != 'merge_group' }} # Skip this job for the Merge Queue
    name: ${{ matrix.browser }}-${{ matrix.buildType }}-${{ matrix.pageType }}
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        # Preset names are defined in test/e2e/benchmarks/utils/constants.ts
        # and must stay in sync with benchmark-command (startupPowerUserHome uses extra flags).
        #
        # Startup + interaction + user journeys: chrome/firefox × webpack × preset (test build: build-test-webpack / build-test-mv2-webpack).
        browser: [chrome, firefox]
        buildType: [webpack]
        pageType:
          - startupStandardHome
          - startupPowerUserHome
          - interactionUserActions
          - userJourneyOnboardingImport
          - userJourneyOnboardingNew
          - userJourneyAssets
          - userJourneyTransactions
          - userJourneyAccountManagement
    runs-on: ubuntu-latest
    timeout-minutes: 30
    container:
      image: ghcr.io/metamask/metamask-extension-e2e-image:v24.13.0
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    env:
      SELENIUM_BROWSER: ${{ matrix.browser }}
      HEADLESS: false
      INFURA_PROJECT_ID: ${{ secrets.INFURA_PROJECT_ID }}
      TEST_SRP_2: ${{ secrets.TEST_SRP_2 }}
      SENTRY_DSN_PERFORMANCE: ${{ vars.SENTRY_DSN_PERFORMANCE }}
      PR_NUMBER: ${{ github.event.pull_request.number || 'none' }}
      HEAD_COMMIT_HASH: ${{ github.event.pull_request.head.sha || github.sha }}
      GITHUB_REF_NAME: ${{ github.head_ref || github.ref_name }}
      # main or release/* only — for S3 / AWS CLI (same ref semantics as Sentry).
      MAIN_OR_RELEASE: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/') }}
    steps:
      - name: Checkout and setup environment
        uses: MetaMask/action-checkout-and-setup@v3
        with:
          is-high-risk-environment: false
          skip-allow-scripts: true

      - name: Restore .metamask folder
        id: restore-metamask
        uses: actions/cache/restore@v5
        with:
          path: .metamask
          key: .metamask-${{ hashFiles('yarn.lock') }}
          fail-on-cache-miss: false

      - name: Install anvil if cache missed
        if: ${{ steps.restore-metamask.outputs.cache-hit != 'true' }}
        run: yarn mm-foundryup
        shell: bash

      - name: Download build artifact
        uses: actions/download-artifact@v7
        with:
          name: build-test${{ matrix.browser == 'firefox' && '-mv2' || '' }}-${{ matrix.buildType }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ inputs.builds-from-run }}

      - name: Configure Xvfb
        run: Xvfb -ac :99 -screen 0 1280x1024x16 &
        shell: bash

      - name: Install AWS CLI (needed for S3 upload on main/release only)
        if: >-
          ${{
            env.MAIN_OR_RELEASE == 'true' &&
            vars.AWS_REGION != '' &&
            vars.AWS_IAM_ROLE != '' &&
            vars.AWS_S3_BUCKET != ''
          }}
        run: sudo apt-get update && sudo apt-get install python3-pip && sudo pip install awscli --break-system-packages
        shell: bash

      - name: Run the benchmark
        run: >-
          ${{ matrix.pageType == 'startupPowerUserHome' && format('yarn test:e2e:benchmark --preset startupPowerUserHome --browserLoads 15 --pageLoads 7 --out test-artifacts/benchmarks/benchmark-{0}-{1}-startupPowerUserHome.json --retries 2', matrix.browser, matrix.buildType) || format('yarn test:e2e:benchmark --preset {2} --out test-artifacts/benchmarks/benchmark-{0}-{1}-{2}.json --retries 2', matrix.browser, matrix.buildType, matrix.pageType) }}
        shell: bash

      - name: Send benchmark results to Sentry (main/release only)
        if: >-
          ${{
            vars.SENTRY_DSN_PERFORMANCE &&
            env.MAIN_OR_RELEASE == 'true'
          }}
        run: |
          export GITHUB_REF_NAME="${GH_HEAD_REF:-$GH_REF_NAME}"
          yarn tsx test/e2e/benchmarks/send-to-sentry.ts \
            --results "test-artifacts/benchmarks/benchmark-${{ matrix.browser }}-${{ matrix.buildType }}-${{ matrix.pageType }}.json" \
            --browser "${{ matrix.browser }}" \
            --buildType "${{ matrix.buildType }}"
        shell: bash
        env:
          GH_HEAD_REF: ${{ github.head_ref }}
          GH_REF_NAME: ${{ github.ref_name }}

      - name: Upload benchmark to S3
        if: >-
          ${{
            env.MAIN_OR_RELEASE == 'true' &&
            vars.AWS_REGION != '' &&
            vars.AWS_IAM_ROLE != '' &&
            vars.AWS_S3_BUCKET != ''
          }}
        uses: MetaMask/github-tools/.github/actions/upload-s3@v1
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: ${{ vars.AWS_IAM_ROLE }}
          s3-bucket: ${{ vars.AWS_S3_BUCKET }}/${{ github.event.repository.name }}/${{ github.run_id }}/benchmarks/benchmark-${{ matrix.browser }}-${{ matrix.buildType }}-${{ matrix.pageType }}.json
          path: test-artifacts/benchmarks/benchmark-${{ matrix.browser }}-${{ matrix.buildType }}-${{ matrix.pageType }}.json

      - name: Upload benchmark result as GitHub artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v6
        with:
          name: benchmark-${{ matrix.browser }}-${{ matrix.buildType }}-${{ matrix.pageType }}.json
          path: test-artifacts/benchmarks/benchmark-${{ matrix.browser }}-${{ matrix.buildType }}-${{ matrix.pageType }}.json
          retention-days: 7
          if-no-files-found: ignore

  benchmarks-page-load:
    if: ${{ github.event_name != 'merge_group' }} # Skip this job for the Merge Queue
    name: chrome-webpack-pageLoadBenchmark
    continue-on-error: true
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: ${{ github.ref_name == 'main' && 'default-branch' || null }}
    env:
      OWNER: ${{ github.repository_owner }}
      REPOSITORY: ${{ github.event.repository.name }}
      PR_NUMBER: ${{ github.event.pull_request.number || 'none' }}
      HEAD_COMMIT_HASH: ${{ github.event.pull_request.head.sha || github.sha }}
      # Job env mirrors matrix job; step `if:` uses env.SENTRY_DSN_PERFORMANCE (same as send-to-sentry’s process.env).
      SENTRY_DSN_PERFORMANCE: ${{ vars.SENTRY_DSN_PERFORMANCE }}
      BENCHMARK_BROWSER_LOADS: '10'
      BENCHMARK_PAGE_LOADS: '10'
      DAPP_BENCHMARK_JSON: benchmark-chrome-webpack-pageLoadBenchmark.json
      MAIN_OR_RELEASE: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/') }}
    steps:
      - name: Checkout and setup environment
        uses: MetaMask/action-checkout-and-setup@v3
        with:
          is-high-risk-environment: false
          skip-allow-scripts: true

      - name: Download artifact 'build-test-webpack'
        uses: actions/download-artifact@v7
        with:
          name: build-test-webpack
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ inputs.builds-from-run }}

      - name: Install Playwright browsers
        run: yarn playwright install chromium

      - name: Run dapp page load benchmarks
        run: yarn test:e2e:benchmark --preset=pageLoadBenchmark

      - name: Send benchmark results to Sentry (main/release only)
        if: >-
          ${{
            vars.SENTRY_DSN_PERFORMANCE &&
            env.MAIN_OR_RELEASE == 'true'
          }}
        run: |
          export GITHUB_REF_NAME="${GH_HEAD_REF:-$GH_REF_NAME}"
          yarn tsx test/e2e/benchmarks/send-to-sentry.ts \
            --results "test-artifacts/benchmarks/${{ env.DAPP_BENCHMARK_JSON }}" \
            --browser "chrome" \
            --buildType "webpack"
        shell: bash
        env:
          GH_HEAD_REF: ${{ github.head_ref }}
          GH_REF_NAME: ${{ github.ref_name }}

      - name: Upload benchmark to S3
        if: >-
          ${{
            env.MAIN_OR_RELEASE == 'true' &&
            vars.AWS_REGION != '' &&
            vars.AWS_IAM_ROLE != '' &&
            vars.AWS_S3_BUCKET != ''
          }}
        uses: MetaMask/github-tools/.github/actions/upload-s3@v1
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: ${{ vars.AWS_IAM_ROLE }}
          s3-bucket: ${{ vars.AWS_S3_BUCKET }}/${{ github.event.repository.name }}/${{ github.run_id }}/benchmarks/${{ env.DAPP_BENCHMARK_JSON }}
          path: test-artifacts/benchmarks/${{ env.DAPP_BENCHMARK_JSON }}

      - name: Upload benchmark result as GitHub artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.DAPP_BENCHMARK_JSON }}
          path: test-artifacts/benchmarks/${{ env.DAPP_BENCHMARK_JSON }}
          retention-days: 7
          if-no-files-found: ignore

  # Evaluates benchmark results against constant thresholds (THRESHOLD_REGISTRY).
  # Rollout across 4 phases:
  # - Phase 2: continue-on-error: true (non-blocking, informational).
  # - Phase 3: continue-on-error: false (red X in checks, not required).
  # - Phase 4: continue-on-error: false + added to branch protection required checks.
  quality-gate:
    name: quality-gate
    continue-on-error: false
    needs:
      - benchmarks
      - benchmarks-page-load
    if: >-
      ${{
        !cancelled() &&
        github.event_name != 'merge_group'
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout quality-gate sources
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            .nvmrc
            tsconfig.json
            development/metamaskbot-build-announce
            shared/constants/benchmarks.ts
            test/e2e/benchmarks/utils/gated-metrics.ts
            test/e2e/benchmarks/utils/thresholds.ts
            test/e2e/benchmarks/utils/statistics.ts
          sparse-checkout-cone-mode: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'

      - name: Install tsx and runtime deps
        run: npm install --no-save tsx @metamask/utils
        shell: bash

      - name: Download all benchmark artifacts
        id: download-benchmarks
        uses: actions/download-artifact@v7
        continue-on-error: true
        with:
          pattern: benchmark-*.json
          path: benchmark-results/
          merge-multiple: true

      # skip-benchmark-gate label: convenience escape hatch for Phase 2–3.
      # Remove when graduating to Phase 4 (required check) — at that point,
      # use admin bypass or update thresholds instead.
      - name: Check for skip label
        id: skip-check
        continue-on-error: true
        if: >-
          ${{
            steps.download-benchmarks.outcome == 'success' &&
            github.event_name == 'pull_request'
          }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LABELS=$(gh api repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/labels --jq '.[].name')
          if echo "$LABELS" | grep -qx 'skip-benchmark-gate'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi
        shell: bash

      - name: Run quality gate
        if: >-
          ${{
            steps.download-benchmarks.outcome == 'success' &&
            steps.skip-check.outputs.skip != 'true'
          }}
        run: ./node_modules/.bin/tsx development/metamaskbot-build-announce/compare-benchmarks.ts --current ./benchmark-results/
        shell: bash

  # Pushes benchmark results to extension_benchmark_stats (performance_data.json) for
  # historical comparison in PR comments. Runs on main/release branch pushes only.
  # Skip on fork repos — only store stats on the canonical repository.
  store-benchmark-stats:
    name: store-benchmark-stats (main/release only)
    continue-on-error: true
    needs:
      - benchmarks
      - benchmarks-page-load
    if: >-
      ${{
        !cancelled() &&
        github.event_name == 'push' &&
        (github.ref_name == 'main' || startsWith(github.ref, 'refs/heads/release/')) &&
        !github.event.repository.fork
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: ${{ github.ref_name == github.event.repository.default_branch && 'default-branch' || 'release-ci' }}
    env:
      EXTENSION_BENCHMARK_STATS_TOKEN: ${{ secrets.EXTENSION_BENCHMARK_STATS_TOKEN }}
      HEAD_COMMIT_HASH: ${{ github.sha }}
      OWNER: ${{ github.repository_owner }}
      BRANCH_NAME: ${{ github.ref_name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download all performance benchmark artifacts
        id: download-perf-benchmark
        uses: actions/download-artifact@v7
        continue-on-error: true
        with:
          pattern: benchmark-*.json
          path: benchmark-results/
          merge-multiple: true

      - name: Commit performance stats to extension_benchmark_stats
        if: steps.download-perf-benchmark.outcome == 'success'
        continue-on-error: true
        run: .github/scripts/benchmark-stats-commit.sh
        env:
          BENCHMARK_DATA_TYPE: performance
          BENCHMARK_RESULTS_DIR: benchmark-results
