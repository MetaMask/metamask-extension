name: Build ts migration dashboard

on:
  workflow_call:

jobs:
  build-ts-migration-dashboard:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: ${{ github.ref_name == 'main' && 'default-branch' || null }}
    permissions:
      id-token: write
      contents: read
    env:
      # For a `pull_request` event, the branch is `github.head_ref``.
      # For a `push` event, the branch is `github.ref_name`.
      BRANCH: ${{ github.head_ref || github.ref_name }}
    steps:
      - name: Checkout and setup environment
        uses: MetaMask/action-checkout-and-setup@v3
        with:
          is-high-risk-environment: ${{ github.ref_name == 'main' || github.ref_name == 'stable' || startsWith(github.ref_name, 'release/') }}
          skip-allow-scripts: true

      - name: Build ts migration dashboard
        run: yarn ts-migration:dashboard:build

      - name: Upload 'ts-migration-dashboard' to S3
        if: ${{ vars.AWS_REGION && vars.AWS_IAM_ROLE && vars.AWS_S3_BUCKET }}
        uses: MetaMask/github-tools/.github/actions/upload-s3@v1
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: ${{ vars.AWS_IAM_ROLE }}
          s3-bucket: ${{ vars.AWS_S3_BUCKET }}/${{ github.event.repository.name }}/${{ github.run_id }}/ts-migration-dashboard
          path: development/ts-migration-dashboard/build/final

      - name: Get token
        id: token
        if: ${{ env.BRANCH == 'main' }}
        uses: MetaMask/github-tools/.github/actions/get-token@v1
        with:
          token-exchange-url: ${{ vars.TOKEN_EXCHANGE_URL }}
          target-repository: MetaMask/metamask-extension-ts-migration-dashboard
          permissions: |
            contents: write

      - name: Deploy ts migration dashboard
        if: ${{ env.BRANCH == 'main' }}
        env:
          TS_MIGRATION_DASHBOARD_TOKEN: ${{ steps.token.outputs.token }}
        run: |
          git remote add ts-migration-dashboard "https://x-access-token:${TS_MIGRATION_DASHBOARD_TOKEN}@github.com/MetaMask/metamask-extension-ts-migration-dashboard.git"
          git config user.name "MetaMask Bot"
          git config user.email metamaskbot@users.noreply.github.com
          yarn ts-migration:dashboard:deploy
