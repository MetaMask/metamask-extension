name: E2E Speculos Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout and setup
        uses: MetaMask/action-checkout-and-setup@v3
        with:
          is-high-risk-environment: 'true'

      - name: Build test extension
        run: yarn build:test
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: speculos-test-build
          path: dist/
          retention-days: 1

  speculos-tests:
    strategy:
      fail-fast: false
      matrix:
        device:
          - id: nanosp
            elf: ethereum-nanosp.elf
          - id: nanox
            elf: ethereum-nanox.elf
          - id: stax
            elf: ethereum-stax.elf
          - id: flex
            elf: ethereum-flex.elf
    uses: ./.github/workflows/run-e2e.yml
    with:
      test-suite-name: 'Speculos ${{ matrix.device.id }}'
      build-artifact: speculos-test-build
      test-command: 'SPECULOS_E2E=1 SPECULOS_DEVICE=${{ matrix.device.id }} SPECULOS_ELF=${{ matrix.device.elf }} yarn test:e2e:single "test/e2e/tests/hardware-wallets/ledger/ledger-account.spec.ts" "test/e2e/tests/hardware-wallets/ledger/ledger-send.spec.ts" "test/e2e/tests/hardware-wallets/ledger/ledger-error-modals.spec.ts" "test/e2e/tests/hardware-wallets/ledger/ledger-erc20.spec.ts" "test/e2e/tests/hardware-wallets/ledger/ledger-erc721.spec.ts" --browser=chrome'
      builds-from-run: ''
      pre-test-command: 'pip install speculos==0.26.8'
    secrets:
      INFURA_PROJECT_ID: ${{ secrets.INFURA_PROJECT_ID }}
