name: Performance benchmarks — publish results
description: >
  Uploads one E2E performance benchmark JSON from test-artifacts/benchmarks/ to S3 (optional)
  and as a GitHub Actions artifact. These artifacts are downloaded by store-benchmark-stats
  (benchmark-*.json) and merged into extension_benchmark_stats performance_data.json.

inputs:
  result-filename:
    description: Basename of the file in test-artifacts/benchmarks/ (e.g. benchmark-chrome-browserify-foo.json)
    required: true
  aws-region:
    description: AWS region for upload-s3
    required: false
    default: ''
  aws-role-to-assume:
    description: IAM role for upload-s3
    required: false
    default: ''
  aws-s3-bucket:
    description: S3 bucket name (first segment; key path includes repo and run id)
    required: false
    default: ''

runs:
  composite: true
  steps:
    - name: Upload benchmark to S3
      if: ${{ inputs.aws-region != '' && inputs.aws-role-to-assume != '' && inputs.aws-s3-bucket != '' }}
      uses: MetaMask/github-tools/.github/actions/upload-s3@v1
      with:
        aws-region: ${{ inputs.aws-region }}
        role-to-assume: ${{ inputs.aws-role-to-assume }}
        s3-bucket: ${{ inputs.aws-s3-bucket }}/${{ github.event.repository.name }}/${{ github.run_id }}/benchmarks/${{ inputs.result-filename }}
        path: test-artifacts/benchmarks/${{ inputs.result-filename }}

    - name: Upload benchmark result as GitHub artifact
      if: ${{ always() }}
      uses: actions/upload-artifact@v6
      with:
        name: ${{ inputs.result-filename }}
        path: test-artifacts/benchmarks/${{ inputs.result-filename }}
        retention-days: 7
        if-no-files-found: ignore
